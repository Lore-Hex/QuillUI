images:
  - location: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-arm64.img"
    arch: "aarch64"
  - location: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
    arch: "x86_64"

cpus: 4
memory: "8GiB"
disk: "40GiB"

mounts:
  - location: "~"
    writable: true

provision:
  - mode: system
    script: |
      set -eux
      apt-get update
      apt-get install -y clang curl git gnupg libgtk-4-dev libsqlite3-dev pkg-config unzip

message: |
  Ubuntu VM is ready.
  Install Swift with Swiftly, then run:

    curl -O "https://download.swift.org/swiftly/linux/swiftly-1.1.1-$(uname -m).tar.gz"
    tar -zxf "swiftly-1.1.1-$(uname -m).tar.gz"
    ./swiftly init

    cd /Users/jperla/claude/QuillUI
    scripts/linux-gtk-check.sh
