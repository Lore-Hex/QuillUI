    function loadWorktreeChoicesForDialog(mode, token) {
      window.setTimeout(() => {
        if (state.worktreeDialog.mode !== mode || state.worktreeDialog.choiceLoadToken !== token) {
          return;
        }
        if (window.__quillCodeFailNextWorktreeChoiceLoad) {
          window.__quillCodeFailNextWorktreeChoiceLoad = false;
          state.worktreeDialog = {
            ...state.worktreeDialog,
            choices: [],
            choicesLoading: false,
            choicesLoaded: true,
            choicesError: 'Could not load registered git worktrees.'
          };
          render();
          return;
        }
        state.worktreeDialog = {
          ...state.worktreeDialog,
          choices: availableWorktreeChoices(),
          choicesLoading: false,
          choicesLoaded: true,
          choicesError: ''
        };
        render();
      }, 80);
    }

    function retryWorktreeChoiceLoad(mode) {
      if (!mode || state.worktreeDialog.mode !== mode) return;
      state.worktreeDialog = {
        ...state.worktreeDialog,
        choices: [],
        choicesLoading: true,
        choicesLoaded: false,
        choicesError: '',
        choiceLoadToken: state.worktreeDialog.choiceLoadToken + 1
      };
      render();
      loadWorktreeChoicesForDialog(mode, state.worktreeDialog.choiceLoadToken);
    }

    function loadWorktreePrunePreview(token) {
      window.setTimeout(() => {
        if (state.worktreeDialog.mode !== 'prune' || state.worktreeDialog.pruneLoadToken !== token) {
          return;
        }
        if (window.__quillCodeFailNextWorktreePrunePreview) {
          window.__quillCodeFailNextWorktreePrunePreview = false;
          state.worktreeDialog = {
            ...state.worktreeDialog,
            pruneRecords: [],
            pruneOutput: '',
            pruneLoading: false,
            pruneLoaded: true,
            pruneError: 'Could not preview stale worktree records.'
          };
          render();
          return;
        }
        const records = staleWorktreeRecords();
        state.worktreeDialog = {
          ...state.worktreeDialog,
          pruneRecords: records,
          pruneOutput: records.join('\n'),
          pruneLoading: false,
          pruneLoaded: true,
          pruneError: ''
        };
        render();
      }, 80);
    }

    function retryWorktreePrunePreview() {
      if (state.worktreeDialog.mode !== 'prune') return;
      state.worktreeDialog = {
        ...state.worktreeDialog,
        pruneRecords: [],
        pruneOutput: '',
        pruneLoading: true,
        pruneLoaded: false,
        pruneError: '',
        pruneLoadToken: state.worktreeDialog.pruneLoadToken + 1
      };
      render();
      loadWorktreePrunePreview(state.worktreeDialog.pruneLoadToken);
    }

    function staleWorktreeRecords() {
      return state.worktreePruneRecords.slice();
    }

    function renderWorktreeChoiceSection(target, emptyMessage) {
      const dialog = state.worktreeDialog;
      const shouldRender = dialog.choicesLoading || dialog.choicesLoaded || dialog.choicesError || dialog.choices.length;
      if (!shouldRender) {
        return '';
      }
      const status = dialog.choicesLoading
        ? '<div class="dialog-choice-status" data-testid="worktree-choices-loading"><span class="dialog-choice-spinner" aria-hidden="true"></span><span>Loading registered worktrees...</span></div>'
        : dialog.choicesError
          ? `<div class="dialog-choice-status" data-testid="worktree-choices-error"><span>${escapeHTML(dialog.choicesError)} You can still paste a path.</span><button type="button" data-testid="worktree-choices-retry" data-target="${target}">Retry</button></div>`
          : dialog.choicesLoaded && !dialog.choices.length
            ? `<div class="dialog-choice-status" data-testid="worktree-choices-empty">${escapeHTML(emptyMessage)} You can still paste a path.</div>`
            : '';
      return `
        <div class="dialog-choice-list" aria-label="Known worktrees">
          <p class="eyebrow">Known worktrees</p>
          ${status}
          ${dialog.choices.map(choice => `
            <button type="button" class="dialog-choice" data-testid="worktree-choice" data-target="${target}" data-path="${escapeHTML(choice.path)}">
              <strong>${escapeHTML(choice.title)}</strong>
              <span>${escapeHTML(choice.detail)}</span>
              <code>${escapeHTML(choice.path)}</code>
            </button>
          `).join('')}
        </div>`;
    }

    function listWorktrees() {
      ensureThread('List worktrees');
      const stdout = state.worktrees.map(worktree => [
        `worktree ${worktree.path}`,
        'HEAD abc1234',
        `branch refs/heads/${worktree.branch}`
      ].join('\n')).join('\n\n') + '\n';
      addToolCard({
        title: 'host.git.worktree.list',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({}, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout }, null, 2)
      });
      addMessage('assistant', 'Output:\n' + stdout);
      syncSelectedThreadSearchText();
      render();
    }

    function createWorktree(values) {
      ensureThread('Create worktree');
      const args = { path: values.path };
      if (values.branch) args.branch = values.branch;
      if (values.base) args.base = values.base;
      const path = mockWorktreePath(values.path);
      if (!state.worktrees.some(worktree => worktree.path === path)) {
        state.worktrees.push({ path, branch: values.branch || values.path });
      }
      addToolCard({
        title: 'host.git.worktree.create',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify(args, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: `Preparing worktree (new branch '${values.branch || 'git-default'}')\\n`, artifacts: [path] }, null, 2)
      });
      state.worktreeDialog.mode = null;
      syncSelectedThreadSearchText();
      openCreatedWorktree(values);
      render();
    }

    function openWorktree(values) {
      ensureThread('Open worktree');
      const path = mockWorktreePath(values.path);
      addToolCard({
        title: 'host.git.worktree.open',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ path: values.path }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: `Opened registered worktree ${values.path}\\n`, artifacts: [path] }, null, 2)
      });
      state.worktreeDialog.mode = null;
      syncSelectedThreadSearchText();
      openCreatedWorktree({ path: values.path, branch: '' });
      render();
    }

    function openCreatedWorktree(values) {
      const path = mockWorktreePath(values.path);
      const name = mockWorktreeName(path);
      const existing = state.projects.items.find(project => project.path === path);
      const project = existing || {
        id: `project-${state.nextProjectIndex++}`,
        name,
        path,
        connectionKindLabel: 'Local',
        isRemote: false,
        isSelected: true
      };
      state.projects.selectedProjectID = project.id;
      state.projects.items = [
        { ...project, isSelected: true },
        ...state.projects.items
          .filter(item => item.id !== project.id)
          .map(item => ({ ...item, isSelected: false }))
      ];

      const title = `Worktree: ${values.branch || project.name}`;
      const threadID = `thread-${state.nextThreadIndex++}`;
      state.sidebar.selectedThreadID = threadID;
      state.sidebar.items = [{
        id: threadID,
        title,
        subtitle: state.topBar.modelLabel,
        searchText: '',
        updatedAt: new Date().toISOString(),
        isSelected: true,
        isPinned: false,
        isArchived: false
      }, ...state.sidebar.items.map(item => ({ ...item, isSelected: false }))];
      state.transcript.messages = [];
      state.transcript.toolCards = [];
      state.transcript.timelineItems = [];
      state.review = {
        title: 'Review changes',
        subtitle: 'Latest git diff',
        totalInsertions: 0,
        totalDeletions: 0,
        totalHunks: 0,
        files: []
      };
      state.terminal.cwdLabel = path;
      state.terminal.environment = {};
      state.topBar.primaryTitle = title;
      state.topBar.subtitle = `${project.name} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
      addMessage('assistant', `Opened worktree ${project.name} at ${path}.`);
      syncSelectedThreadSearchText();
    }

    function availableWorktreeChoices() {
      const selected = selectedProject();
      return state.worktrees
        .filter(worktree => worktree.path !== selected?.path)
        .map(worktree => ({
          path: worktree.path,
          title: mockWorktreeName(worktree.path),
          detail: worktree.branch || 'Registered worktree'
        }));
    }

    function mockWorktreePath(path) {
      if (!path) return '/mock';
      if (path.startsWith('/')) return path;
      return `/mock/${path}`;
    }

    function mockWorktreeName(path) {
      return path.split('/').filter(Boolean).pop() || path;
    }

    function removeWorktree(values) {
      ensureThread('Remove worktree');
      const path = mockWorktreePath(values.path);
      state.worktrees = state.worktrees.filter(worktree => worktree.path !== path);
      addToolCard({
        title: 'host.git.worktree.remove',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ path: values.path, force: values.force }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: '' }, null, 2)
      });
      addMessage('assistant', `Removed worktree ${mockWorktreeName(path)}.`);
      state.worktreeDialog.mode = null;
      syncSelectedThreadSearchText();
      render();
    }

    function pruneWorktrees(values = {}) {
      ensureThread('Prune worktrees');
      const dryRun = values.dryRun === true;
      const verbose = values.verbose === true;
      const stdout = dryRun
        ? `${staleWorktreeRecords().join('\n')}\n`
        : 'Pruned stale worktree administrative records.\n';
      if (!dryRun) {
        state.worktreePruneRecords = [];
        state.worktreeDialog.mode = null;
      }
      addToolCard({
        title: 'host.git.worktree.prune',
        subtitle: dryRun ? 'Completed · dry run' : 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ dryRun, verbose }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout }, null, 2)
      });
      addMessage('assistant', dryRun
        ? 'No stale worktree records found.'
        : 'Pruned stale worktree records. Git did not report any entries.');
      syncSelectedThreadSearchText();
      render();
    }

    function normalizedSidebarSelectionIDs() {
      const validIDs = new Set(state.sidebar.items.map(item => item.id));
      state.sidebar.selectedThreadIDs = state.sidebar.selectedThreadIDs.filter(id => validIDs.has(id));
      return state.sidebar.selectedThreadIDs;
    }

    function sidebarSelectionLabel() {
      const count = normalizedSidebarSelectionIDs().length;
      if (count === 0) return 'No chats selected';
      if (count === 1) return '1 chat selected';
      return `${count} chats selected`;
    }

    function startSidebarSelection(threadID = null) {
      state.sidebar.isSelectionMode = true;
      if (threadID && !state.sidebar.selectedThreadIDs.includes(threadID)) {
        state.sidebar.selectedThreadIDs = [...state.sidebar.selectedThreadIDs, threadID];
      }
      normalizedSidebarSelectionIDs();
    }

    function clearSidebarSelection() {
      state.sidebar.isSelectionMode = false;
      state.sidebar.selectedThreadIDs = [];
    }

    function toggleSidebarThreadSelection(threadID) {
      if (!state.sidebar.items.some(item => item.id === threadID)) return;
      state.sidebar.isSelectionMode = true;
      state.sidebar.selectedThreadIDs = state.sidebar.selectedThreadIDs.includes(threadID)
        ? state.sidebar.selectedThreadIDs.filter(id => id !== threadID)
        : [...state.sidebar.selectedThreadIDs, threadID];
    }

    function selectAllSidebarThreads() {
      state.sidebar.isSelectionMode = true;
      state.sidebar.selectedThreadIDs = state.sidebar.items.map(item => item.id);
    }

    function selectedSidebarThreads() {
      const ids = new Set(normalizedSidebarSelectionIDs());
      return state.sidebar.items.filter(item => ids.has(item.id));
    }

    function performSidebarBulkAction(action) {
      if (action === 'select') {
        startSidebarSelection();
        render();
        return;
      }
      if (action === 'selectAll') {
        selectAllSidebarThreads();
        render();
        return;
      }
      if (action === 'clearSelection') {
        clearSidebarSelection();
        render();
        return;
      }

      const selected = selectedSidebarThreads();
      const ids = new Set(selected.map(item => item.id));
      if (!ids.size) return;
      const selectedWasRemoved = ids.has(state.sidebar.selectedThreadID);

      if (action === 'pin' || action === 'unpin') {
        state.sidebar.items = sortSidebarItems(state.sidebar.items.map(item => (
          ids.has(item.id) && !item.isArchived ? { ...item, isPinned: action === 'pin' } : item
        )));
      }
      if (action === 'archive') {
        state.sidebar.items = sortSidebarItems(state.sidebar.items.map(item => (
          ids.has(item.id) ? { ...item, isPinned: false, isArchived: true, isSelected: false } : item
        )));
      }
      if (action === 'unarchive') {
        state.sidebar.items = sortSidebarItems(state.sidebar.items.map(item => (
          ids.has(item.id) ? { ...item, isArchived: false } : item
        )));
        const first = selected[0];
        if (first) state.sidebar.selectedThreadID = first.id;
      }
      if (action === 'delete') {
        state.sidebar.items = state.sidebar.items.filter(item => !ids.has(item.id));
      }

      if ((action === 'archive' || action === 'delete') && selectedWasRemoved) {
        const next = state.sidebar.items.find(item => !item.isArchived);
        state.sidebar.selectedThreadID = next?.id || null;
      }
      state.sidebar.items = state.sidebar.items.map(item => ({
        ...item,
        isSelected: item.id === state.sidebar.selectedThreadID
      }));
      const next = state.sidebar.items.find(item => item.id === state.sidebar.selectedThreadID);
      state.topBar.primaryTitle = next?.title || 'QuillCode';
      if (!state.sidebar.selectedThreadID) {
        state.transcript.messages = [];
        state.transcript.toolCards = [];
        state.transcript.timelineItems = [];
      }
      clearSidebarSelection();
      render();
    }

    function selectThread(threadID) {
      const selected = state.sidebar.items.find(item => item.id === threadID);
      if (!selected) return;
      state.sidebar.selectedThreadID = threadID;
      state.sidebar.items = state.sidebar.items.map(item => ({
        ...item,
        isSelected: item.id === threadID
      }));
      state.topBar.primaryTitle = selected.title;
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      state.topBar.subtitle = `${selectedProject?.name || 'No project'} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
      render();
    }

    function runSidebarThreadAction(action, threadID) {
      if (!threadID) return;
      const thread = state.sidebar.items.find(item => item.id === threadID);
      if (!thread) return;
      if (action === 'rename') {
        const nextTitle = window.prompt('Rename chat', thread.title);
        if (nextTitle && nextTitle.trim()) {
          state.sidebar.items = state.sidebar.items.map(item => (
            item.id === threadID ? { ...item, title: nextTitle.trim() } : item
          ));
          if (state.sidebar.selectedThreadID === threadID) {
            state.topBar.primaryTitle = nextTitle.trim();
          }
        }
      }
      if (action === 'duplicate') {
        const newThreadID = `thread-${state.nextThreadIndex++}`;
        state.sidebar.selectedThreadID = newThreadID;
        state.sidebar.items = sortSidebarItems([
          {
            ...thread,
            id: newThreadID,
            title: `Copy: ${thread.title}`,
            updatedAt: new Date().toISOString(),
            isPinned: false,
            isArchived: false,
            isSelected: true
          },
          ...state.sidebar.items.map(item => ({ ...item, isSelected: false }))
        ]);
        state.topBar.primaryTitle = `Copy: ${thread.title}`;
      }
      if (action === 'pin' || action === 'unpin') {
        state.sidebar.items = sortSidebarItems(state.sidebar.items.map(item => (
          item.id === threadID ? { ...item, isPinned: !item.isPinned } : item
        )));
      }
      if (action === 'archive') {
        state.sidebar.items = sortSidebarItems(state.sidebar.items.map(item => (
          item.id === threadID ? { ...item, isArchived: true, isPinned: false, isSelected: false } : item
        )));
        if (state.sidebar.selectedThreadID === threadID) {
          const next = state.sidebar.items.find(item => !item.isArchived);
          state.sidebar.selectedThreadID = next?.id || null;
          state.sidebar.items = state.sidebar.items.map(item => ({ ...item, isSelected: item.id === state.sidebar.selectedThreadID }));
          state.topBar.primaryTitle = next?.title || 'QuillCode';
          if (!state.sidebar.selectedThreadID) {
            state.transcript.messages = [];
            state.transcript.toolCards = [];
            state.transcript.timelineItems = [];
          }
        }
      }
      if (action === 'unarchive') {
        state.sidebar.selectedThreadID = threadID;
        state.sidebar.items = sortSidebarItems(state.sidebar.items.map(item => (
          item.id === threadID
            ? { ...item, isArchived: false, isSelected: true }
            : { ...item, isSelected: false }
        )));
        state.topBar.primaryTitle = thread.title;
      }
      if (action === 'delete') {
        state.sidebar.items = state.sidebar.items.filter(item => item.id !== threadID);
        if (state.sidebar.selectedThreadID === threadID) {
          const next = state.sidebar.items.find(item => !item.isArchived);
          state.sidebar.selectedThreadID = next?.id || null;
          state.sidebar.items = state.sidebar.items.map(item => ({ ...item, isSelected: item.id === state.sidebar.selectedThreadID }));
          state.topBar.primaryTitle = next?.title || 'QuillCode';
          if (!state.sidebar.selectedThreadID) {
            state.transcript.messages = [];
            state.transcript.toolCards = [];
            state.transcript.timelineItems = [];
          }
        }
      }
      render();
    }

    function sortSidebarItems(items) {
      return [...items].sort((lhs, rhs) => {
        if (Boolean(lhs.isArchived) !== Boolean(rhs.isArchived)) return Number(lhs.isArchived) - Number(rhs.isArchived);
        if (Boolean(lhs.isPinned) !== Boolean(rhs.isPinned)) return Number(rhs.isPinned) - Number(lhs.isPinned);
        const lhsUpdatedAt = new Date(lhs.updatedAt || 0).getTime();
        const rhsUpdatedAt = new Date(rhs.updatedAt || 0).getTime();
        return (Number.isNaN(rhsUpdatedAt) ? 0 : rhsUpdatedAt) - (Number.isNaN(lhsUpdatedAt) ? 0 : lhsUpdatedAt);
      });
    }

    function setSidebarItemUpdatedAt(title, updatedAt) {
      state.sidebar.items = sortSidebarItems(state.sidebar.items.map(item => (
        item.title === title ? { ...item, updatedAt } : item
      )));
      render();
    }

    function syncSelectedThreadSearchText() {
      if (!state.sidebar.selectedThreadID) return;
      const messageText = state.transcript.messages.map(message => message.text).join('\n');
      const toolText = state.transcript.toolCards
        .map(card => [card.inputJSON || '', card.outputJSON || ''].join('\n'))
        .join('\n');
      const searchText = `${messageText}\n${toolText}`.slice(0, 8000);
      state.sidebar.items = state.sidebar.items.map(item => (
        item.id === state.sidebar.selectedThreadID ? { ...item, searchText } : item
      ));
    }

    function mockReviewDiff() {
      const diff = [
        'diff --git a/Sources/App.swift b/Sources/App.swift',
        '--- a/Sources/App.swift',
        '+++ b/Sources/App.swift',
        '@@ -1 +1,2 @@',
        '+let title = "QuillCode"',
        ' import Foundation'
      ].join('\n');
      return {
        diff,
        review: {
          title: 'Review changes',
          subtitle: '1 file changed, +1 -0',
          totalInsertions: 1,
          totalDeletions: 0,
          totalHunks: 1,
          files: [{
            path: 'Sources/App.swift',
            changeLabel: '+1 · -0 · 1 hunk',
            hunks: [{
              header: '@@ -1 +1,2 @@',
              changeLabel: '+1 · -0',
              lines: [
                { lineNumber: 1, kind: 'insertion', marker: '+', content: 'let title = "QuillCode"', comments: [] },
                { lineNumber: 2, kind: 'context', marker: ' ', content: 'import Foundation', comments: [] }
              ]
            }],
            comments: []
          }]
        }
      };
    }

    function sendMessage(value) {
      const text = String(value).trim();
      if (!text) return;
      ensureThread(text.split(/\s+/).slice(0, 6).join(' '));
      state.composer.draft = '';
      state.composer.canSend = false;
      state.composer.slashActiveIndex = 0;
      state.runtimeIssue = null;
      addMessage('user', text);
      touchSelectedThread();
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      const isRemoteProject = Boolean(selectedProject?.isRemote);
      const browserTarget = browserOpenTargetFromPrompt(text);
      if (text.toLowerCase().includes('slow task')) {
        state.composer.isSending = true;
        state.topBar.agentStatus = 'Running';
        const card = addToolCard({
          title: 'host.shell.run',
          subtitle: 'Running',
          status: 'running',
          inputJSON: JSON.stringify({ cmd: 'sleep 10 && whoami' }, null, 2),
          outputJSON: null
        });
        const runID = crypto.randomUUID();
        const timer = window.setTimeout(() => {
          if (!activeMockRun || activeMockRun.id !== runID) return;
          updateToolCardLifecycle(card, 'done', 'Completed');
          card.outputJSON = JSON.stringify({ ok: true, stdout: 'mock-user\\n', stderr: '', exitCode: 0 }, null, 2);
          card.artifacts = artifactsFromOutput(card.outputJSON);
          activeMockRun = null;
          state.composer.isSending = false;
          state.topBar.agentStatus = 'Idle';
          addMessage('assistant', 'Long-running task completed.');
          syncSelectedThreadSearchText();
          render();
        }, 2000);
        activeMockRun = { id: runID, timer };
      } else if (text.toLowerCase().includes('trigger rate limit')) {
        state.topBar.agentStatus = 'Failed';
        const lastError = 'TrustedRouter request failed with HTTP 429: Rate limit exceeded. Retry-After: 120. x-ratelimit-remaining: 0';
        state.runtimeIssue = makeRuntimeIssue({
          severity: 'warning',
          title: 'TrustedRouter rate limit reached',
          message: 'TrustedRouter or the selected provider is rate limiting this request. Wait for reset, retry later, or switch models.',
          actionLabel: 'Switch model'
        }, lastError);
      } else if (text.toLowerCase().includes('trigger network failure')) {
        if (!state.mockRuntimeFailureConsumed) {
          state.mockRuntimeFailureConsumed = true;
          state.topBar.agentStatus = 'Failed';
          const lastError = 'TrustedRouter request timed out while connecting to https://api.trustedrouter.test/v1 with Bearer sk-tr-v1-secretDiagnosticToken';
          state.runtimeIssue = makeRuntimeIssue({
            severity: 'error',
            title: 'TrustedRouter network issue',
            message: 'QuillCode could not reach https://api.trustedrouter.test/v1. Check the network or API base URL, then retry.',
            actionLabel: 'Retry'
          }, lastError);
        } else {
          state.topBar.agentStatus = 'Idle';
          addToolCard({
            title: 'host.shell.run',
            subtitle: 'Completed',
            status: 'done',
            inputJSON: JSON.stringify({ cmd: 'whoami' }, null, 2),
            outputJSON: JSON.stringify({ ok: true, stdout: 'mock-user\\n' }, null, 2)
          });
          addMessage('assistant', 'Retry completed after reconnecting to TrustedRouter.');
        }
      } else if (text.toLowerCase().includes('trigger malformed model action')) {
        state.topBar.agentStatus = 'Failed';
        state.runtimeIssue = makeRuntimeIssue({
          severity: 'warning',
          title: 'Model response was malformed',
          message: "The selected model did not follow QuillCode's action schema. Try Nike 1.0, Synth, or another coding model.",
          actionLabel: 'Switch model'
        }, 'Expected valid QuillCode action JSON but received an empty argument object.');
      } else if (/^\/(new|new-chat|newchat)\b/i.test(text)) {
        newChat();
        return;
      } else if (text.toLowerCase().startsWith('/mode ')) {
        const requestedMode = text.split(/\s+/)[1]?.toLowerCase();
        const modeMap = { auto: 'Auto', review: 'Review', 'read-only': 'Read-only', readonly: 'Read-only' };
        const nextMode = modeMap[requestedMode] || null;
        if (nextMode) {
          setModeLabel(nextMode);
          addMessage('assistant', `Mode set to ${nextMode}.`);
        } else {
          addMessage('assistant', 'Usage: /mode auto, /mode review, or /mode read-only');
        }
      } else if (/^\/(rename|rename-chat|title)\b/i.test(text)) {
        const nextTitle = text.replace(/^\/(rename|rename-chat|title)\b/i, '').trim();
        if (nextTitle) {
          const selectedID = state.sidebar.selectedThreadID;
          state.sidebar.items = state.sidebar.items.map(item => (
            item.id === selectedID ? { ...item, title: nextTitle } : item
          ));
          state.topBar.primaryTitle = nextTitle;
          addMessage('assistant', `Renamed chat to ${nextTitle}.`);
        } else {
          addMessage('assistant', 'Usage: /rename New chat title');
        }
      } else if (/^\/(duplicate|duplicate-chat|copy-chat)\b/i.test(text)) {
        runSidebarThreadAction('duplicate', state.sidebar.selectedThreadID);
        return;
      } else if (/^\/(archive|archive-chat)\b/i.test(text)) {
        runSidebarThreadAction('archive', state.sidebar.selectedThreadID);
        return;
      } else if (/^\/(unarchive|unarchive-chat)\b/i.test(text)) {
        runSidebarThreadAction('unarchive', state.sidebar.selectedThreadID);
        return;
      } else if (/^\/(terminal|term|shell)\b/i.test(text)) {
        const argument = text.replace(/^\/(terminal|term|shell)\b/i, '').trim().toLowerCase();
        if (argument === 'clear' || argument === 'reset') {
          runCommand('terminal-clear');
          addMessage('assistant', state.terminal.entries.length ? 'Terminal is still running.' : 'Terminal history cleared.');
          return;
        }
        state.terminal.isVisible = !state.terminal.isVisible;
        addMessage('assistant', state.terminal.isVisible ? 'Terminal opened.' : 'Terminal hidden.');
      } else if (/^\/(compact|compact-context|context-compact)\b/i.test(text)) {
        compactContext();
        return;
      } else if (/^\/(follow-up|followup|schedule|remind)\b/i.test(text)) {
        const scheduleText = text.replace(/^\/(follow-up|followup|schedule|remind)\b/i, '').trim();
        const schedule = naturalFollowUpSchedule(scheduleText);
        if (schedule) {
          createThreadFollowUpAutomation(schedule.label, { isRecurring: schedule.isRecurring });
          addMessage('assistant', `Scheduled a thread follow-up for ${schedule.label}.`);
        } else {
          addMessage('assistant', 'Usage: /follow-up in 30 minutes, /follow-up tomorrow at 9 AM, or /follow-up daily');
        }
      } else if (/^\/(workspace-check|workspacecheck|workspace-schedule|project-check|repo-check)\b/i.test(text)) {
        const scheduleText = text.replace(/^\/(workspace-check|workspacecheck|workspace-schedule|project-check|repo-check)\b/i, '').trim();
        const schedule = naturalFollowUpSchedule(scheduleText);
        if (schedule) {
          createWorkspaceScheduleAutomation(schedule.label, { isRecurring: schedule.isRecurring });
          addMessage('assistant', `Scheduled a workspace check for ${schedule.label}.`);
        } else {
          addMessage('assistant', 'Usage: /workspace-check in 1 hour, /workspace-check tomorrow at 9 AM, or /workspace-check daily');
        }
      } else if (/^\/(browser|preview)\b/i.test(text)) {
        state.browser.isVisible = !state.browser.isVisible;
        addMessage('assistant', state.browser.isVisible ? 'Browser opened.' : 'Browser hidden.');
      } else if (/^\/(ssh|remote)\b/i.test(text)) {
        const address = text.replace(/^\/(ssh|remote)\b/i, '').trim();
        if (address) {
          addSSHProject(address);
          return;
        }
        addMessage('assistant', 'Usage: /ssh user@host:/absolute/path');
      } else if (/^\/(remember-edit|memory-edit)\b/i.test(text)) {
        const editText = text
          .replace(/^\/(remember-edit|memory-edit)\b/i, '')
          .replace(/\r\n?/g, '\n')
          .trim();
        const lineBreak = editText.indexOf('\n');
        if (lineBreak > 0) {
          const id = editText.slice(0, lineBreak).trim();
          const content = editText.slice(lineBreak + 1).trim();
          updateMemory(id, content);
        } else {
          addMessage('assistant', 'Use `/remember-edit memory-id` followed by the revised memory on the next line.');
        }
      } else if (/^\/remember\b/i.test(text)) {
        const memoryContent = text.replace(/^\/remember\b/i, '').trim();
        if (memoryContent) {
          saveMemory(memoryContent);
        } else {
          state.memories.isVisible = !state.memories.isVisible;
          addMessage('assistant', state.memories.isVisible ? 'Memories opened.' : 'Memories hidden.');
        }
      } else if (/^\/memor(y|ies)\b/i.test(text)) {
        state.memories.isVisible = !state.memories.isVisible;
        addMessage('assistant', state.memories.isVisible ? 'Memories opened.' : 'Memories hidden.');
      } else if (/^\/(worktrees?|wt)\b/i.test(text)) {
        const command = parseWorktreeSlash(text);
        if (command.kind === 'list') {
          listWorktrees();
        } else if (command.kind === 'create') {
          createWorktree(command.values);
        } else if (command.kind === 'open') {
          openWorktree(command.values);
        } else if (command.kind === 'remove') {
          removeWorktree(command.values);
        } else if (command.kind === 'prune') {
          pruneWorktrees(command.values);
        } else {
          addMessage('assistant', command.message);
          render();
        }
        return;
      } else if (/^\/(pr|pull-?request)\b/i.test(text)) {
        state.composer.draft = 'Create a pull request titled ';
        addMessage('assistant', 'Pull request prompt prepared.');
      } else if (text.toLowerCase().startsWith('/help')) {
        addMessage('assistant', [
          'Slash commands:',
          ...slashCommandDefinitions.map(definition => `${definition.usage} - ${definition.detail}`)
        ].join('\n'));
      } else if (text.toLowerCase().includes('plan')) {
        const update = {
          explanation: 'Model-authored plan for the current request.',
          plan: [
            { step: 'Inspect current state', status: 'completed' },
            { step: 'Implement requested change', status: 'in_progress', detail: 'Keep the slice reviewable.' },
            { step: 'Validate and summarize', status: 'pending' }
          ]
        };
        state.activity.authoredPlan = [
          {
            id: 'authored-plan-0',
            title: 'Inspect current state',
            detail: update.explanation,
            kind: 'authored-plan',
            statusLabel: 'Done'
          },
          {
            id: 'authored-plan-1',
            title: 'Implement requested change',
            detail: 'Keep the slice reviewable.',
            kind: 'authored-plan',
            statusLabel: 'Running'
          },
          {
            id: 'authored-plan-2',
            title: 'Validate and summarize',
            detail: 'Model-authored task plan.',
            kind: 'authored-plan',
            statusLabel: 'Pending'
          }
        ];
        addToolCard({
          title: 'host.plan.update',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify(update, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout: JSON.stringify(update, null, 2) }, null, 2)
        });
        addMessage('assistant', 'Updated the task plan.');
      } else if (browserTarget) {
        const url = normalizeBrowserURL(browserTarget);
        if (url) {
          setBrowserPage(url);
          const snapshot = state.browser.snapshot;
          const inspection = {
            url,
            title: state.browser.title,
            status: state.browser.statusLabel,
            sourceLabel: snapshot.sourceLabel,
            inspectionDepth: snapshot.inspectionDepth,
            summary: snapshot.summary,
            details: snapshot.details,
            outline: snapshot.outline,
            textSnippet: snapshot.textSnippet,
            comments: []
          };
          addToolCard({
            title: 'host.browser.open',
            subtitle: 'Completed',
            status: 'done',
            inputJSON: JSON.stringify({ url: browserTarget }, null, 2),
            outputJSON: JSON.stringify({ ok: true, stdout: JSON.stringify(inspection, null, 2) }, null, 2)
          });
          addMessage('assistant', `Opened \`${state.browser.title}\` at ${url}.`);
        } else {
          addToolCard({
            title: 'host.browser.open',
            subtitle: 'Invalid address',
            status: 'failed',
            inputJSON: JSON.stringify({ url: browserTarget }, null, 2),
            outputJSON: JSON.stringify({ ok: false, error: 'Enter an http, https, file, localhost, or project file URL.' }, null, 2)
          });
          addMessage('assistant', 'Command failed:\nEnter an http, https, file, localhost, or project file URL.');
        }
      } else if (text.toLowerCase().includes('pdf') || text.toLowerCase().includes('document artifact')) {
        const path = '/mock/QuillCode/reports/briefing.pdf';
        addToolCard({
          title: 'host.file.write',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({ path, contentType: 'application/pdf' }, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout: `Wrote ${path}\n`, artifacts: [path] }, null, 2)
        });
        addMessage('assistant', 'Created `briefing.pdf`.');
      } else if (text.toLowerCase().includes('appshot')) {
        const path = '/mock/QuillCode/appshots/checkout.appshot.json';
        state.mockFiles[path] = JSON.stringify({
          app: 'QuillCode',
          title: 'Checkout flow',
          viewport: { width: 1440, height: 1000 },
          capturedAt: '2026-06-21T12:00:00Z'
        }, null, 2);
        addToolCard({
          title: 'host.appshot.capture',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({ name: 'checkout', viewport: 'desktop' }, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout: `Captured ${path}\n`, artifacts: [path] }, null, 2)
        });
        addMessage('assistant', 'Captured appshot `checkout.appshot.json`.');
      } else if (text.toLowerCase().includes('write a file') || text.toLowerCase().includes('make a file')) {
        const path = 'hello.txt';
        if (isRemoteProject) {
          const cmd = `printf %s ${shellSingleQuoted('hello world\n')} > ${path}`;
          addToolCard({
            title: 'host.shell.run',
            subtitle: 'Completed',
            status: 'done',
            inputJSON: JSON.stringify({ cmd }, null, 2),
            outputJSON: JSON.stringify({ ok: true, stdout: `ssh ${selectedProject.path}: wrote ${path}\n`, stderr: '', exitCode: 0 }, null, 2)
          });
          addMessage('assistant', `Wrote \`${path}\` on ${selectedProject.name}.`);
        } else {
          state.mockFiles[`/mock/QuillCode/${path}`] = 'hello world\n';
          addToolCard({
            title: 'host.file.write',
            subtitle: 'Completed',
            status: 'done',
            inputJSON: JSON.stringify({ path, content: 'hello world\n' }, null, 2),
            outputJSON: JSON.stringify({ ok: true, stdout: `Wrote /mock/QuillCode/${path}\n`, artifacts: [`/mock/QuillCode/${path}`] }, null, 2)
          });
          addMessage('assistant', `Wrote \`${path}\`.`);
        }
      } else if (text.toLowerCase().includes('screenshot')) {
        const path = '/mock/QuillCode/screenshots/screenshot.png';
        addToolCard({
          title: 'host.computer.screenshot',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: '{}',
          outputJSON: JSON.stringify({ ok: true, stdout: '{"width":1280,"height":720}', artifacts: [path] }, null, 2)
        });
        addMessage('assistant', 'Captured a screenshot (1280 x 720).');
      } else if (text.toLowerCase().includes('apply patch') || text.toLowerCase().includes('edit file')) {
        const { diff, review } = mockReviewDiff();
        state.review = review;
        addToolCard({
          title: 'host.apply_patch',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({
            patch: 'diff --git a/Sources/App.swift b/Sources/App.swift\\n...'
          }, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout: 'Patch applied.\\n' }, null, 2)
        });
        addToolCard({
          title: 'host.git.diff',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({}, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout: diff }, null, 2)
        });
        addMessage('assistant', 'Patch applied. Review the resulting diff below.');
      } else if (text.toLowerCase().includes('git diff')) {
        runGitDiffAction();
        return;
      } else if (text.toLowerCase().includes('git status')) {
        runGitStatusAction();
        return;
      } else if (text.toLowerCase().includes('commit')) {
        const message = text.match(/message[: ]+(.+)$/i)?.[1]?.trim() || 'QuillCode changes';
        state.review = { ...state.review, files: [], subtitle: 'Latest git diff', totalInsertions: 0, totalDeletions: 0, totalHunks: 0 };
        addToolCard({
          title: 'host.git.commit',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({ message }, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout: '[main abc1234] ' + message + '\\n' }, null, 2)
        });
        addMessage('assistant', 'Output:\n[main abc1234] ' + message);
      } else if (text.toLowerCase().includes('how much hd') || text.toLowerCase().includes('disk') || text.toLowerCase().includes('storage')) {
        const cmd = 'df -h / /Quill 2>/dev/null || df -h /';
        const stdout = isRemoteProject
          ? 'Filesystem      Size  Used Avail Use% Mounted on\n/dev/root        62G   11G   51G  18% /\n/dev/nvme0n1p1  916G  42G  828G   5% /Quill\n'
          : 'Filesystem      Size  Used Avail Use% Mounted on\n/dev/mock        80G   12G   68G  15% /mock/QuillCode\n';
        addToolCard({
          title: 'host.shell.run',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({ cmd }, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout, stderr: '', exitCode: 0 }, null, 2)
        });
        addMessage('assistant', isRemoteProject
          ? `${selectedProject.name} storage: / is 18% used; /Quill is 5% used.`
          : 'Workspace storage: 15% used.');
      } else if (text.toLowerCase().includes('openclaw')) {
        const cmd = "command -v openclaw || which openclaw || echo 'not found'";
        const stdout = isRemoteProject ? '/usr/local/bin/openclaw\n' : 'not found\n';
        addToolCard({
          title: 'host.shell.run',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({ cmd }, null, 2),
          outputJSON: JSON.stringify({ ok: true, stdout, stderr: '', exitCode: 0 }, null, 2)
        });
        addMessage('assistant', stdout.includes('not found') ? 'OpenClaw is not installed.' : `OpenClaw is installed at \`${stdout.trim()}\`.`);
      } else if (text.toLowerCase().includes('run') || text.toLowerCase().includes('whoami')) {
        const cmd = text.match(/`([^`]+)`/)?.[1] || text.replace(/^run\s+/i, '') || 'whoami';
        const output = isRemoteProject
          ? remoteTerminalOutput(cmd.trim(), selectedProject.path, {})
          : { stdout: 'mock-user\n', stderr: '', exitCode: 0 };
        state.review = { ...state.review, files: [], subtitle: 'Latest git diff', totalInsertions: 0, totalDeletions: 0, totalHunks: 0 };
        addToolCard({
          title: 'host.shell.run',
          subtitle: 'Completed',
          status: 'done',
          inputJSON: JSON.stringify({ cmd }, null, 2),
          outputJSON: JSON.stringify({ ok: output.exitCode === 0, stdout: output.stdout, stderr: output.stderr || '', exitCode: output.exitCode }, null, 2)
        });
        const answer = cmd.trim() === 'whoami'
          ? `You are \`${isRemoteProject ? 'quill' : 'mock-user'}\` in this workspace.`
          : `Output:\n${output.stdout.trim() || '(no output)'}`;
        addMessage('assistant', answer);
      } else {
        state.review = { ...state.review, files: [], subtitle: 'Latest git diff', totalInsertions: 0, totalDeletions: 0, totalHunks: 0 };
        addMessage('assistant', 'I can inspect and edit this project.');
      }
      syncSelectedThreadSearchText();
      render();
    }

    function retryLastUserTurn() {
      const lastUserMessage = [...state.transcript.messages]
        .reverse()
        .find(message => message.role === 'user' && String(message.text || '').trim());
      if (!lastUserMessage) return;
      sendMessage(lastUserMessage.text);
    }

    function addReviewComment(path, text) {
      const trimmed = (text || '').trim();
      if (!path || !trimmed) return;
      const file = state.review.files.find(file => file.path === path);
      if (!file) return;
      file.comments = file.comments || [];
      file.comments.push({ id: crypto.randomUUID(), path, text: trimmed });
      render();
    }

    function addReviewLineComment(path, lineNumber, lineKind, text) {
      const trimmed = (text || '').trim();
      if (!path || !lineNumber || !trimmed) return;
      const file = state.review.files.find(file => file.path === path);
      if (!file) return;
      const line = (file.hunks || [])
        .flatMap(hunk => hunk.lines || [])
        .find(line => line.lineNumber === lineNumber && line.kind === lineKind);
      if (!line) return;
      line.comments = line.comments || [];
      line.comments.push({ id: crypto.randomUUID(), path, lineNumber, lineKind, text: trimmed });
      render();
    }

    function addReviewRangeComment(path, start, end, text) {
      const trimmed = (text || '').trim();
      if (!path || !start || !end || !trimmed) return;
      const file = state.review.files.find(file => file.path === path);
      if (!file) return;
      const lower = Math.min(start, end);
      const upper = Math.max(start, end);
      const lines = (file.hunks || []).flatMap(hunk => hunk.lines || []);
      const startLine = lines.find(line => line.lineNumber === lower);
      const hasFullRange = Array.from({ length: upper - lower + 1 }, (_, index) => lower + index)
        .every(lineNumber => lines.some(line => line.lineNumber === lineNumber));
      if (!startLine || !hasFullRange) return;
      startLine.comments = startLine.comments || [];
      startLine.comments.push({
        id: crypto.randomUUID(),
        path,
        lineNumber: lower,
        endLineNumber: upper,
        text: trimmed
      });
      render();
    }

    function runReviewAction(action, path) {
      if (!path) return;
      const toolMap = {
        restore: 'host.git.restore',
        stage_hunk: 'host.git.stage_hunk',
        restore_hunk: 'host.git.restore_hunk'
      };
      const toolName = toolMap[action] || 'host.git.stage';
      state.topBar.agentStatus = 'Running';
      addToolCard({
        title: toolName,
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ path }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: '' }, null, 2)
      });
      addToolCard({
        title: 'host.git.diff',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({}, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: '' }, null, 2)
      });
      state.review = {
        title: 'Review changes',
        subtitle: 'Latest git diff',
        totalInsertions: 0,
        totalDeletions: 0,
        totalHunks: 0,
        files: []
      };
      state.topBar.agentStatus = 'Idle';
      render();
    }

    function shortcutMatches(event, shortcut) {
      if (!shortcut) return false;
      const parts = shortcut.split('+').map(part => part.trim().toLowerCase()).filter(Boolean);
      const key = parts.at(-1);
      const requiresCmd = parts.includes('cmd');
      const requiresCtrl = parts.includes('ctrl');
      const requiresShift = parts.includes('shift');
      const requiresOption = parts.includes('option');
      const eventKey = event.key === 'Escape' ? 'esc' : event.key.toLowerCase();
      return event.metaKey === requiresCmd
        && event.ctrlKey === requiresCtrl
        && event.shiftKey === requiresShift
        && event.altKey === requiresOption
        && eventKey === key;
    }

    document.addEventListener('keydown', event => {
      if (handleCommandPaletteKeydown(event)) return;
      updateDynamicCommands();
      const command = state.commands.find(candidate => (
        candidate.isEnabled && shortcutMatches(event, candidate.shortcut)
      ));
      if (!command) return;
      event.preventDefault();
      runCommand(command.id);
    });

    render();
  </script>
</body>
