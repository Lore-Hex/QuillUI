      }));
    }

    function transcriptTimelineItems() {
      if (state.transcript.timelineItems.length) return state.transcript.timelineItems;
      return [
        ...state.transcript.messages.map(message => ({ id: message.id || `message-${message.text}`, kind: 'message', message })),
        ...state.transcript.toolCards.map(card => ({ id: card.id, kind: 'toolCard', toolCard: card }))
      ];
    }

    function copyTranscriptItem(timelineID) {
      const item = transcriptTimelineItems().find(entry => entry.id === timelineID);
      const text = item ? transcriptCopyText(item) : '';
      if (!text.trim()) return;
      navigator.clipboard?.writeText(text).catch(() => {});
      state.copiedTranscriptItemID = timelineID;
      render();
      setTimeout(() => {
        if (state.copiedTranscriptItemID === timelineID) {
          state.copiedTranscriptItemID = null;
          render();
        }
      }, 1500);
    }

    function transcriptCopyText(item) {
      if (item.kind === 'message') {
        return item.message?.text || '';
      }
      const card = item.toolCard || {};
      return card.outputJSON || card.inputJSON || [card.title, card.subtitle].filter(Boolean).join('\n');
    }

    function setMessageFeedback(messageID, value) {
      if (!messageID || !value) return;
      const message = state.transcript.messages.find(entry => entry.id === messageID && entry.role === 'assistant');
      if (!message) return;
      message.feedback = value;
      state.transcript.timelineItems = state.transcript.timelineItems.map(item => {
        if (item.kind !== 'message' || item.message?.id !== messageID) return item;
        return { ...item, message: { ...item.message, feedback: value } };
      });
      render();
    }

    function useMessageAsDraft(messageID) {
      if (!messageID) return;
      const message = state.transcript.messages.find(entry => entry.id === messageID && entry.role === 'user');
      if (!message) return;
      state.composer.draft = message.text || '';
      state.composer.canSend = state.composer.draft.trim().length > 0;
      state.composer.slashActiveIndex = 0;
      render();
      focusComposerAtDraftEnd();
    }

    function focusComposerAtDraftEnd() {
      const input = document.querySelector('[data-testid="composer"] textarea');
      input?.focus();
      input?.setSelectionRange(state.composer.draft.length, state.composer.draft.length);
      resizeComposerInput(input);
    }

    function transcriptTimelineSearchText(item) {
      if (item.kind === 'message') {
        return [item.message?.role, item.message?.text].filter(Boolean).join('\n');
      }
      const card = item.toolCard || {};
      return [
        card.title,
        card.subtitle,
        card.inputJSON,
        card.outputJSON,
        ...(card.artifacts || []).map(artifact => artifact.label)
      ].filter(Boolean).join('\n');
    }

    function renderFindBar(matches) {
      const query = state.find.query.trim();
      const status = !query
        ? 'Type to find'
        : matches.length
          ? `${Math.min(state.find.activeIndex + 1, matches.length)} of ${matches.length}`
          : 'No results';
      return `
        <form class="find-bar" data-testid="find-bar" aria-label="Find in chat">
          <span>⌕</span>
          <input data-testid="find-input" aria-label="Find in chat" placeholder="Find in chat" value="${escapeHTML(state.find.query)}" autofocus>
          <small class="find-status" data-testid="find-status">${escapeHTML(status)}</small>
          <button type="button" data-testid="find-previous" ${matches.length ? '' : 'disabled'}>↑</button>
          <button type="button" data-testid="find-next" ${matches.length ? '' : 'disabled'}>↓</button>
          <button type="button" data-testid="find-close" aria-label="Close find">×</button>
        </form>`;
    }

    function renderSlashSuggestions() {
      const suggestions = slashSuggestions(state.composer.draft);
      if (!suggestions.length) return '';
      clampSlashActiveIndex(suggestions);
      const rows = suggestions.map((suggestion, index) => `
        <button
          class="slash-suggestion ${index === state.composer.slashActiveIndex ? 'selected' : ''}"
          type="button"
          data-testid="slash-suggestion"
          data-insert-text="${escapeHTML(suggestion.insertText)}"
          data-selected="${index === state.composer.slashActiveIndex ? 'true' : 'false'}"
        >
          <span class="slash-usage">${escapeHTML(suggestion.usage)}</span>
          <span>
            <span class="slash-title">${escapeHTML(suggestion.title)}</span>
            <span class="slash-detail">${escapeHTML(suggestion.detail)}</span>
          </span>
        </button>
      `).join('');
      return `
        <section class="slash-suggestions" data-testid="slash-suggestions" aria-label="Slash commands">
          <h3>Slash commands</h3>
          <div class="slash-suggestion-list">${rows}</div>
        </section>`;
    }

    function renderCommandPalette() {
      ensureCommandPaletteSelection();
      const groups = commandPaletteGroups();
      const hasResults = groups.some(group => group.commands.length);
      const request = commandPaletteRequest();
      const scopeLabel = request.scope === 'slash' ? 'Slash' : request.scope === 'actions' ? 'Actions' : '';
      return `
        <div class="search-panel" data-testid="command-palette-panel">
          <section class="search-card" role="dialog" aria-label="Command palette">
            <header>
              <div>
                <h2>Command palette</h2>
                <p>Run actions, or type / to insert slash commands.</p>
              </div>
              <button type="button" data-testid="command-palette-close">Close</button>
            </header>
            <div class="command-palette-input-row">
              <input data-testid="command-palette-input" aria-label="Search commands" placeholder="Search commands, > actions, / slash" value="${escapeHTML(state.commandPalette.query)}" autofocus>
              ${scopeLabel ? `<span class="command-scope-badge" data-testid="command-palette-scope">${escapeHTML(scopeLabel)}</span>` : '<span class="command-palette-legend">&gt; actions · / slash</span>'}
            </div>
            <div class="search-results" data-testid="command-palette-results">
              ${hasResults ? groups.map(group => `
                <div class="command-group" data-testid="command-palette-group">
                  <div class="command-group-title">${escapeHTML(group.category)}</div>
                  ${group.commands.map(command => `
                    <button class="search-result ${command.id === state.commandPalette.selectedCommandID ? 'selected' : ''}" type="button" data-testid="command-palette-result" data-command-id="${escapeHTML(command.id)}" data-selected="${command.id === state.commandPalette.selectedCommandID ? 'true' : 'false'}" ${command.isEnabled ? '' : 'disabled'}>
                      <span>${escapeHTML(command.title)}</span>
                      <small>${escapeHTML([command.shortcut, ...(command.keywords || []).slice(0, 3)].filter(Boolean).join(' · '))}</small>
                    </button>`).join('')}
                </div>`).join('') : '<p data-testid="command-palette-empty">No matching commands</p>'}
            </div>
          </section>
        </div>`;
    }

    function renderKeyboardShortcutsPanel() {
      const shortcutCommands = state.commands.filter(command => command.shortcut);
      const groups = new Map();
      for (const command of shortcutCommands) {
        if (!groups.has(command.category)) groups.set(command.category, []);
        groups.get(command.category).push(command);
      }
      const categoryOrder = ['Thread', 'Navigation', 'Workspace', 'Memories', 'Extensions', 'Git', 'Environment', 'Control', 'Computer Use'];
      const sortedCategories = [...groups.keys()].sort((a, b) => {
        const rankA = categoryOrder.includes(a) ? categoryOrder.indexOf(a) : categoryOrder.length;
        const rankB = categoryOrder.includes(b) ? categoryOrder.indexOf(b) : categoryOrder.length;
        if (rankA !== rankB) return rankA - rankB;
        return a.localeCompare(b);
      });
      return `
        <div class="search-panel" data-testid="keyboard-shortcuts-panel">
          <section class="search-card" role="dialog" aria-label="Keyboard shortcuts">
            <header>
              <div>
                <h2>Keyboard shortcuts</h2>
                <p>Fast paths for the workspace actions available right now.</p>
              </div>
              <button type="button" data-testid="keyboard-shortcuts-close">Close</button>
            </header>
            <div class="search-results" data-testid="keyboard-shortcuts-list">
              ${sortedCategories.map(category => `
                <div class="command-group" data-testid="keyboard-shortcuts-group">
                  <div class="command-group-title">${escapeHTML(category)}</div>
                  ${groups.get(category).map(command => `
                    <article class="search-result shortcut-row" data-testid="keyboard-shortcut-row" data-command-id="${escapeHTML(command.id)}">
                      <span>${escapeHTML(command.title)}</span>
                      <kbd>${escapeHTML(command.shortcut)}</kbd>
                    </article>`).join('')}
                </div>`).join('')}
            </div>
          </section>
        </div>`;
    }

    function terminalStatus(entry) {
      return entry.status || (entry.ok ? 'done' : 'failed');
    }

    function terminalStatusLabel(entry) {
      const status = terminalStatus(entry);
      if (status === 'running') return 'Running';
      if (status === 'done') return 'Done';
      if (status === 'stopped') return 'Stopped';
      return 'Failed';
    }

    function terminalExitLabel(entry) {
      const status = terminalStatus(entry);
      if (status === 'running') return 'running';
      if (status === 'stopped') return 'stopped';
      return entry.exitCode == null ? 'exit unknown' : `exit ${entry.exitCode}`;
    }

    function terminalStatusClass(entry) {
      const status = terminalStatus(entry);
      if (status === 'done') return 'ok';
      if (status === 'running') return 'running';
      if (status === 'stopped') return 'stopped';
      return 'failed';
    }

    function activitySummary() {
      const messages = state.transcript.messages || [];
      const cards = state.transcript.toolCards || [];
      const selectedThread = state.sidebar.items.find(item => item.id === state.sidebar.selectedThreadID);
      const latestUser = [...messages].reverse().find(message => message.role === 'user');
      const latestAssistant = [...messages].reverse().find(message => message.role === 'assistant');
      const artifacts = uniqueBy(
        cards.flatMap(card => card.artifacts || []),
        artifact => artifact.value || artifact.label || ''
      ).slice(-8);
      const tools = cards.slice(-8).map(card => ({
        id: card.id,
        title: card.title,
        detail: card.subtitle,
        statusLabel: card.status
      }));
      const steps = state.transcript.timelineItems.slice(-8).map(item => {
        if (item.kind === 'toolCard') {
          const card = item.toolCard;
          return {
            id: item.id,
            title: card.title,
            detail: card.subtitle,
            statusLabel: card.status
          };
        }
        return {
          id: item.id,
          title: item.message.role === 'user' ? 'User message' : 'Assistant message',
          detail: item.message.text,
          statusLabel: 'Logged'
        };
      });
      const sources = [
        { id: 'instruction-AGENTS.md', title: 'AGENTS.md', detail: '.quillcode/AGENTS.md', statusLabel: 'rules' },
        ...state.memories.items.slice(0, 4).map(memory => ({
          id: `memory-${memory.id}`,
          title: memory.title,
          detail: memory.relativePath,
          statusLabel: memory.scopeLabel
        }))
      ];
      const planItems = state.activity.authoredPlan || activityPlan({
        latestRequest: latestUser ? latestUser.text : 'No task selected',
        status: state.topBar.agentStatus,
        tools,
        sources,
        artifacts,
        finalAnswer: latestAssistant?.text || null
      });
      return {
        subtitle: `${countLabel(cards.length, 'tool')} · ${countLabel(sources.length, 'source')} · ${countLabel(artifacts.length, 'artifact')}`,
        statusLabel: state.topBar.agentStatus,
        taskTitle: latestUser ? latestUser.text : 'No task selected',
        taskSubtitle: `${messages.length} ${messages.length === 1 ? 'message' : 'messages'} · ${state.transcript.timelineItems.length} timeline ${state.transcript.timelineItems.length === 1 ? 'item' : 'items'}`,
        steps,
        tools,
        sources,
        artifacts,
        finalAnswer: latestAssistant?.text || null,
        sections: activitySections({
          steps,
          tools,
          sources,
          artifacts,
          finalAnswer: latestAssistant?.text || null,
          planItems,
          handoffSummary: handoffSummary({
            threadTitle: selectedThread?.title || 'No task selected',
            latestRequest: latestUser ? latestUser.text : 'No task selected',
            status: state.topBar.agentStatus,
            tools: cards,
            sources,
            artifacts,
            finalAnswer: latestAssistant?.text || null
          })
        })
      };
    }

    function activitySections(activity) {
      const collapsed = new Set(state.activity.collapsedSections || []);
      const section = (id, title, itemTestID, emptyTitle, values) => ({
        id,
        title,
        itemTestID,
        emptyTitle,
        isCollapsed: collapsed.has(id),
        commandID: `activity-toggle-section:${id}`,
        ...values
      });
      return [
        section('plan', 'Task Plan', 'activity-plan', 'No plan yet', {
          items: activity.planItems,
          countLabel: countLabel(activity.planItems.length, 'item')
        }),
        section('recent', 'Recent', 'activity-step', 'No task events yet', {
          items: activity.steps,
          countLabel: countLabel(activity.steps.length, 'item')
        }),
        section('handoff', 'Handoff Summary', 'activity-handoff', '', {
          bodyText: activity.handoffSummary,
          countLabel: activity.handoffSummary ? '1 summary' : '0 summaries'
        }),
        section('tools', 'Tools', 'activity-tool', 'No tools used yet', {
          items: activity.tools,
          countLabel: countLabel(activity.tools.length, 'item')
        }),
        section('sources', 'Sources', 'activity-source', 'No context sources attached', {
          items: activity.sources,
          countLabel: countLabel(activity.sources.length, 'item')
        }),
        section('artifacts', 'Artifacts', 'activity-artifact', 'No artifacts produced yet', {
          artifacts: activity.artifacts,
          countLabel: countLabel(activity.artifacts.length, 'artifact')
        }),
        section('latestAnswer', 'Latest Answer', 'activity-final-answer', '', {
          bodyText: activity.finalAnswer,
          countLabel: activity.finalAnswer ? '1 answer' : '0 answers'
        })
      ].filter(section => (section.id !== 'latestAnswer' && section.id !== 'handoff') || section.bodyText);
    }

    function activityPlan(activity) {
      const hasRequest = activity.latestRequest && activity.latestRequest !== 'No task selected';
      const hasFailedTool = activity.tools.some(tool => String(tool.statusLabel || '').toLowerCase() === 'failed');
      const hasDoneTool = activity.tools.some(tool => String(tool.statusLabel || '').toLowerCase() === 'done');
      const finalAnswer = activity.finalAnswer || '';
      const reviewStatus = hasFailedTool ? 'Review' : (finalAnswer || hasDoneTool ? 'Done' : 'Pending');
      const reviewDetail = hasFailedTool
        ? 'One or more tool calls failed and needs attention.'
        : (finalAnswer || hasDoneTool
          ? (activity.artifacts.length ? `Reviewed ${countLabel(activity.artifacts.length, 'artifact')}.` : 'Reviewed completed tool results.')
          : 'Waiting for tool output or a final answer.');
      return [
        {
          id: 'plan-request',
          title: 'Understand request',
          detail: hasRequest ? boundedLine(activity.latestRequest, 120) : 'Waiting for the first user request.',
          statusLabel: hasRequest ? 'Done' : 'Pending'
        },
        {
          id: 'plan-context',
          title: 'Load context',
          detail: activity.sources.length ? `${countLabel(activity.sources.length, 'source')} attached.` : 'No instruction or memory sources attached.',
          statusLabel: activity.sources.length ? 'Done' : 'Optional'
        },
        {
          id: 'plan-tools',
          title: 'Use tools',
          detail: toolPlanDetail(activity.tools),
          statusLabel: aggregateToolStatus(activity.tools)
        },
        {
          id: 'plan-review',
          title: 'Review results',
          detail: reviewDetail,
          statusLabel: reviewStatus
        },
        {
          id: 'plan-answer',
          title: 'Answer user',
          detail: finalAnswer ? boundedLine(finalAnswer, 140) : 'Waiting for the final assistant response.',
          statusLabel: finalAnswer ? 'Done' : (isActiveStatus(activity.status) ? 'Running' : 'Pending')
        }
      ];
    }

    function aggregateToolStatus(tools) {
      if (!tools.length) return 'Optional';
      const statuses = tools.map(tool => String(tool.statusLabel || '').toLowerCase());
      if (statuses.includes('failed')) return 'Failed';
      if (statuses.includes('running')) return 'Running';
      if (statuses.includes('queued') || statuses.includes('review')) return 'Queued';
      return 'Done';
    }

    function toolPlanDetail(tools) {
      if (!tools.length) return 'No tool use needed yet.';
      const names = tools.slice(-3).map(tool => tool.title).join(', ');
      return `${countLabel(tools.length, 'tool')}: ${names}`;
    }

    function isActiveStatus(status) {
      const normalized = String(status || '').toLowerCase();
      return normalized.includes('running')
        || normalized.includes('streaming')
        || normalized.includes('queued')
        || normalized.includes('terminal');
    }

    function handoffSummary(activity) {
      const toolNames = activity.tools.slice(-4).map(tool => tool.title);
      const artifactNames = activity.artifacts.slice(-4).map(artifact => artifact.label);
      const lines = [
        `Thread: ${boundedLine(activity.threadTitle, 80)}`,
        `Latest request: ${boundedLine(activity.latestRequest, 96)}`,
        `Status: ${activity.status}`,
        `Tools: ${countSummary(activity.tools.length, 'tool', toolNames)}`,
        `Sources: ${countLabel(activity.sources.length, 'source')}`,
        `Artifacts: ${countSummary(activity.artifacts.length, 'artifact', artifactNames)}`
      ];
      if (activity.finalAnswer) {
        lines.push(`Latest answer: ${boundedLine(activity.finalAnswer, 160)}`);
      }
      return lines.join('\n');
    }

    function countSummary(count, singular, details) {
      if (!count) return 'none';
      const label = countLabel(count, singular);
      return details.length ? `${label} (${details.join(', ')})` : label;
    }

    function boundedLine(value, limit) {
      const normalized = String(value || '')
        .split(/\\r?\\n/)
        .map(part => part.trim())
        .filter(Boolean)
        .join(' ');
      return normalized.length > limit ? `${normalized.slice(0, limit)}...` : normalized;
    }

    function uniqueBy(items, keyForItem) {
      const seen = new Set();
      return items.filter(item => {
        const key = keyForItem(item);
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function renderActivityPane() {
      const activity = activitySummary();
      return `
        <section class="activity-pane" data-testid="activity-pane" aria-label="Task activity">
          <header>
            <div>
              <strong data-testid="activity-title">Activity</strong>
              <p data-testid="activity-subtitle">${escapeHTML(activity.subtitle)}</p>
            </div>
            <span data-testid="activity-status">${escapeHTML(activity.statusLabel)}</span>
          </header>
          <article class="activity-task" data-testid="activity-task">
            <strong data-testid="activity-task-title">${escapeHTML(activity.taskTitle)}</strong>
            <p data-testid="activity-task-subtitle">${escapeHTML(activity.taskSubtitle)}</p>
          </article>
          ${activity.sections.map(renderActivitySection).join('')}
        </section>`;
    }

    function renderActivitySection(section) {
      let content = '';
      if (!section.isCollapsed) {
        if (section.bodyText) {
          content = `<p data-testid="${section.itemTestID}">${escapeHTML(section.bodyText)}</p>`;
        } else if (section.artifacts?.length) {
          content = section.artifacts.map(artifact => `
            <article class="activity-artifact" data-testid="${section.itemTestID}">
              <strong>${escapeHTML(artifact.label)}</strong>
              <p>${escapeHTML(artifact.detail)}</p>
            </article>`).join('');
        } else if (section.items?.length) {
          content = section.items.map(item => `
            <article class="activity-item" data-testid="${section.itemTestID}">
              <strong>${escapeHTML(item.title)}</strong>
              <span>${escapeHTML(item.statusLabel || '')}</span>
              <p>${escapeHTML(item.detail || '')}</p>
            </article>`).join('');
        } else {
          content = `<p data-testid="${section.itemTestID}-empty">${escapeHTML(section.emptyTitle)}</p>`;
        }
      }
      return `
        <section class="activity-section" data-testid="${section.itemTestID}-section" data-collapsed="${section.isCollapsed ? 'true' : 'false'}">
          <button type="button" data-testid="activity-section-toggle" data-command-id="${escapeHTML(section.commandID)}">
            <span>${section.isCollapsed ? '&gt;' : 'v'} ${escapeHTML(section.title)}</span>
            <span>${escapeHTML(section.countLabel)}</span>
          </button>
          ${content}
        </section>`;
    }

    function renderTerminalPane() {
      const entries = state.terminal.entries.length ? state.terminal.entries.map(entry => `
        <article class="terminal-entry" data-testid="terminal-entry"${entry.executionContext ? ` data-execution-context="${escapeHTML(entry.executionContext.kind)}"` : ''}>
          <header>
            <span class="terminal-command-row">
              <code>$ ${escapeHTML(entry.command)}</code>
              ${renderExecutionContextChip(entry.executionContext, 'terminal-execution-context')}
            </span>
            <span class="terminal-status ${terminalStatusClass(entry)}" data-testid="terminal-status">
              ${terminalStatusLabel(entry)} · ${terminalExitLabel(entry)}
            </span>
          </header>
          ${entry.stdout ? `<pre data-testid="terminal-stdout">${escapeHTML(entry.stdout)}</pre>` : ''}
          ${entry.stderr ? `<pre data-testid="terminal-stderr">${escapeHTML(entry.stderr)}</pre>` : ''}
        </article>`).join('') : '<p data-testid="terminal-empty">Run commands in this project without leaving QuillCode.</p>';
      return `
        <section class="terminal-pane" data-testid="terminal-pane">
          <header>
            <strong>Terminal</strong>
            <code data-testid="terminal-cwd">${escapeHTML(state.terminal.cwdLabel)}</code>
            <button type="button" data-testid="terminal-clear" ${state.terminal.entries.length && !state.terminal.isRunning ? '' : 'disabled'}>Clear</button>
            ${state.terminal.isRunning ? '<button type="button" data-testid="terminal-stop">Stop</button>' : ''}
          </header>
          <div class="terminal-history" data-testid="terminal-history">${entries}</div>
          <form class="terminal-form" data-testid="terminal-form">
            <code>$</code>
            <input data-testid="terminal-input" aria-label="Terminal command" placeholder="Run command" value="${escapeHTML(state.terminal.draft)}" ${state.terminal.isRunning ? 'disabled' : ''}>
            <button type="submit" data-testid="terminal-run" ${state.terminal.draft.trim() && !state.terminal.isRunning ? '' : 'disabled'}>Run</button>
          </form>
        </section>`;
	    }

	    function renderBrowserPane() {
        const snapshot = state.browser.snapshot ? `
          <div class="browser-snapshot" data-testid="browser-snapshot">
            <div class="browser-snapshot-badges">
              <span data-testid="browser-source">${escapeHTML(state.browser.snapshot.sourceLabel)}</span>
              <span data-testid="browser-inspection-depth" data-depth="${escapeHTML(state.browser.snapshot.inspectionDepth)}">${escapeHTML(state.browser.snapshot.inspectionDepthLabel)}</span>
            </div>
            <p data-testid="browser-snapshot-summary">${escapeHTML(state.browser.snapshot.summary)}</p>
            <ul>${state.browser.snapshot.details.map(detail => `<li data-testid="browser-snapshot-detail">${escapeHTML(detail)}</li>`).join('')}</ul>
            ${state.browser.snapshot.outline?.length ? `<ol data-testid="browser-snapshot-outline">${state.browser.snapshot.outline.map(item => `<li data-testid="browser-snapshot-outline-item">${escapeHTML(item)}</li>`).join('')}</ol>` : ''}
            ${state.browser.snapshot.textSnippet ? `<p data-testid="browser-snapshot-text">${escapeHTML(state.browser.snapshot.textSnippet)}</p>` : ''}
          </div>` : '';
	      const preview = state.browser.currentURL ? `
	        <div class="browser-preview" data-testid="browser-preview">
	          <strong data-testid="browser-title">${escapeHTML(state.browser.title)}</strong>
	          <code data-testid="browser-current-url">${escapeHTML(state.browser.currentURL)}</code>
            ${snapshot}
	        </div>` : `
	        <div class="browser-preview" data-testid="browser-empty">
	          <strong>Open a localhost, file, or web page inside QuillCode.</strong>
	          <p>Use browser comments to keep observations attached to the current page.</p>
	        </div>`;
	      const comments = state.browser.comments.map(comment => `
	        <article class="browser-comment" data-testid="browser-comment">
	          <p>${escapeHTML(comment.text)}</p>
	          <small>${escapeHTML(comment.url)}</small>
	        </article>`).join('');
	      return `
	        <section class="browser-pane" data-testid="browser-pane">
	          <header>
	            <strong>Browser</strong>
	            <span data-testid="browser-status-label">${escapeHTML(state.browser.statusLabel)}</span>
	          </header>
	          <form class="browser-form" data-testid="browser-form">

    function compactContext() {
      if (!state.sidebar.selectedThreadID || !state.transcript.messages.length) return;
      const source = state.sidebar.items.find(item => item.id === state.sidebar.selectedThreadID);
      const title = `Compact: ${source?.title || 'Chat'}`;
      const latestUserIndex = state.transcript.messages
        .map((message, index) => ({ message, index }))
        .filter(entry => entry.message.role === 'user')
        .at(-1)?.index ?? Math.max(0, state.transcript.messages.length - 4);
      const recentMessages = state.transcript.messages.slice(latestUserIndex, latestUserIndex + 4);
      const olderMessages = state.transcript.messages.slice(0, latestUserIndex);
      const summaryLines = [
        `Context compacted from "${source?.title || 'Chat'}".`,
        `Kept ${recentMessages.length} latest message${recentMessages.length === 1 ? '' : 's'} and summarized ${olderMessages.length} earlier message${olderMessages.length === 1 ? '' : 's'}.`
      ];
      if (olderMessages.length) {
        summaryLines.push('Earlier context:');
        olderMessages.slice(-6).forEach(message => {
          summaryLines.push(`- ${message.role}: ${String(message.text || '').replace(/\s+/g, ' ').trim().slice(0, 180)}`);
        });
      } else {
        summaryLines.push('No earlier turns were dropped.');
      }
      summaryLines.push('Continue from the preserved latest turn below.');

      const compactedMessages = [
        { id: `message-${state.nextTimelineIndex++}`, role: 'assistant', text: summaryLines.join('\n') },
        ...recentMessages
      ];
      const threadID = `thread-${state.nextThreadIndex++}`;

      state.sidebar.selectedThreadID = threadID;
      state.sidebar.items = [{
        id: threadID,
        title,
        subtitle: state.topBar.modelLabel,
        searchText: compactedMessages.map(message => message.text).join('\n'),
        updatedAt: new Date().toISOString(),
        isSelected: true,
        isPinned: false,
        isArchived: false
      }, ...state.sidebar.items.map(item => ({ ...item, isSelected: false }))];
      state.transcript.messages = compactedMessages;
      state.transcript.toolCards = [];
      state.transcript.timelineItems = compactedMessages.map(message => ({
        id: `timeline-${state.nextTimelineIndex++}`,
        kind: 'message',
        message
      }));
      state.review = {
        title: 'Review changes',
        subtitle: 'Latest git diff',
        totalInsertions: 0,
        totalDeletions: 0,
        totalHunks: 0,
        files: []
      };
      state.topBar.primaryTitle = title;
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      state.topBar.subtitle = `${selectedProject?.name || 'No project'} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
      render();
    }

    function addSSHProject(address) {
      const match = String(address).trim().match(/^(?:ssh:\/\/)?(?:(?<user>[^@/:]+)@)?(?<host>[^/:]+)(?::(?<port>\d+))?[:/](?<path>\/?[^\s]*)$/);
      if (!match?.groups?.host || !match.groups.path) {
        addMessage('assistant', 'Use SSH format user@host:/path or ssh://user@host/path.');
        return;
      }
      const host = match.groups.host;
      const remotePath = match.groups.path.startsWith('/') ? match.groups.path : `/${match.groups.path}`;
      const label = `ssh://${match.groups.user ? `${match.groups.user}@` : ''}${host}${match.groups.port ? `:${match.groups.port}` : ''}${remotePath}`;
      const project = {
        id: `project-${state.nextProjectIndex++}`,
        name: `${host} · ${remotePath.split('/').filter(Boolean).pop() || 'remote'}`,
        path: label,
        connectionKindLabel: 'SSH Remote',
        isRemote: true,
        isSelected: true
      };
      state.projects.selectedProjectID = project.id;
      state.projects.items = [
        project,
        ...state.projects.items.map(item => ({ ...item, isSelected: false }))
      ];
      state.terminal.cwdLabel = label;
      state.terminal.environment = {};
      state.topBar.subtitle = `${project.name} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
      addMessage('assistant', `Added SSH Remote ${project.name} at ${label}. Terminal commands, read-only git status/diff, and project context refresh run through SSH; file tools and mutating git actions remain local-only for now.`);
      render();
    }

    function selectProject(projectID) {
      state.projects.selectedProjectID = projectID;
      state.projects.items = state.projects.items.map(project => ({
        ...project,
        isSelected: project.id === projectID
      }));
      const project = state.projects.items.find(project => project.id === projectID);

    function followUpDelayDescription(seconds) {
      if (seconds % 86400 === 0) {
        const days = seconds / 86400;
        return days === 1 ? 'In 1 day' : `In ${days} days`;
      }
      if (seconds % 3600 === 0) {
        const hours = seconds / 3600;
        return hours === 1 ? 'In 1 hour' : `In ${hours} hours`;
      }
      if (seconds % 60 === 0) {
        const minutes = seconds / 60;
        return minutes === 1 ? 'In 1 minute' : `In ${minutes} minutes`;
      }
      return `In ${seconds} seconds`;
    }

    function clockDescription(hour, minute) {
      const hour12 = hour % 12 === 0 ? 12 : hour % 12;
      const meridiem = hour < 12 ? 'AM' : 'PM';
      return `${hour12}:${String(minute).padStart(2, '0')} ${meridiem}`;
    }

    function parseFollowUpClock(value) {
      let text = String(value).toLowerCase().replaceAll('.', '').replaceAll(' ', '');
      let meridiem = null;
      if (text.endsWith('am')) {
        meridiem = 'am';
        text = text.slice(0, -2);
      } else if (text.endsWith('pm')) {
        meridiem = 'pm';
        text = text.slice(0, -2);
      }
      const pieces = text.split(':');
      if (pieces.length < 1 || pieces.length > 2) return null;
      const rawHour = Number(pieces[0]);
      if (!Number.isInteger(rawHour) || rawHour < 0 || rawHour > 23) return null;
      const minute = pieces.length === 2 ? Number(pieces[1]) : 0;
      if (!Number.isInteger(minute) || minute < 0 || minute > 59) return null;
      if (pieces.length === 2 && !/^\d{2}$/.test(pieces[1])) return null;
      let hour = rawHour;
      if (meridiem === 'pm' && hour < 12) hour += 12;
      if (meridiem === 'am' && hour === 12) hour = 0;
      return hour < 24 ? { hour, minute } : null;
    }

    function recurrenceSchedule(value) {
      if (value === 'hourly' || value === 'every hour') return { label: 'Every hour', isRecurring: true };
      if (value === 'daily' || value === 'every day') return { label: 'Every day', isRecurring: true };
      if (value === 'weekly' || value === 'every week') return { label: 'Every week', isRecurring: true };
      if (!value.startsWith('every ')) return null;
      const tokens = value.slice('every '.length).split(/\s+/).filter(Boolean);
      const unitLabel = (unit, amount) => {
        if (/^(m|min|mins|minute|minutes)$/.test(unit)) return amount === 1 ? 'minute' : 'minutes';
        if (/^(h|hr|hrs|hour|hours)$/.test(unit)) return amount === 1 ? 'hour' : 'hours';
        if (/^(d|day|days)$/.test(unit)) return amount === 1 ? 'day' : 'days';
        if (/^(w|wk|wks|week|weeks)$/.test(unit)) return amount === 1 ? 'week' : 'weeks';
        return null;
      };
      if (tokens.length === 1) {
        const label = unitLabel(tokens[0], 1);
        return label ? { label: `Every ${label}`, isRecurring: true } : null;
      }
      const amount = Number(tokens[0]);
      if (!Number.isInteger(amount) || amount <= 0) return null;
      const label = unitLabel(tokens[1], amount);
      return label ? { label: `Every ${amount} ${label}`, isRecurring: true } : null;
    }

    function naturalFollowUpSchedule(value) {
      const normalized = String(value)
        .toLowerCase()
        .replaceAll('-', ' ')
        .replaceAll('_', ' ')
        .trim()
        .replace(/[.!?]+$/, '');
      const recurrence = recurrenceSchedule(normalized);
      if (recurrence) return recurrence;
      const relative = normalized.match(/^(?:in\s+)?(\d+)\s*(s|sec|secs|second|seconds|m|min|mins|minute|minutes|h|hr|hrs|hour|hours|d|day|days)\b/);
      if (relative) {
        const amount = Number(relative[1]);
        const unit = relative[2];
        const multiplier = unit.startsWith('s') ? 1
          : unit.startsWith('m') ? 60
            : unit.startsWith('h') ? 3600
              : 86400;
        return amount > 0 ? { label: followUpDelayDescription(amount * multiplier), isRecurring: false } : null;
      }
      if (normalized === 'tomorrow') {
        return { label: 'Tomorrow at 9:00 AM', isRecurring: false };
      }
      if (normalized.startsWith('tomorrow ')) {
        const remainder = normalized.slice('tomorrow'.length).trim();
        if (remainder === 'morning') return { label: 'Tomorrow at 9:00 AM', isRecurring: false };
        if (remainder === 'afternoon') return { label: 'Tomorrow at 1:00 PM', isRecurring: false };
        if (remainder === 'evening') return { label: 'Tomorrow at 5:00 PM', isRecurring: false };
        const clock = parseFollowUpClock(remainder.replace(/^at\s+/, '').replace(/^around\s+/, ''));
        return clock ? { label: `Tomorrow at ${clockDescription(clock.hour, clock.minute)}`, isRecurring: false } : null;
      }
      return null;
    }

          id: `timeline-${state.nextTimelineIndex++}`,

        state.topBar.primaryTitle = title;

          candidate.id === id ? {

            statusLabel: workflow.isRecurring ? 'Active' : 'Ran',

        state.automations.isVisible = true;

      const threadID = `thread-${state.nextThreadIndex++}`;

    function setMCPStatus(id, status) {

    function runTerminalCommand() {
      const command = state.terminal.draft.trim();
      if (!command || state.terminal.isRunning) return;
      state.terminal.draft = '';
      state.terminal.historyCursor = null;
      state.terminal.historyDraft = null;
      state.terminal.isVisible = true;
      state.terminal.isRunning = true;
      const cwd = state.terminal.cwdLabel;
      const entry = {
        command,
        stdout: '',
        stderr: '',
        exitCode: null,
        ok: false,
        status: 'running',
        executionContext: executionContextForCWD(cwd)
      };
      state.terminal.entries.push(entry);
      updateDynamicCommands();
      render();

      const streamingOutput = terminalStreamingOutput(command);
      if (streamingOutput) {
        window.setTimeout(() => {
          if (activeTerminalRun?.entry !== entry || terminalStatus(entry) !== 'running') {
            return;
          }
          entry.stdout += streamingOutput;
          render();
        }, 80);
      }

      const completionDelay = command === 'stream-demo' ? 700 : /^sleep\s+/.test(command) ? 5000 : 250;
      const timer = window.setTimeout(() => {
        if (activeTerminalRun?.entry !== entry || terminalStatus(entry) !== 'running') {
          return;
        }
        const environment = { ...state.terminal.environment };
        const output = terminalOutput(command, cwd, environment);
        entry.stdout = output.stdout;
        entry.stderr = output.stderr;
        entry.exitCode = output.exitCode;
        entry.ok = output.exitCode === 0;
        entry.status = entry.ok ? 'done' : 'failed';
        state.terminal.cwdLabel = output.cwd || cwd;
        state.terminal.environment = output.environment || environment;
        state.terminal.isRunning = false;
        activeTerminalRun = null;
        updateDynamicCommands();
        render();
      }, completionDelay);
      activeTerminalRun = { entry, timer };
    }

    function setTerminalDraft(value) {
      state.terminal.draft = value;
      state.terminal.historyCursor = null;
      state.terminal.historyDraft = null;
    }

    function terminalCommandHistory() {
      return state.terminal.entries
        .filter(entry => terminalStatus(entry) !== 'running')
        .map(entry => entry.command.trim())
        .filter(Boolean);
    }

    function recallPreviousTerminalCommand() {
      const history = terminalCommandHistory();
      if (!history.length || state.terminal.isRunning) return false;
      if (state.terminal.historyCursor === null) {
        state.terminal.historyDraft = state.terminal.draft;
        state.terminal.historyCursor = history.length - 1;
      } else if (state.terminal.historyCursor > 0) {
        state.terminal.historyCursor -= 1;
      } else {
        return false;
      }
      state.terminal.draft = history[state.terminal.historyCursor];
      return true;
    }

    function recallNextTerminalCommand() {
      const history = terminalCommandHistory();
      if (state.terminal.historyCursor === null || state.terminal.isRunning) return false;
      const next = state.terminal.historyCursor + 1;
      if (next < history.length) {
        state.terminal.historyCursor = next;
        state.terminal.draft = history[next];
      } else {
        state.terminal.historyCursor = null;
        state.terminal.draft = state.terminal.historyDraft || '';
        state.terminal.historyDraft = null;
      }
      return true;
    }

    function terminalOutput(command, cwd, environment) {
      if (isSSHRemoteLabel(cwd)) {
        return remoteTerminalOutput(command, cwd, environment);
      }
      if (command === 'stream-demo') {
        return { stdout: 'stream-start\nstream-end\n', stderr: '', exitCode: 0, cwd, environment };
      }
      if (command === 'pwd') {
        return { stdout: cwd + '\n', stderr: '', exitCode: 0, cwd, environment };
      }
      if (/^cd(?:\s+|$)/.test(command)) {
        const target = command.replace(/^cd\s*/, '').trim() || '/mock/QuillCode';
        return { stdout: '', stderr: '', exitCode: 0, cwd: normalizeMockTerminalPath(cwd, target), environment };
      }
      if (/^export\s+[A-Za-z_][A-Za-z0-9_]*=/.test(command)) {
        const assignment = command.replace(/^export\s+/, '');
        const equalsIndex = assignment.indexOf('=');
        const key = assignment.slice(0, equalsIndex);
        const value = unquoteShellValue(assignment.slice(equalsIndex + 1));
        environment[key] = value;
        return { stdout: '', stderr: '', exitCode: 0, cwd, environment };
      }
      if (/^unset\s+[A-Za-z_][A-Za-z0-9_]*$/.test(command)) {
        const key = command.replace(/^unset\s+/, '');
        delete environment[key];
        return { stdout: '', stderr: '', exitCode: 0, cwd, environment };
      }
      const printfVariable = command.match(/^printf\s+'%s'\s+"?\$([A-Za-z_][A-Za-z0-9_]*)"?$/);
      if (printfVariable) {
        return { stdout: environment[printfVariable[1]] || '', stderr: '', exitCode: 0, cwd, environment };
      }
      const printfFallback = command.match(/^printf\s+'%s'\s+"\$\{([A-Za-z_][A-Za-z0-9_]*):-(.*)\}"$/);
      if (printfFallback) {
        return { stdout: environment[printfFallback[1]] || printfFallback[2], stderr: '', exitCode: 0, cwd, environment };
      }
      if (command === 'whoami') {
        return { stdout: 'mock-user\n', stderr: '', exitCode: 0, cwd, environment };
      }
      if (command.startsWith('printf ')) {
        return { stdout: command.replace(/^printf\s+/, ''), stderr: '', exitCode: 0, cwd, environment };
      }
      if (command === 'false') {
        return { stdout: '', stderr: '', exitCode: 1, cwd, environment };
      }
      return { stdout: 'ran: ' + command + '\n', stderr: '', exitCode: 0, cwd, environment };
    }

    function remoteTerminalOutput(command, cwd, environment) {
      if (command === 'pwd') {
        return { stdout: sshRemotePath(cwd) + '\n', stderr: '', exitCode: 0, cwd, environment };
      }
      if (command === 'whoami') {
        return { stdout: 'quill\n', stderr: '', exitCode: 0, cwd, environment };
      }
      if (command === "command -v openclaw || which openclaw || echo 'not found'") {
        return { stdout: '/usr/local/bin/openclaw\n', stderr: '', exitCode: 0, cwd, environment };
      }
      if (/^cd(?:\s+|$)/.test(command)) {
        const target = command.replace(/^cd\s*/, '').trim() || '~';
        return {
          stdout: '',
          stderr: '',
          exitCode: 0,
          cwd: sshRemoteLabelWithPath(cwd, normalizeMockTerminalPath(sshRemotePath(cwd), target)),
          environment
        };
      }
      if (command.startsWith('printf ')) {
        return { stdout: command.replace(/^printf\s+/, ''), stderr: '', exitCode: 0, cwd, environment };
      }
      return {
        stdout: `ssh ${cwd}: ran: ${command}\n`,
        stderr: '',
        exitCode: 0,
        cwd,
        environment
      };
    }

    function isSSHRemoteLabel(value) {
      return /^ssh:\/\//.test(String(value));
    }

    function sshRemotePath(label) {
      try {
        return new URL(label).pathname || '/';
      } catch {
        const match = String(label).match(/^ssh:\/\/[^/]+(?<path>\/.*)$/);
        return match?.groups?.path || '/';
      }
    }

    function sshRemoteLabelWithPath(label, path) {
      try {
        const url = new URL(label);
        url.pathname = path;
        return url.toString().replace(/\/$/, path === '/' ? '/' : '');
      } catch {
        return label;
      }
    }

    function unquoteShellValue(value) {
      if ((value.startsWith("'") && value.endsWith("'")) || (value.startsWith('"') && value.endsWith('"'))) {
        return value.slice(1, -1);
      }
      return value;
    }

    function shellSingleQuoted(value) {
      return `'${String(value).replaceAll("'", "'\"'\"'")}'`;
    }

    function normalizeMockTerminalPath(cwd, target) {
      const segments = target.startsWith('/') ? [] : cwd.split('/').filter(Boolean);
      for (const part of target.split('/')) {
        if (!part || part === '.') continue;
        if (part === '..') {
          segments.pop();
        } else {
          segments.push(part);
        }
      }
      return '/' + segments.join('/');
    }

    function terminalStreamingOutput(command) {
      if (command === 'stream-demo') {
        return 'stream-start\n';
      }
      return '';
    }

    function normalizeBrowserURL(raw) {
      const value = raw.trim();
      if (!value) return null;
      if (/^(https?|file):\/\//i.test(value)) return value;
      if (/^(localhost|127\\.0\\.0\\.1|\\[::1\\])/i.test(value)) return `http://${value}`;
      if (value.includes('.')) return `https://${value}`;
      return null;
    }

    function browserOpenTargetFromPrompt(text) {
      if (!/\b(open|browse|go to|visit|preview|show)\b/i.test(text)) return null;
      const quoted = text.match(/`([^`]+)`/)?.[1]?.trim();
      if (quoted && looksLikeBrowserTarget(quoted)) return quoted;
      return text
        .split(/[\s"'(),<>\[\]{}]+/)
        .map((token) => token.trim().replace(/[.:;!?]+$/g, ''))
        .find(looksLikeBrowserTarget) || null;
    }

    function looksLikeBrowserTarget(value) {
      const lower = String(value || '').toLowerCase();
      return lower.startsWith('http://')
        || lower.startsWith('https://')
        || lower.startsWith('file://')
        || lower.startsWith('localhost')
        || lower.startsWith('127.0.0.1')
        || lower.endsWith('.html')
        || lower.endsWith('.htm')
        || (lower.includes('.') && !lower.includes('@'));
    }

    function browserCanGoBack() {
      return Number.isInteger(state.browser.historyIndex)
        && state.browser.historyIndex > 0
        && state.browser.historyIndex < state.browser.history.length;
    }

    function browserCanGoForward() {
      return Number.isInteger(state.browser.historyIndex)
        && state.browser.historyIndex >= 0
        && state.browser.historyIndex + 1 < state.browser.history.length;
    }

    function browserCanReload() {
      return Boolean(state.browser.currentURL);
    }

    function browserSessionTargetURL() {
      const rawDraft = state.browser.addressDraft.trim();
      return normalizeBrowserURL(rawDraft || state.browser.currentURL || '');
    }

    function browserCanOpenSession() {
      return Boolean(browserSessionTargetURL());
    }

    function syncBrowserCommandStates() {
      const enabled = new Map([
        ['browser-back', browserCanGoBack()],
        ['browser-forward', browserCanGoForward()],
        ['browser-reload', browserCanReload()],
        ['open-browser-session', browserCanOpenSession()]
      ]);
      state.commands = state.commands.map(command => (
        enabled.has(command.id) ? { ...command, isEnabled: enabled.get(command.id) } : command
      ));
    }

    function appendBrowserHistory(url) {
      if (
        Number.isInteger(state.browser.historyIndex)
        && state.browser.history[state.browser.historyIndex] === url
      ) {
        return;
      }
      const prefixLength = Number.isInteger(state.browser.historyIndex)
        ? state.browser.historyIndex + 1
        : 0;
      state.browser.history = state.browser.history.slice(0, prefixLength);
      state.browser.history.push(url);
      state.browser.historyIndex = state.browser.history.length - 1;
    }

    function setBrowserPage(url, { updateHistory = true, statusLabel = 'Preview ready' } = {}) {
      const snapshot = browserSnapshot(url);
      state.browser.isVisible = true;
      state.browser.currentURL = url;
      state.browser.addressDraft = url;
      state.browser.snapshot = snapshot;
      state.browser.title = snapshot.details.find((detail) => detail.startsWith('Title: '))?.replace('Title: ', '')
        || new URL(url).hostname
        || url;
      state.browser.statusLabel = statusLabel;
      if (updateHistory) {
        appendBrowserHistory(url);
      }
      syncBrowserCommandStates();
    }

    function browserBack() {
      if (!browserCanGoBack()) return;
      state.browser.historyIndex -= 1;
      setBrowserPage(state.browser.history[state.browser.historyIndex], { updateHistory: false });
      render();
    }

    function browserForward() {
      if (!browserCanGoForward()) return;
      state.browser.historyIndex += 1;
      setBrowserPage(state.browser.history[state.browser.historyIndex], { updateHistory: false });
      render();
    }

    function browserReload() {
      if (!browserCanReload()) return;
      setBrowserPage(state.browser.currentURL, { updateHistory: false, statusLabel: 'Reloaded' });
      render();
    }

    function openBrowserSession() {
      const url = browserSessionTargetURL();
      state.browser.isVisible = true;
      if (!url) {
        state.browser.statusLabel = 'Invalid session address';
        syncBrowserCommandStates();
        render();
        return;
      }
      if (state.browser.currentURL !== url) {
        setBrowserPage(url);
      }
      state.browser.sessionURL = url;
      state.browser.sessionOpenCount += 1;
      state.browser.statusLabel = 'Session open';
      syncBrowserCommandStates();
      render();
    }

      function browserSnapshot(url) {
        const parsed = new URL(url);
        if (parsed.protocol === 'file:') {
          const fileName = decodeURIComponent(parsed.pathname.split('/').filter(Boolean).pop() || parsed.pathname);
          return {
            sourceLabel: /\\.html?$/i.test(fileName) ? 'Local HTML' : 'Local file',
            inspectionDepth: /\\.html?$/i.test(fileName) ? 'static_html_snapshot' : 'file_metadata',
            inspectionDepthLabel: /\\.html?$/i.test(fileName) ? 'Static HTML snapshot' : 'File metadata',
            summary: /\\.html?$/i.test(fileName)
              ? 'HTML file is ready for browser review.'
              : 'File is ready to open in the browser preview.',
            details: [`File: ${fileName}`, `Path: ${decodeURIComponent(parsed.pathname)}`],
            outline: [`File: ${fileName}`],
            textSnippet: /\\.html?$/i.test(fileName)
              ? 'HTML preview text is available when QuillCode opens local project files.'
              : null
          };
        }
        const host = parsed.hostname || parsed.href;
        const isLocal = ['localhost', '127.0.0.1', '::1'].includes(host);
        const path = parsed.pathname || '/';
        if (isLocal) {
          return {
            sourceLabel: 'Local web app',
            inspectionDepth: 'network_html_snapshot',
            inspectionDepthLabel: 'Network HTML snapshot',
            summary: 'Fetched a network HTML snapshot for this local page.',
            details: [
              `Host: ${host}`,
              `Scheme: ${parsed.protocol.replace(':', '').toUpperCase()}`,
              `Path: ${path}`,
              'HTTP: 200',
              'Content-Type: text/html; charset=utf-8',
              'Size: 512 bytes',
              'Title: Vite Preview',
              'Heading: QuillCode Browser Preview',
              'Links: 1',
              'Scripts: 1',
              'Images: 0',
              'Forms: 1'
            ],
            outline: [
              'H1: QuillCode Browser Preview',
              'Link: Dashboard -> /dashboard',
              'Button: Launch',
              'Input: Search workspace',
              'Form: Search'
            ],
            textSnippet: 'QuillCode Browser Preview Dashboard Launch Search workspace'
          };
        }
        return {
          sourceLabel: 'Web page',
          inspectionDepth: 'metadata_only',
          inspectionDepthLabel: 'Metadata only',
          summary: 'Live DOM capture is not attached yet; QuillCode has URL metadata for this web page.',
          details: [
            `Host: ${host}`,
            `Scheme: ${parsed.protocol.replace(':', '').toUpperCase()}`,
            `Path: ${path}`
          ],
          outline: [`Page: ${host}`, `Path: ${path}`],
          textSnippet: null
        };
      }

	    function openBrowserPreview() {
	      const url = normalizeBrowserURL(state.browser.addressDraft);
	      state.browser.isVisible = true;
	      if (!url) {
	        state.browser.statusLabel = 'Invalid address';
          state.browser.snapshot = null;
          syncBrowserCommandStates();
	        render();
	        return;
	      }
        setBrowserPage(url);
	      render();
	    }

	    function addBrowserComment(text) {
	      const comment = text.trim();
	      if (!comment || !state.browser.currentURL) return;
	      state.browser.comments.push({
	        id: `browser-comment-${state.browser.comments.length + 1}`,
	        url: state.browser.currentURL,
	        text: comment
	      });
	      state.browser.statusLabel = 'Comment added';
	      render();
	    }

	    function runLocalEnvironmentAction(commandID) {
      const relativePath = commandID.replace(/^local-env:/, '');
      const command = `sh '${relativePath.replaceAll("'", "'\\\\''")}'`;
      const environment = relativePath.includes('bootstrap') ? { QUILL_ENV: 'dev' } : undefined;
      const transcriptArgumentsJSON = { cmd: command };
      if (environment) {
        transcriptArgumentsJSON.environment = Object.fromEntries(
          Object.keys(environment).sort().map((key) => [key, '<redacted>'])
        );
      }
      const output = `Local environment action completed: ${relativePath}\\n`;
      addToolCard({
        title: 'host.shell.run',
        subtitle: 'Completed',
        status: 'done',
        inputJSON: JSON.stringify({ name: 'host.shell.run', argumentsJSON: JSON.stringify(transcriptArgumentsJSON) }, null, 2),
        outputJSON: JSON.stringify({ ok: true, stdout: output, stderr: '', exitCode: 0 }, null, 2)
      });
      addMessage('assistant', `Local environment action completed: ${relativePath}.`);
      render();
    }
