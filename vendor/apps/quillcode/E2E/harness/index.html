    function normalizeSlashText(value) {
      return String(value).toLowerCase().replaceAll('-', ' ').replaceAll('_', ' ').trim();
    }

    function slashSuggestions(draft, limit = 6) {
      const text = String(draft).trimStart();
      if (!text.startsWith('/') || text.includes('\n')) return [];
      const query = normalizeSlashText(text.slice(1));
      return slashCommandDefinitions
        .map((definition, index) => ({ definition, index, score: slashSuggestionScore(definition, query) }))
        .filter(entry => entry.score !== null)
        .sort((left, right) => right.score - left.score || left.index - right.index)
        .slice(0, limit)
        .map(entry => entry.definition);
    }

    function slashSuggestionScore(definition, query) {
      if (!query) return 100;
      const usage = normalizeSlashText(definition.usage.slice(1));
      if (usage.startsWith(query)) return 120;
      if (definition.aliases.some(alias => normalizeSlashText(alias).startsWith(query))) return 110;
      if (usage.includes(query)) return 90;
      const searchable = [definition.usage, definition.title, definition.detail, ...definition.aliases]
        .map(normalizeSlashText);
      return searchable.some(value => value.includes(query)) ? 70 : null;
    }

    function tokenizeSlashArguments(text) {
      const tokens = [];
      let current = '';
      let quote = null;
      let isEscaped = false;
      for (const character of String(text || '')) {
        if (isEscaped) {
          current += character;
          isEscaped = false;
          continue;
        }
        if (character === '\\') {
          isEscaped = true;
          continue;
        }
        if (quote) {
          if (character === quote) {
            quote = null;
          } else {
            current += character;
          }
          continue;
        }
        if (character === '"' || character === "'") {
          quote = character;
          continue;
        }
        if (/\s/.test(character)) {
          if (current) {
            tokens.push(current);
            current = '';
          }
          continue;
        }
        current += character;
      }
      if (isEscaped) current += '\\';
      if (quote) return { error: 'Unclosed quote in worktree command.', tokens: [] };
      if (current) tokens.push(current);
      return { tokens, error: null };
    }

    function parseWorktreeSlash(text) {
      const match = String(text || '').match(/^\/(worktrees?|wt)\b/i);
      if (!match) return { kind: 'invalid', message: 'Usage: /worktrees or /worktree create|open|remove|prune.' };
      const argument = text.slice(match[0].length).trim();
      const parsed = tokenizeSlashArguments(argument);
      if (parsed.error) return { kind: 'invalid', message: parsed.error };
      const tokens = parsed.tokens;
      const subcommand = (tokens.shift() || 'list').toLowerCase();
      if (['list', 'ls'].includes(subcommand)) {
        return tokens.length
          ? { kind: 'invalid', message: 'Usage: /worktree list.' }
          : { kind: 'list' };
      }
      if (['create', 'add', 'new'].includes(subcommand)) {
        return parseWorktreeCreateSlash(tokens);
      }
      if (['open', 'switch'].includes(subcommand)) {
        return parseSinglePathWorktreeSlash(tokens, 'open');
      }
      if (['remove', 'rm', 'delete'].includes(subcommand)) {
        return parseWorktreeRemoveSlash(tokens);
      }
      if (['prune', 'cleanup'].includes(subcommand)) {
        return parseWorktreePruneSlash(tokens);
      }
      return { kind: 'invalid', message: `Unknown worktree subcommand '${subcommand}'. Try /worktree create, /worktree open, /worktree remove, or /worktree prune.` };
    }

    function parseWorktreeCreateSlash(tokens) {
      const values = { path: '', branch: '', base: '' };
      for (let index = 0; index < tokens.length; index += 1) {
        const token = tokens[index];
        if (token === '--branch' || token === '-b') {
          const next = tokens[++index];
          if (!next || next.startsWith('-')) return { kind: 'invalid', message: `Missing branch after ${token}.` };
          values.branch = next;
          continue;
        }
        if (token === '--base' || token === '--from') {
          const next = tokens[++index];
          if (!next || next.startsWith('-')) return { kind: 'invalid', message: `Missing base ref after ${token}.` };
          values.base = next;
          continue;
        }
        if (token.startsWith('-')) return { kind: 'invalid', message: `Unknown worktree create option '${token}'.` };
        if (values.path) return { kind: 'invalid', message: 'Too many worktree create paths. Quote paths with spaces.' };
        values.path = token;
      }
      return values.path
        ? { kind: 'create', values }
        : { kind: 'invalid', message: 'Missing worktree path. Try /worktree create ../feature --branch feature/name.' };
    }

    function parseSinglePathWorktreeSlash(tokens, action) {
      let path = '';
      for (const token of tokens) {
        if (token.startsWith('-')) return { kind: 'invalid', message: `Unknown worktree ${action} option '${token}'.` };
        if (path) return { kind: 'invalid', message: `Too many worktree ${action} paths. Quote paths with spaces.` };
        path = token;
      }
      return path
        ? { kind: action, values: { path } }
        : { kind: 'invalid', message: `Missing worktree path. Try /worktree ${action} ../feature.` };
    }

    function parseWorktreeRemoveSlash(tokens) {
      const values = { path: '', force: false };
      for (const token of tokens) {
        if (token === '--force' || token === '-f') {
          values.force = true;
          continue;
        }
        if (token.startsWith('-')) return { kind: 'invalid', message: `Unknown worktree remove option '${token}'.` };
        if (values.path) return { kind: 'invalid', message: 'Too many worktree remove paths. Quote paths with spaces.' };
        values.path = token;
      }
      return values.path
        ? { kind: 'remove', values }
        : { kind: 'invalid', message: 'Missing worktree path. Try /worktree remove ../feature.' };
    }

    function parseWorktreePruneSlash(tokens) {
      const values = { dryRun: false, verbose: false };
      for (const token of tokens) {
        if (token === '--dry-run' || token === '-n') {
          values.dryRun = true;
          continue;
        }
        if (token === '--verbose' || token === '-v') {
          values.verbose = true;
          continue;
        }
        if (token.startsWith('-')) return { kind: 'invalid', message: `Unknown worktree prune option '${token}'.` };
        return { kind: 'invalid', message: 'Worktree prune does not take a path. Try /worktree prune --dry-run.' };
      }
      return { kind: 'prune', values };
    }

    function clampSlashActiveIndex(suggestions = slashSuggestions(state.composer.draft)) {
      if (!suggestions.length) {
        state.composer.slashActiveIndex = 0;
        return;
      }
      state.composer.slashActiveIndex = Math.max(
        0,
        Math.min(state.composer.slashActiveIndex || 0, suggestions.length - 1)
      );
    }

    function moveSlashSuggestion(delta) {
      const suggestions = slashSuggestions(state.composer.draft);
      if (!suggestions.length) return false;
      const current = state.composer.slashActiveIndex || 0;
      state.composer.slashActiveIndex = (current + delta + suggestions.length) % suggestions.length;
      render();
      const input = document.getElementById('message');
      input?.focus();
      resizeComposerInput(input);
      return true;
    }

    function acceptSlashSuggestion({ force = false } = {}) {
      const suggestions = slashSuggestions(state.composer.draft);
      if (!suggestions.length) return false;
      clampSlashActiveIndex(suggestions);
      const suggestion = suggestions[state.composer.slashActiveIndex];
      if (!force && state.composer.draft === suggestion.insertText && !suggestion.insertText.endsWith(' ')) {
        return false;
      }
      state.composer.draft = suggestion.insertText;
      state.composer.canSend = state.composer.draft.trim().length > 0;
      state.composer.slashActiveIndex = 0;
      render();
      const input = document.getElementById('message');
      input?.focus();
      input?.setSelectionRange(state.composer.draft.length, state.composer.draft.length);
      resizeComposerInput(input);
      return true;
    }

    function resizeComposerInput(input) {
      if (!input || input.tagName !== 'TEXTAREA') return;
      input.style.height = 'auto';
      const maxHeight = parseFloat(getComputedStyle(input).maxHeight) || 138;
      const nextHeight = Math.min(input.scrollHeight, maxHeight);
      input.style.height = `${nextHeight}px`;
      input.style.overflowY = input.scrollHeight > maxHeight ? 'auto' : 'hidden';
    }

    function authModeLabel(authMode) {
      return authMode === 'developer-override' ? 'Developer override' : 'TrustedRouter login';
    }

    function redactedDiagnosticError(error) {
      return String(error)
        .replace(/sk-[A-Za-z0-9_-]{8,}/g, 'sk-...redacted')
        .replace(/Bearer\s+[A-Za-z0-9._-]{12,}/g, 'Bearer ...redacted')
        .trim()
        .slice(0, 260);
    }

    function isRateLimitError(error) {
      const normalized = String(error).toLowerCase();
      return normalized.includes('429')
        || normalized.includes('rate limit')
        || normalized.includes('ratelimit')
        || normalized.includes('quota exceeded')
        || normalized.includes('usage limit')
        || normalized.includes('too many requests');
    }

    function rateLimitDiagnostics(error) {
      if (!isRateLimitError(error)) return [];
      const diagnostics = [{ label: 'Provider status', value: 'Rate limited' }];
      const retryAfter = String(error).match(/\bretry[- ]after\b\s*[:=]?\s*([0-9]+)\s*(?:s|sec|secs|second|seconds)?/i);
      if (retryAfter) {
        diagnostics.push({ label: 'Retry after', value: `${retryAfter[1]}s` });
      }
      const remaining = String(error).match(/\bx[-_]?ratelimit[-_]?remaining\b\s*[:=]?\s*([0-9]+)/i);
      if (remaining) {
        diagnostics.push({ label: 'Rate limit remaining', value: remaining[1] });
      }
      return diagnostics;
    }

    function runtimeDiagnostics(lastError = null) {
      const diagnostics = [
        { label: 'API base URL', value: state.settings.apiBaseURL },
        { label: 'Authentication', value: authModeLabel(state.settings.authMode) },
        { label: 'Key state', value: state.settings.hasStoredAPIKey ? 'Configured' : 'Missing' },
        { label: 'Model', value: state.topBar.selectedModelID },
        { label: 'Agent status', value: state.topBar.agentStatus }
      ];
      if (lastError) {
        diagnostics.push(...rateLimitDiagnostics(lastError));
        diagnostics.push({ label: 'Last error', value: redactedDiagnosticError(lastError) });
      }
      return diagnostics;
    }

    function makeRuntimeIssue(issue, lastError = null) {
      return {
        ...issue,
        diagnostics: runtimeDiagnostics(lastError)
      };
    }

    function addMessage(role, text) {
      const message = {
        id: `message-${state.nextTimelineIndex++}`,
        role,
        text,
        feedback: null
      };
      state.transcript.messages.push(message);
      state.transcript.timelineItems.push({
        id: `timeline-${state.nextTimelineIndex++}`,
        kind: 'message',
        message
      });
      return message;
    }

    function renameSelectedThread(title) {
      if (!state.sidebar.selectedThreadID) return;
      state.sidebar.items = state.sidebar.items.map(item => (
        item.id === state.sidebar.selectedThreadID ? { ...item, title } : item
      ));
      state.topBar.primaryTitle = title;
    }

    function memoryTitle(content) {
      const firstLine = String(content).split(/\n/)[0] || 'Memory';
      const cleaned = firstLine
        .replace(/^remember\s+(that\s+)?/i, '')
        .trim()
        .slice(0, 60);
      const words = cleaned || 'Memory';
      return words
        .split(/[^A-Za-z0-9]+/)
        .filter(Boolean)
        .slice(0, 8)
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(' ') || 'Memory';
    }

    function refreshMemorySummary() {
      const globalCount = state.memories.items.filter(item => item.scope === 'global').length;
      const projectCount = state.memories.items.filter(item => item.scope === 'project').length;
      state.memories.globalCount = globalCount;
      state.memories.projectCount = projectCount;
      state.memories.subtitle = `${countLabel(globalCount, 'global memory')} · ${countLabel(projectCount, 'project memory')}`;
      const total = globalCount + projectCount;
      state.topBar.memoryLabel = total === 1 ? '1 memory' : `${total} memories`;
      state.topBar.memorySources = state.memories.items.map(item => item.relativePath);
    }

    function saveMemory(content) {
      const trimmed = String(content).trim();
      if (!trimmed) {
        addMessage('assistant', 'Nothing to remember. Use `/remember a durable preference or fact`.');
        return null;
      }
      if (/\b(password|passwd|passphrase|api[_ -]?key|secret|token|credential)\s*[:=]/i.test(trimmed)
          || /\b(sk|pk|rk|ghp|github_pat|xox[baprs])[-_][A-Za-z0-9_=\-]{16,}/i.test(trimmed)
          || /-----BEGIN [A-Z ]*PRIVATE KEY-----/.test(trimmed)) {
        addMessage('assistant', 'Memory was not saved because it looks like it contains a credential, token, password, or private key.');
        return null;
      }
      const title = memoryTitle(trimmed);
      const id = `global:memories/manual-${Date.now()}-${state.memories.globalCount + 1}.md`;
      const item = {
        id,
        scope: 'global',
        scopeLabel: 'Global',
        title,
        preview: trimmed,
        relativePath: id.replace('global:', ''),
        byteCountLabel: `${new TextEncoder().encode(trimmed).length} bytes`,
        canEdit: true,
        editCommandID: `memory-edit:${id}`,
        canDelete: true,
        deleteCommandID: `memory-delete:${id}`
      };
      state.memories.items = [item, ...state.memories.items];
      refreshMemorySummary();
      renameSelectedThread(`Memory: ${title}`);
      addMessage('assistant', `Saved memory: ${title}. It will be included as background context in future turns.`);
      return item;
    }

    function prepareEditMemory(id) {
      const item = state.memories.items.find(candidate => candidate.id === id && candidate.canEdit);
      if (!item) {
        addMessage('assistant', 'Memory was not found. It may already have been removed.');
        return false;
      }
      state.composer.draft = `/remember-edit ${item.id}\n${item.preview}`;
      state.composer.canSend = true;
      return true;
    }

    function updateMemory(id, content) {
      const trimmed = content.trim();
      const index = state.memories.items.findIndex(item => item.id === id && item.canEdit);
      if (index < 0) {
        addMessage('assistant', 'Memory was not found. It may already have been removed.');
        return false;
      }
      if (!trimmed) {
        addMessage('assistant', 'Memory cannot be empty.');
        return false;
      }
      if (/\b(password|passwd|passphrase|api[_ -]?key|secret|token|credential)\s*[:=]/i.test(trimmed)
          || /\b(sk|pk|rk|ghp|github_pat|xox[baprs])[-_][A-Za-z0-9_=\-]{16,}/i.test(trimmed)
          || /-----BEGIN [A-Z ]*PRIVATE KEY-----/.test(trimmed)) {
        addMessage('assistant', 'Memory was not updated because it looks like it contains a credential, token, password, or private key.');
        return false;
      }
      const title = memoryTitle(trimmed);
      state.memories.items[index] = {
        ...state.memories.items[index],
        title,
        preview: trimmed,
        byteCountLabel: `${new TextEncoder().encode(trimmed).length} bytes`
      };
      refreshMemorySummary();
      renameSelectedThread(`Updated memory: ${title}`);
      addMessage('assistant', `Updated memory: ${title}. Future turns will use the revised memory.`);
      return true;
    }

    function deleteMemory(id) {
      const index = state.memories.items.findIndex(item => item.id === id && item.canDelete);
      if (index < 0) {
        addMessage('assistant', 'Memory was not found. It may already have been removed.');
        return false;
      }
      const [item] = state.memories.items.splice(index, 1);
      refreshMemorySummary();
      renameSelectedThread(`Forgot memory: ${item.title}`);
      addMessage('assistant', `Forgot memory: ${item.title}. It will no longer be included as background context.`);
      return true;
    }

    function addToolCard(card) {
      const toolCard = {
        id: `tool-${state.nextTimelineIndex++}`,
        artifacts: artifactsFromOutput(card.outputJSON),
        ...card,
        executionContext: card.executionContext || executionContextForTool(card.title),
        reviewState: card.reviewState || toolCardReviewState(card.status, card.actions, card.subtitle),
        density: card.density || toolCardDensity(card.status, card.isExpanded)
      };
      const stateLabel = toolCardStateLabel(toolCard.status);
      if (!toolCard.subtitle || toolCard.subtitle === stateLabel) {
        toolCard.subtitle = toolCardSubtitle(stateLabel, toolCard.title, toolCard.inputJSON);
      }
      state.transcript.toolCards.push(toolCard);
      state.transcript.timelineItems.push({
        id: `timeline-${state.nextTimelineIndex++}`,
        kind: 'toolCard',
        toolCard
      });
      return toolCard;
    }

    function selectedProject() {
      return state.projects.items.find(project => project.id === state.projects.selectedProjectID) || null;
    }

    function executionContextForTool(toolName) {
      if (!isProjectExecutionTool(toolName)) return null;
      return executionContextForProject(selectedProject());
    }

    function executionContextForProject(project) {
      if (!project) return null;
      if (project.isRemote) {
        return {
          kind: 'ssh-remote',
          label: 'SSH Remote',
          detail: sshHostFromLabel(project.path) || project.name || 'ssh'
        };
      }
      return {
        kind: 'local',
        label: 'Local',
        detail: project.path || 'No project'
      };
    }

    function executionContextForCWD(cwd) {
      if (isSSHRemoteLabel(cwd)) {
        return {
          kind: 'ssh-remote',
          label: 'SSH Remote',
          detail: sshHostFromLabel(cwd) || 'ssh'
        };
      }
      return {
        kind: 'local',
        label: 'Local',
        detail: cwd || 'No project'
      };
    }

    function isProjectExecutionTool(toolName) {
      return [
        'host.shell.run',
        'host.file.read',
        'host.file.write',
        'host.apply_patch',
        'host.git.status',
        'host.git.diff',
        'host.git.stage',
        'host.git.restore',
        'host.git.stage_hunk',
        'host.git.restore_hunk',
        'host.git.commit',
        'host.git.push',
        'host.git.pr.create',
        'host.git.pr.view',
        'host.git.pr.checks',
        'host.git.pr.diff',
        'host.git.worktree.list',
        'host.git.worktree.create',
        'host.git.worktree.remove',
        'host.git.worktree.prune'
      ].includes(toolName);
    }

    function sshHostFromLabel(label) {
      try {
        return new URL(label).host || '';
      } catch {
        const match = String(label || '').match(/^ssh:\/\/([^/]+)/);
        return match?.[1] || '';
      }
    }

    function executionContextTitle(context) {
      if (!context) return '';
      return context.kind === 'ssh-remote'
        ? `${context.label} · ${context.detail}`
        : context.label;
    }

    function renderExecutionContextChip(context, testID) {
      return context ? `
        <span class="execution-context-chip" data-testid="${escapeHTML(testID)}" data-execution-context-kind="${escapeHTML(context.kind)}">${escapeHTML(executionContextTitle(context))}</span>` : '';
    }

    function toolCardDensity(status, isExpanded = false) {
      if (isExpanded) return 'expanded';
      if (status === 'queued' || status === 'running') return 'peek';
      if (status === 'failed' || status === 'review') return 'expanded';
      return 'collapsed';
    }

    function toolCardStateLabel(status) {
      if (status === 'queued') return 'Queued';
      if (status === 'running') return 'Running';
      if (status === 'failed') return 'Failed';
      if (status === 'review') return 'Ready';
      return 'Completed';
    }

    function toolCardReviewState(status, actions = [], subtitle = '') {
      if (status !== 'review') return 'none';
      if (!actions.length && /blocked/i.test(String(subtitle || ''))) return 'needsReview';
      return 'ready';
    }

    function toolCardNeedsReview(card) {
      if (card.reviewState === 'needsReview') return true;
      return card.status === 'review'
        && !(card.actions || []).length
        && /blocked/i.test(String(card.subtitle || ''));
    }

    function toolCardStatusDisplayLabel(card) {
      if (card.status === 'review') return toolCardNeedsReview(card) ? 'Needs review' : 'Ready';
      const raw = String(card.status || '');
      return raw ? `${raw.charAt(0).toUpperCase()}${raw.slice(1)}` : '';
    }

    function toolCardStatusAccessibilityLabel(card) {
      if (card.status === 'review') return toolCardNeedsReview(card) ? 'needs review' : 'ready to run';
      return String(card.status || '');
    }

    function toolCardSubtitle(stateLabel, toolName, inputJSON) {
      const detail = toolCardDetail(toolName, inputJSON);
      return detail ? `${stateLabel} · ${detail}` : stateLabel;
    }

    function toolCardDetail(toolName, inputJSON) {
      if (!inputJSON) return '';
      let args = {};
      try {
        args = JSON.parse(inputJSON);
      } catch {
        return '';
      }
      const pathTools = new Set([
        'host.file.read',
        'host.file.write',
        'host.git.stage',
        'host.git.restore',
        'host.git.stage_hunk',
        'host.git.restore_hunk',
        'host.git.pr.diff',
        'host.git.worktree.remove'
      ]);
      if (toolName === 'host.shell.run') return toolCardSanitized(args.cmd);
      if (pathTools.has(toolName)) return toolCardSanitized(args.path);
      if (toolName === 'host.apply_patch') return 'patch';
      if (toolName === 'host.git.diff') return args.staged === true ? 'staged diff' : 'working tree';
      if (toolName === 'host.git.commit') return toolCardSanitized(args.message);
      if (toolName === 'host.git.push') {
        const remote = toolCardSanitized(args.remote);
        const branch = toolCardSanitized(args.branch);
        if (remote && branch) return `${remote}/${branch}`;
        return remote || branch || '';
      }
      if (toolName === 'host.git.pr.create') return toolCardSanitized(args.title);
      if (toolName?.startsWith('host.git.pr.')) return toolCardSanitized(args.selector);
      if (toolName === 'host.git.worktree.create') return toolCardSanitized(args.branch) || toolCardSanitized(args.path);
      if (toolName === 'host.plan.update') return 'plan';
      if (toolName === 'host.browser.inspect') return toolCardSanitized(args.url);
      if (toolName === 'host.browser.open') return toolCardSanitized(args.url);
      if (toolName === 'host.memory.remember') return toolCardSanitized(args.content);
      if (toolName === 'host.mcp.call') return toolCardSanitized(args.tool);
      if (toolName === 'host.mcp.read_resource' || toolName === 'host.mcp.get_prompt') {
        return toolCardSanitized(args.name) || toolCardSanitized(args.uri);
      }
      return '';
    }

    function toolCardSanitized(value) {
      const collapsed = String(value || '').split(/\s+/).filter(Boolean).join(' ').trim();
      return collapsed.length > 72 ? `${collapsed.slice(0, 72)}...` : collapsed;
    }

    function updateToolCardLifecycle(card, status, subtitle) {
      card.status = status;
      card.subtitle = toolCardSubtitle(subtitle, card.title, card.inputJSON);
      card.reviewState = toolCardReviewState(status, card.actions || [], card.subtitle);
      card.density = toolCardDensity(status, card.isExpanded);
      card.isExpanded = card.density === 'expanded';
    }

    function runToolCardAction(kind, requestID, timelineID) {
      const item = state.transcript.timelineItems.find(item => item.id === timelineID);
      const card = item?.toolCard || state.transcript.toolCards.find(card => (
        (card.actions || []).some(action => action.requestID === requestID)
      ));
      if (!card) return;
      card.actions = [];
      card.status = 'done';
      card.reviewState = 'none';
      card.subtitle = toolCardSubtitle(kind === 'approve' ? 'Approved' : 'Skipped', card.title, card.inputJSON);
      card.outputJSON = JSON.stringify({
        requestID,
        verdict: kind === 'approve' ? 'approve' : 'deny',
        rationale: kind === 'approve' ? 'Approved from the tool card.' : 'Skipped from the tool card.'
      }, null, 2);
      card.density = toolCardDensity(card.status, false);
      card.isExpanded = false;

      if (kind === 'approve') {
        addToolCard({
          title: card.title,
          subtitle: 'Completed',
          status: 'done',
          inputJSON: card.inputJSON,
          outputJSON: mockApprovedToolOutput(card.title, card.inputJSON)
        });
        addMessage('assistant', 'Approved and ran the tool.');
      } else {
        addMessage('assistant', `Skipped ${card.title}.`);
      }
      render();
    }

    function mockApprovedToolOutput(toolName, inputJSON) {
      const args = safeJSON(inputJSON);
      if (toolName === 'host.shell.run') {
        const cmd = String(args.cmd || '').trim();
        const stdout = cmd === 'whoami'
          ? 'mock-user\n'
          : `ran: ${cmd || 'command'}\n`;
        return JSON.stringify({ ok: true, stdout, stderr: '', exitCode: 0 }, null, 2);
      }
      if (toolName === 'host.file.write') {
        const path = String(args.path || 'file.txt');
        return JSON.stringify({ ok: true, stdout: `Wrote ${path}\n`, artifacts: [path] }, null, 2);
      }
      return JSON.stringify({ ok: true, stdout: 'Completed.\n' }, null, 2);
    }

    function safeJSON(text) {
      try {
        return JSON.parse(text || '{}') || {};
      } catch {
        return {};
      }
    }

    function artifactsFromOutput(outputJSON) {
      if (!outputJSON) return [];
      try {
        const decoded = JSON.parse(outputJSON);
        return Array.isArray(decoded.artifacts)
          ? decoded.artifacts
              .filter(value => String(value || '').trim())
              .map(value => artifactState(String(value)))
          : [];
      } catch {
        return [];
      }
    }

    function artifactState(value) {
      let kind = value.startsWith('http://') || value.startsWith('https://') || value.toLowerCase().startsWith('data:image/')
        ? 'url'
        : value.startsWith('/') || value.startsWith('file://')
          ? 'file'
          : 'path';
      let label = value;
      try {
        const url = value.startsWith('/') ? new URL(`file://${value}`) : new URL(value);
        if (url.protocol === 'data:') {
          label = 'Inline image';
        } else if (url.protocol === 'http:' || url.protocol === 'https:') {
          label = url.pathname && url.pathname !== '/' ? `${url.hostname}${url.pathname}` : url.hostname;
        } else {
          const parts = url.pathname.split('/').filter(Boolean);
          label = parts.at(-1) || url.hostname || value;
        }
      } catch {
        const parts = value.split('/').filter(Boolean);
        label = parts.at(-1) || value;
      }
      const isImagePreview = artifactIsImagePreview(value, kind);
      const artifact = {
        value,
        label,
        kind,
        isImagePreview,
        previewURL: isImagePreview ? artifactPreviewURL(value, kind) : null,
        textPreview: isImagePreview ? null : artifactTextPreview(value, kind)
      };
      const detail = artifactDetail(artifact);
      return {
        ...artifact,
        detail,
        imagePreview: artifactImagePreview(value, kind, detail),
        documentPreview: artifactDocumentPreview(value, kind, detail)
      };
    }

    function artifactDetail(artifact) {
      if (artifact.value.toLowerCase().startsWith('data:image/')) return 'Image artifact';
      if (artifact.kind === 'url') return artifact.label;
      if (artifact.kind === 'file') {
        try {
          const url = artifact.value.startsWith('/') ? new URL(`file://${artifact.value}`) : new URL(artifact.value);
          const parts = url.pathname.split('/').filter(Boolean);
          parts.pop();
          return '/' + parts.join('/');
        } catch {
          const parts = artifact.value.split('/').filter(Boolean);
          parts.pop();
          return parts.length ? '/' + parts.join('/') : 'File artifact';
        }
      }
      return artifact.value;
    }

    function artifactHref(artifact) {
      if (artifact.kind === 'url') return artifact.value;
      if (artifact.kind === 'file' && artifact.value.startsWith('/')) return `file://${artifact.value}`;
      if (artifact.kind === 'file' && artifact.value.startsWith('file://')) return artifact.value;
      return null;
    }

    function artifactIsImagePreview(value, kind) {
      if (value.toLowerCase().startsWith('data:image/')) return true;
      if (kind !== 'file' && kind !== 'url') return false;
      return ['png', 'jpg', 'jpeg', 'gif', 'webp', 'heic', 'tif', 'tiff', 'bmp'].includes(artifactPathExtension(value));
    }

    function artifactPreviewURL(value, kind) {
      if (!artifactIsImagePreview(value, kind)) return null;
      if (value.toLowerCase().startsWith('data:image/')) return value;
      if (kind === 'url') return value;
      if (kind === 'file' && value.startsWith('/')) return `file://${value}`;
      if (kind === 'file' && value.startsWith('file://')) return value;
      return null;
    }

    function artifactImagePreview(value, kind, detail) {
      if (!artifactIsImagePreview(value, kind)) return null;
      return {
        typeLabel: 'Image',
        extensionLabel: artifactImageExtension(value),
        detail
      };
    }

    function artifactImageExtension(value) {
      const lower = value.toLowerCase();
      if (lower.startsWith('data:image/')) {
        const subtype = lower.slice('data:image/'.length).split(/[;,]/)[0];
        return normalizedImageExtension(subtype || 'image');
      }
      const extension = artifactPathExtension(value);
      return extension ? normalizedImageExtension(extension) : 'IMAGE';
    }

    function normalizedImageExtension(value) {
      const base = String(value || 'image').toLowerCase().split('+')[0];
      if (base === 'jpeg') return 'JPG';
      if (base === 'x-icon') return 'ICO';
      return base.toUpperCase();
    }

    const documentPreviewKinds = new Map([
      ['appshot', { kind: 'appshot', typeLabel: 'Appshot', icon: 'APP' }],
      ['pdf', { kind: 'pdf', typeLabel: 'PDF', icon: 'PDF' }],
      ['doc', { kind: 'document', typeLabel: 'Document', icon: 'DOC' }],
      ['docx', { kind: 'document', typeLabel: 'Document', icon: 'DOC' }],
      ['odt', { kind: 'document', typeLabel: 'Document', icon: 'DOC' }],
      ['pages', { kind: 'document', typeLabel: 'Document', icon: 'DOC' }],
      ['rtf', { kind: 'document', typeLabel: 'Document', icon: 'DOC' }],
      ['numbers', { kind: 'spreadsheet', typeLabel: 'Spreadsheet', icon: 'XLS' }],
      ['ods', { kind: 'spreadsheet', typeLabel: 'Spreadsheet', icon: 'XLS' }],
      ['xls', { kind: 'spreadsheet', typeLabel: 'Spreadsheet', icon: 'XLS' }],
      ['xlsx', { kind: 'spreadsheet', typeLabel: 'Spreadsheet', icon: 'XLS' }],
      ['key', { kind: 'presentation', typeLabel: 'Presentation', icon: 'PPT' }],
      ['odp', { kind: 'presentation', typeLabel: 'Presentation', icon: 'PPT' }],
      ['ppt', { kind: 'presentation', typeLabel: 'Presentation', icon: 'PPT' }],
      ['pptx', { kind: 'presentation', typeLabel: 'Presentation', icon: 'PPT' }]
    ]);

    function artifactPathExtension(value) {
      try {
        const url = value.startsWith('/') ? new URL(`file://${value}`) : new URL(value);
        return (url.pathname.split('.').pop() || '').toLowerCase();
      } catch {
        return (value.split('.').pop() || '').toLowerCase();
      }
    }

    function artifactPreviewExtension(value) {
      let filename = '';
      try {
        const url = value.startsWith('/') ? new URL(`file://${value}`) : new URL(value);
        filename = decodeURIComponent((url.pathname.split('/').filter(Boolean).at(-1) || '')).toLowerCase();
      } catch {
        filename = (value.split('/').filter(Boolean).at(-1) || '').toLowerCase();
      }
      if (filename.endsWith('.appshot.json')) return 'appshot';
      return artifactPathExtension(value);
    }

    function artifactDocumentPreview(value, kind, detail) {
      if (artifactIsImagePreview(value, kind) || (kind !== 'file' && kind !== 'url')) return null;
      const extension = artifactPreviewExtension(value);
      const documentKind = documentPreviewKinds.get(extension);
      if (!documentKind) return null;
      return {
        kind: documentKind.kind,
        typeLabel: documentKind.typeLabel,
        extensionLabel: extension.toUpperCase(),
        detail,
        icon: documentKind.icon
      };
    }

    const textPreviewExtensions = new Set([
      'c', 'cc', 'conf', 'cpp', 'css', 'csv', 'go', 'h', 'hpp', 'html',
      'java', 'js', 'json', 'jsx', 'kt', 'log', 'm', 'md', 'mm', 'py',
      'rb', 'rs', 'sh', 'sql', 'swift', 'toml', 'ts', 'tsx', 'txt',
      'xml', 'yaml', 'yml'
    ]);
    const textPreviewFilenames = new Set([
      '.env.example', '.gitignore', 'dockerfile', 'gemfile', 'license', 'makefile', 'podfile', 'readme'
    ]);

    function artifactFilePath(value) {
      if (value.startsWith('/')) return value;
      try {
        const url = new URL(value);
        return url.protocol === 'file:' ? decodeURIComponent(url.pathname) : null;
      } catch {
        return null;
      }
    }

    function artifactTextPreview(value, kind) {
      if (kind !== 'file') return null;
      const path = artifactFilePath(value);
      if (!path) return null;
      const name = path.split('/').filter(Boolean).at(-1)?.toLowerCase() || '';
      if (name.endsWith('.appshot') || name.endsWith('.appshot.json')) return null;
      const extension = name.includes('.') ? name.split('.').pop() : '';
      if (!textPreviewFilenames.has(name) && !textPreviewExtensions.has(extension)) return null;
      const text = state.mockFiles[path];
      if (typeof text !== 'string' || !text.trim() || text.includes('\u0000')) return null;
      const limit = 6 * 1024;
      let preview = text.slice(0, limit).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      let truncated = text.length > limit;
      const lines = preview.split('\n');
      if (lines.length > 80) {
        preview = lines.slice(0, 80).join('\n');
        truncated = true;
      }
      if (truncated) preview += `${preview.endsWith('\n') ? '' : '\n'}...`;
      return preview;
    }

    function countLabel(count, singular) {
      if (count === 1) return `1 ${singular}`;
      if (singular.endsWith('memory')) return `${count} ${singular.replace(/memory$/, 'memories')}`;
      return `${count} ${singular}s`;
    }

    const contextTokenBudget = 32000;
    const contextWarningThresholdPercent = 80;

    function updateDynamicCommands() {
      const selectedThread = state.sidebar.items.find(item => item.id === state.sidebar.selectedThreadID);
      const hasThread = Boolean(selectedThread);
      const hasMessages = Boolean(state.sidebar.selectedThreadID && state.transcript.messages.length);
      const hasUserMessages = state.transcript.messages.some(message => message.role === 'user' && String(message.text || '').trim());
      const hasActiveWork = state.composer.isSending || state.terminal.isRunning;
      const hasProject = Boolean(state.projects.selectedProjectID);
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      const hasLocalProject = hasProject && !selectedProject?.isRemote;
      const hasSelectedRemoteProject = Boolean(selectedProject?.isRemote);
      const hasActiveMCPServer = state.extensions.items.some(item => (
        item.kind === 'mcp_server' && ['Ready', 'Running', 'Probing'].includes(item.statusLabel)
      ));
      const selectedThreadIDs = new Set(state.sidebar.selectedThreadIDs);
      const selectedThreads = state.sidebar.items.filter(item => selectedThreadIDs.has(item.id));
      const hasBulkSelection = selectedThreads.length > 0;
      const hasPinnedBulkSelection = selectedThreads.some(item => item.isPinned);
      const hasUnarchivedBulkSelection = selectedThreads.some(item => !item.isArchived);
      const hasArchivedBulkSelection = selectedThreads.some(item => item.isArchived);
      const hasSidebarThreads = state.sidebar.items.length > 0;
      state.commands = state.commands.map(command => (
        command.id === 'thread-rename' ? { ...command, isEnabled: hasThread } :
        command.id === 'thread-duplicate' ? { ...command, isEnabled: hasThread } :
        command.id === 'thread-archive' ? { ...command, isEnabled: hasThread && !selectedThread.isArchived } :
        command.id === 'thread-unarchive' ? { ...command, isEnabled: hasThread && selectedThread.isArchived } :
        command.id === 'thread-delete' ? { ...command, isEnabled: hasThread } :
        command.id === 'thread-selection-start' ? { ...command, isEnabled: hasSidebarThreads } :
        command.id === 'thread-selection-select-all' ? { ...command, isEnabled: hasSidebarThreads } :
        command.id === 'thread-selection-clear' ? { ...command, isEnabled: state.sidebar.isSelectionMode } :
        command.id === 'thread-bulk-pin' ? { ...command, isEnabled: hasUnarchivedBulkSelection } :
        command.id === 'thread-bulk-unpin' ? { ...command, isEnabled: hasPinnedBulkSelection } :
        command.id === 'thread-bulk-archive' ? { ...command, isEnabled: hasUnarchivedBulkSelection } :
        command.id === 'thread-bulk-unarchive' ? { ...command, isEnabled: hasArchivedBulkSelection } :
        command.id === 'thread-bulk-delete' ? { ...command, isEnabled: hasBulkSelection } :
        command.id === 'project-new-chat' ? { ...command, isEnabled: hasProject } :
        command.id === 'project-refresh-context' ? { ...command, isEnabled: hasProject } :
        command.id === 'project-rename' ? { ...command, isEnabled: hasProject } :
        command.id === 'project-remove' ? { ...command, isEnabled: hasProject } :
        command.id === 'terminal-clear' ? { ...command, isEnabled: state.terminal.entries.length > 0 && !state.terminal.isRunning } :
        command.id === 'git-status' ? { ...command, isEnabled: hasProject } :
        command.id === 'git-diff' ? { ...command, isEnabled: hasProject } :
        command.id === 'git-pr-create' ? { ...command, isEnabled: hasLocalProject } :
        command.id === 'git-worktree-list' ? { ...command, isEnabled: hasLocalProject } :
        command.id === 'git-worktree-create' ? { ...command, isEnabled: hasLocalProject } :
        command.id === 'git-worktree-open' ? { ...command, isEnabled: hasLocalProject } :
        command.id === 'git-worktree-remove' ? { ...command, isEnabled: hasLocalProject } :
        command.id === 'git-worktree-prune' ? { ...command, isEnabled: hasLocalProject } :
        command.id === 'fork-from-last' ? { ...command, isEnabled: hasMessages } :
        command.id === 'compact-context' ? { ...command, isEnabled: hasMessages } :
        command.id === 'retry-last-turn' ? { ...command, isEnabled: hasUserMessages && !state.composer.isSending } :
        command.id === 'find-in-chat' ? { ...command, isEnabled: hasThread } :
        command.id === 'automation-create-thread-follow-up' ? { ...command, isEnabled: hasThread } :
        command.id === 'automation-create-workspace-schedule' ? { ...command, isEnabled: hasProject } :
        command.id?.startsWith('automation-create-thread-follow-up-after:') ? { ...command, isEnabled: hasThread } :
        command.id === 'automation-create-thread-follow-up-tomorrow' ? { ...command, isEnabled: hasThread } :
        command.id?.startsWith('automation-create-thread-follow-up-every:') ? { ...command, isEnabled: hasThread } :
        command.id?.startsWith('automation-create-workspace-schedule-after:') ? { ...command, isEnabled: hasProject } :
        command.id === 'automation-create-workspace-schedule-tomorrow' ? { ...command, isEnabled: hasProject } :
        command.id?.startsWith('automation-create-workspace-schedule-every:') ? { ...command, isEnabled: hasProject } :
        command.id === 'stop-all' ? { ...command, isEnabled: hasActiveWork || hasActiveMCPServer } :
        command.id === 'disconnect-all' ? { ...command, isEnabled: hasSelectedRemoteProject || hasActiveMCPServer } :
        command
      ));
    }

    function syncAutomationsSurface() {
      const selectedThread = state.sidebar.items.find(item => item.id === state.sidebar.selectedThreadID);
      const configured = state.automations.configuredWorkflows || [];
      const activeCount = configured.filter(workflow => ['Active', 'Due', 'Ran'].includes(workflow.statusLabel)).length;
      const pausedCount = configured.filter(workflow => workflow.statusLabel === 'Paused').length;
      state.automations.createThreadFollowUpCommand = {
        id: 'automation-create-thread-follow-up',
        title: 'Create thread follow-up',
        isEnabled: Boolean(selectedThread)
      };
      state.automations.createWorkspaceScheduleCommand = {
        id: 'automation-create-workspace-schedule',
        title: 'Create workspace schedule',
        isEnabled: Boolean(state.projects.selectedProjectID)
      };
      state.automations.scheduleThreadFollowUpCommands = [
        { id: 'automation-create-thread-follow-up-after:600', title: 'In 10 minutes', isEnabled: Boolean(selectedThread) },
        { id: 'automation-create-thread-follow-up-after:3600', title: 'In 1 hour', isEnabled: Boolean(selectedThread) },
        { id: 'automation-create-thread-follow-up-tomorrow', title: 'Tomorrow morning', isEnabled: Boolean(selectedThread) },
        { id: 'automation-create-thread-follow-up-every:daily', title: 'Daily follow-up', isEnabled: Boolean(selectedThread) }
      ];
      state.automations.scheduleWorkspaceScheduleCommands = [
        { id: 'automation-create-workspace-schedule-after:600', title: 'Check in 10 minutes', isEnabled: Boolean(state.projects.selectedProjectID) },
        { id: 'automation-create-workspace-schedule-after:3600', title: 'Check in 1 hour', isEnabled: Boolean(state.projects.selectedProjectID) },
        { id: 'automation-create-workspace-schedule-tomorrow', title: 'Check tomorrow morning', isEnabled: Boolean(state.projects.selectedProjectID) },
        { id: 'automation-create-workspace-schedule-every:daily', title: 'Check daily', isEnabled: Boolean(state.projects.selectedProjectID) }
      ];
      if (!configured.length) {
        state.automations.statusLabel = `${state.automations.plannedWorkflows.length} planned`;
        state.automations.workflows = state.automations.plannedWorkflows;
      } else {
        state.automations.statusLabel = activeCount && pausedCount
          ? `${activeCount} active · ${pausedCount} paused`
          : activeCount
            ? `${activeCount} active`
            : `${pausedCount} paused`;
        state.automations.workflows = configured;
      }
    }

    const commandCategoryOrder = ['Thread', 'Navigation', 'Workspace', 'Slash Commands', 'Automations', 'Memories', 'Extensions', 'Git', 'Environment', 'Control', 'Computer Use'];

    function normalizeCommandText(value) {
      return String(value || '').trim().toLowerCase();
    }

    function compactCommandText(value) {
      return normalizeCommandText(value).replace(/[\s+]/g, '');
    }

    function commandCategoryRank(category) {
      const index = commandCategoryOrder.indexOf(category || 'Workspace');
      return index === -1 ? commandCategoryOrder.length : index;
    }

    function commandScore(command, query) {
      if (!query) return 1;
      const title = normalizeCommandText(command.title);
      const compactTitle = compactCommandText(command.title);
      const shortcut = compactCommandText(command.shortcut);
      const id = normalizeCommandText(command.id.replaceAll('-', ' '));
      const category = normalizeCommandText(command.category || 'Workspace');
      const keywords = (command.keywords || []).map(normalizeCommandText);
      const compactQuery = compactCommandText(query);

      if (title === query || compactTitle === compactQuery) return 1000;
      if (title.startsWith(query) || compactTitle.startsWith(compactQuery)) return 900;
      if (title.split(/\s+/).some(part => part.startsWith(query))) return 820;
      if (shortcut && shortcut.includes(compactQuery)) return 780;
      if (keywords.some(keyword => keyword === query || keyword.startsWith(query))) return 720;
      if (title.includes(query) || compactTitle.includes(compactQuery)) return 650;
      if (id.includes(query) || keywords.some(keyword => keyword.includes(query))) return 560;
      if (category.includes(query)) return 440;
      return null;
    }

    function commandPaletteRequest() {
      const trimmed = String(state.commandPalette.query || '').trim();
      if (trimmed.startsWith('>')) {
        return { scope: 'actions', query: normalizeCommandText(trimmed.slice(1)) };
      }
      if (trimmed.startsWith('/')) {
        return { scope: 'slash', query: normalizeCommandText(trimmed.slice(1)) };
      }
      return { scope: 'mixed', query: normalizeCommandText(trimmed) };
    }

    function commandPaletteCommandPool(request) {
      if (request.scope === 'actions') return state.commands;
      if (request.scope === 'slash') return slashCommandPaletteCommands();
      if (!request.query) return state.commands;
      return [...state.commands, ...slashCommandPaletteCommands()];
    }

    function commandPaletteResults() {
      const request = commandPaletteRequest();
      return commandPaletteCommandPool(request)
        .map((command, index) => ({ command, index, score: commandScore(command, request.query) }))
        .filter(entry => entry.score !== null)
        .sort((lhs, rhs) => {
          if (lhs.score !== rhs.score) return rhs.score - lhs.score;
          const lhsCategory = commandCategoryRank(lhs.command.category);
          const rhsCategory = commandCategoryRank(rhs.command.category);
          if (lhsCategory !== rhsCategory) return lhsCategory - rhsCategory;
          return lhs.index - rhs.index;
        })
        .map(entry => entry.command);
    }

    function commandPaletteGroups() {
      const groupsByCategory = new Map();
      for (const command of commandPaletteResults()) {
        const category = command.category || 'Workspace';
        if (!groupsByCategory.has(category)) groupsByCategory.set(category, []);
        groupsByCategory.get(category).push(command);
      }
      return [...groupsByCategory.entries()]
        .sort(([lhs], [rhs]) => {
          const lhsRank = commandCategoryRank(lhs);
          const rhsRank = commandCategoryRank(rhs);
          if (lhsRank !== rhsRank) return lhsRank - rhsRank;
          return lhs.localeCompare(rhs);
        })
        .map(([category, commands]) => ({ category, commands }));
    }

    function ensureCommandPaletteSelection() {
      const enabled = commandPaletteResults().filter(command => command.isEnabled);
      if (enabled.some(command => command.id === state.commandPalette.selectedCommandID)) return;
      state.commandPalette.selectedCommandID = enabled[0]?.id || null;
    }

    function focusInputByTestID(testID) {
      const focus = () => {
        const input = document.querySelector(`[data-testid="${testID}"]`);
        if (!(input instanceof HTMLInputElement || input instanceof HTMLTextAreaElement)) return;
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
      };
      requestAnimationFrame(focus);
    }

    function focusSearchInput() {
      const input = document.querySelector('[data-testid="search-input"]');
      if (input instanceof HTMLInputElement) {
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
      }
      focusInputByTestID('search-input');
    }

    function openCommandPalette() {
      state.commandPalette.isOpen = true;
      state.commandPalette.query = '';
      ensureCommandPaletteSelection();
      render();
      focusInputByTestID('command-palette-input');
    }

    function openSearchPanel() {
      state.search.isOpen = true;
      state.search.query = '';
      ensureSearchHighlight(state.sidebar.selectedThreadID);
      render();
      focusInputByTestID('search-input');
    }

    function filteredSearchResults() {
      const query = state.search.query.trim().toLowerCase();
      return state.sidebar.items.filter(item => {
        if (!query) return true;
        return item.title.toLowerCase().includes(query)
          || item.subtitle.toLowerCase().includes(query)
          || (item.searchText || '').toLowerCase().includes(query)
          || (item.isPinned ? 'pinned' : '').includes(query)
          || (item.isArchived ? 'archived' : '').includes(query);
      });
    }

    function ensureSearchHighlight(preferredID) {
      const results = filteredSearchResults();
      if (preferredID && results.some(item => item.id === preferredID)) {
        state.search.highlightedThreadID = preferredID;
        return;
      }
      if (state.search.highlightedThreadID && results.some(item => item.id === state.search.highlightedThreadID)) return;
      state.search.highlightedThreadID = results[0]?.id || null;
    }

    function moveSearchHighlight(delta) {
      const results = filteredSearchResults();
      if (!results.length) {
        state.search.highlightedThreadID = null;
        return;
      }
      const currentIndex = Math.max(0, results.findIndex(item => item.id === state.search.highlightedThreadID));
      const nextIndex = (currentIndex + delta + results.length) % results.length;
      state.search.highlightedThreadID = results[nextIndex].id;
    }

    function selectSearchHighlight() {
      ensureSearchHighlight(state.search.highlightedThreadID);
      const threadID = state.search.highlightedThreadID;
      if (!threadID) return;
      selectThread(threadID);
      state.search.isOpen = false;
      state.search.highlightedThreadID = null;
      render();
    }

    function searchResultsHTML() {
      const results = filteredSearchResults();
      if (!results.length) {
        return '<p data-testid="search-empty">No matching chats</p>';
      }
      return results.map(item => `
        <button class="search-result ${item.id === state.search.highlightedThreadID ? 'selected' : ''}" type="button" data-testid="search-result" data-thread-id="${escapeHTML(item.id)}" data-highlighted="${item.id === state.search.highlightedThreadID ? 'true' : 'false'}">
          <span>${escapeHTML(item.title)}</span>
          <small>${escapeHTML(item.subtitle)}${item.isPinned ? ' · pinned' : ''}${item.isArchived ? ' · archived' : ''}</small>
        </button>`).join('');
    }

    function bindSearchResultHandlers(root = document) {
      root.querySelectorAll('[data-testid="search-result"]').forEach(button => {
        button.addEventListener('click', event => {
          selectThread(event.currentTarget.getAttribute('data-thread-id'));
          state.search.isOpen = false;
          state.search.highlightedThreadID = null;
          render();
        });
      });
    }

    function refreshSearchResults() {
      const resultsContainer = document.querySelector('[data-testid="search-results"]');
      if (!resultsContainer) return;
      resultsContainer.innerHTML = searchResultsHTML();
      bindSearchResultHandlers(resultsContainer);
    }

    function moveCommandPaletteSelection(delta) {
      const enabled = commandPaletteResults().filter(command => command.isEnabled);
      if (!enabled.length) {
        state.commandPalette.selectedCommandID = null;
        return;
      }
      const currentIndex = Math.max(0, enabled.findIndex(command => command.id === state.commandPalette.selectedCommandID));
      const nextIndex = (currentIndex + delta + enabled.length) % enabled.length;
      state.commandPalette.selectedCommandID = enabled[nextIndex].id;
    }

    function selectCommandPaletteSelection() {
      const enabled = commandPaletteResults().filter(command => command.isEnabled);
      const command = enabled.find(candidate => candidate.id === state.commandPalette.selectedCommandID) || enabled[0];
      if (command) runCommand(command.id);
    }

    function handleCommandPaletteKeydown(event) {
      if (!state.commandPalette.isOpen) return false;
      if (event.key === 'Escape') {
        event.preventDefault();
        state.commandPalette.isOpen = false;
        render();
        return true;
      }
      if (event.key === 'ArrowDown') {
        event.preventDefault();
        moveCommandPaletteSelection(1);
        render();
        return true;
      }
      if (event.key === 'ArrowUp') {
        event.preventDefault();
        moveCommandPaletteSelection(-1);
        render();
        return true;
      }
      if (event.key === 'Enter') {
        event.preventDefault();
        selectCommandPaletteSelection();
        return true;
      }
      return false;
    }

    function estimatedContextTokens() {
      const messageChars = state.transcript.messages
        .reduce((total, message) => total + message.text.length + 24, 0);
      const cardChars = state.transcript.toolCards
        .reduce((total, card) => total + (card.subtitle || '').length + (card.inputJSON || '').length + (card.outputJSON || '').length, 0);
      return Math.max(1, Math.floor((messageChars + cardChars) / 4));
    }

    function contextBanner() {
      if (!state.transcript.messages.length) return null;
      const usedPercent = Math.min(100, Math.round((estimatedContextTokens() / contextTokenBudget) * 100));
      if (usedPercent < contextWarningThresholdPercent) return null;
      return {
        usedPercent,
        title: `${usedPercent >= 100 ? 'Context limit reached' : 'Approaching context limit'} (${usedPercent}% used)`,
        subtitle: 'Older turns may drop out soon. Compact the thread, start fresh, or fork from the latest useful context.'
      };
    }

    function renderContextBanner(banner) {
      if (!banner) return '';
      return `
        <section class="context-banner" data-testid="context-banner" aria-label="Context limit warning">
          <header>
            <strong data-testid="context-banner-title">${escapeHTML(banner.title)}</strong>
            <span data-testid="context-banner-percent">${escapeHTML(banner.usedPercent)}%</span>
          </header>
          <p data-testid="context-banner-subtitle">${escapeHTML(banner.subtitle)}</p>
          <div>
            <button type="button" data-testid="context-compact" data-command-id="compact-context">Compact context</button>
            <button type="button" data-testid="context-new-thread" data-command-id="new-chat">New thread</button>
            <button type="button" data-testid="context-fork-last" data-command-id="fork-from-last">Fork from last</button>
          </div>
        </section>`;
    }

    function renderRuntimeIssue(issue, options = {}) {
      if (!issue) return '';
      const severity = issue.severity || 'warning';
      const diagnostics = options.showDiagnostics && (issue.diagnostics || []).length ? `
        <dl class="runtime-diagnostics" data-testid="runtime-diagnostics">
          ${issue.diagnostics.map(diagnostic => `
            <div data-testid="runtime-diagnostic">
              <dt data-testid="runtime-diagnostic-label">${escapeHTML(diagnostic.label)}</dt>
              <dd data-testid="runtime-diagnostic-value">${escapeHTML(diagnostic.value)}</dd>
            </div>`).join('')}
        </dl>` : '';
      return `
        <section class="runtime-issue ${escapeHTML(severity)}" data-testid="runtime-issue" data-severity="${escapeHTML(severity)}" aria-label="Runtime issue">
          <header>
            <strong data-testid="runtime-issue-title">${escapeHTML(issue.title)}</strong>
            <span data-testid="runtime-issue-severity">${escapeHTML(severity)}</span>
          </header>
          <p data-testid="runtime-issue-message">${escapeHTML(issue.message)}</p>
          ${issue.actionLabel ? `<button type="button" data-testid="runtime-issue-action">${escapeHTML(issue.actionLabel)}</button>` : ''}
          ${diagnostics}
        </section>`;
    }

    function captureTranscriptScroll() {
      const timeline = document.querySelector('[data-testid="timeline"]');
      const documentElement = document.documentElement;
      const maxWindowScrollY = Math.max(0, documentElement.scrollHeight - window.innerHeight);
      const windowDistanceFromBottom = maxWindowScrollY - window.scrollY;
      if (!timeline) {
        return {
          windowScrollY: window.scrollY,
          wasWindowPinnedToBottom: windowDistanceFromBottom <= 24
        };
      }
      const maxTimelineScrollTop = Math.max(0, timeline.scrollHeight - timeline.clientHeight);
      const timelineDistanceFromBottom = maxTimelineScrollTop - timeline.scrollTop;
      return {
        windowScrollY: window.scrollY,
        wasWindowPinnedToBottom: windowDistanceFromBottom <= 24,
        timelineScrollTop: timeline.scrollTop,
        wasTimelinePinnedToBottom: timelineDistanceFromBottom <= 24
      };
    }

    function restoreTranscriptScroll(snapshot) {
      if (!snapshot) return;
      const documentElement = document.documentElement;
      if (snapshot.wasWindowPinnedToBottom) {
        window.scrollTo(0, documentElement.scrollHeight);
      } else {
        const maxWindowScrollY = Math.max(0, documentElement.scrollHeight - window.innerHeight);
        window.scrollTo(0, Math.min(snapshot.windowScrollY || 0, maxWindowScrollY));
      }
      const timeline = document.querySelector('[data-testid="timeline"]');
      if (!timeline) return;
      if (snapshot.wasTimelinePinnedToBottom) {
        timeline.scrollTop = timeline.scrollHeight;
        return;
      }
      const maxScrollTop = Math.max(0, timeline.scrollHeight - timeline.clientHeight);
      timeline.scrollTop = Math.min(snapshot.timelineScrollTop || 0, maxScrollTop);
    }

    function render() {
      const scrollSnapshot = captureTranscriptScroll();
      updateDynamicCommands();
      syncAutomationsSurface();
      const context = renderContextBanner(contextBanner());
      const runtimeIssue = renderRuntimeIssue(state.runtimeIssue);
      const review = state.review.files.length ? `
        <section class="review-pane" data-testid="review-pane" aria-label="Git review summary">
          <header>
            <strong>${escapeHTML(state.review.title)}</strong>
            <span data-testid="review-summary">${escapeHTML(state.review.subtitle)}</span>
          </header>
          <ul>
            ${state.review.files.map(file => `
              <li data-testid="review-file">
                <span data-testid="review-file-path">${escapeHTML(file.path)}</span>
                <span class="review-actions">
                  <small>${escapeHTML(file.changeLabel)}</small>
                  <button type="button" data-testid="review-action" data-action="stage" data-path="${escapeHTML(file.path)}">Stage</button>
                  <button type="button" data-testid="review-action" data-action="restore" data-path="${escapeHTML(file.path)}">Restore</button>
                </span>
                ${(file.hunks || []).length ? `
                  <div class="review-hunks">
                    ${file.hunks.map(hunk => `
                      <div class="review-hunk" data-testid="review-hunk">
                        <div class="review-hunk-header">
                          <code data-testid="review-hunk-header">${escapeHTML(hunk.header)}</code>
                          <span class="review-actions">
                            <small>${escapeHTML(hunk.changeLabel)}</small>
                            <button type="button" data-testid="review-action" data-action="stage_hunk" data-path="${escapeHTML(file.path)}">Stage hunk</button>
                            <button type="button" data-testid="review-action" data-action="restore_hunk" data-path="${escapeHTML(file.path)}">Restore hunk</button>
                          </span>
                        </div>
                        <form class="review-range-comment-form" data-testid="review-range-comment-form" data-path="${escapeHTML(file.path)}">

    function filterModelCategories(query) {
      const terms = query.trim().toLowerCase().split(/\s+/).filter(Boolean);
      if (!terms.length) return state.topBar.modelCategories;
      const includesFavoriteTerm = terms.includes('favorite') || terms.includes('favorites');
      const includesRecentTerm = terms.includes('recent');
      return state.topBar.modelCategories
        .filter(category => !includesFavoriteTerm || category.category === 'Favorites')
        .filter(category => !includesRecentTerm || category.category === 'Recent')
        .filter(category => category.category !== 'Favorites' || includesFavoriteTerm)
        .filter(category => category.category !== 'Recent' || includesRecentTerm)
        .map(category => ({
          ...category,
          models: category.models.filter(model => {
            const haystack = [
              category.category,
              model.id,
              model.provider,
              model.displayName,
              model.category || category.category,
              model.detailTitle || `${model.provider}/${model.displayName}`,
              modelCapabilitySummary(model, category.category),
              modelMetadataSummary(model, category.category),
              modelMetadataDetails(model, category.category).join(' '),
              modelMetadataRows(model, category.category).map(row => `${row.label}: ${row.value}`).join(' '),
              (model.badges || []).join(' ')
            ].join(' ').toLowerCase();
            return terms.every(term => haystack.includes(term));
          })
        }))
        .filter(category => category.models.length > 0);
    }

    function filteredModels() {
      return filterModelCategories(state.topBar.modelSearch).flatMap(category => category.models);
    }

    function ensureHighlightedModel(preferredID) {
      const models = filteredModels();
      if (preferredID && models.some(model => model.id === preferredID)) {
        state.topBar.highlightedModelID = preferredID;
        return;
      }
      if (state.topBar.highlightedModelID && models.some(model => model.id === state.topBar.highlightedModelID)) {
        return;
      }
      state.topBar.highlightedModelID = models[0]?.id || null;
    }

    function moveHighlightedModel(delta) {
      const models = filteredModels();
      if (!models.length) {
        state.topBar.highlightedModelID = null;
        render();
        document.querySelector('[data-testid="model-search"]')?.focus();
        return;
      }
      const currentIndex = Math.max(0, models.findIndex(model => model.id === state.topBar.highlightedModelID));
      const nextIndex = (currentIndex + delta + models.length) % models.length;
      state.topBar.highlightedModelID = models[nextIndex].id;
      render();
      document.querySelector('[data-testid="model-search"]')?.focus();
    }

    function selectHighlightedModel() {
      ensureHighlightedModel(state.topBar.highlightedModelID);
      if (state.topBar.highlightedModelID) {
        selectModel(state.topBar.highlightedModelID);
      }
    }

    function selectModel(selectedID) {
      const allModels = state.topBar.modelCategories.flatMap(category => category.models);
      const selected = allModels.find(model => model.id === selectedID);
      if (!selected) return;
      state.topBar.selectedModelID = selected.id;
      state.topBar.modelLabel = modelDisplayLabel(selected);
      state.topBar.modelPickerOpen = false;
      state.topBar.modelSearch = '';
      state.topBar.expandedModelID = null;
      state.topBar.highlightedModelID = null;
      state.topBar.modelCategories = state.topBar.modelCategories.map(category => ({
        ...category,
        models: category.models.map(model => {
          const selectedMatch = model.id === selected.id;
          const withoutCurrent = (model.badges || []).filter(badge => badge !== 'Current');
          return {
            ...model,
            isSelected: selectedMatch,
            badges: selectedMatch ? ['Current', ...withoutCurrent] : withoutCurrent
          };
        })
      }));
      render();
    }

    function cycleMode() {
      const modes = ['Auto', 'Review', 'Read-only'];
      const currentIndex = modes.indexOf(state.topBar.modeLabel);
      setModeLabel(modes[(currentIndex + 1) % modes.length]);
      render();
    }

    function setModeLabel(nextMode) {
      state.topBar.modeLabel = nextMode;
      const selectedProject = state.projects.items.find(project => project.id === state.projects.selectedProjectID);
      state.topBar.subtitle = `${selectedProject?.name || 'No project'} - ${state.topBar.modeLabel} - ${state.topBar.modelLabel}`;
    }

    function modeTone(modeLabel) {
      const normalized = String(modeLabel || '').toLowerCase();
      if (normalized === 'review') return 'review';
      if (normalized === 'read-only') return 'read-only';
      return 'auto';
    }

    function modelDisplayLabel(model) {
      if (model.id === 'trustedrouter/fast') return 'Nike 1.0';
      if (model.id === 'tr/synth') return 'Synth';
      if (model.id === 'tr/synth-code') return 'Synth Code';
      if (model.provider === 'trustedrouter') return model.id;
      return `${model.provider}/${model.displayName}`;
    }

    function modelBadgeClass(badge) {
      const normalized = String(badge || '').toLowerCase();
      if (normalized === 'current') return 'current';
      if (normalized === 'favorite') return 'favorite';
      return '';
    }

    function toggleModelFavorite(modelID) {
      const models = state.topBar.modelCategories.flatMap(category => category.models);
      const isFavorite = models.some(model => model.id === modelID && model.isFavorite);
      state.topBar.modelCategories = state.topBar.modelCategories
        .filter(category => category.category !== 'Favorites')
        .map(category => ({
          ...category,
          models: category.models.map(model => model.id === modelID
            ? setModelFavorite(model, !isFavorite)
            : model)
        }));
      syncFavoriteModels();
      render();
    }

    function syncFavoriteModels() {
      const favoriteModels = [];
      const seen = new Set();
      state.topBar.modelCategories
        .filter(category => category.category !== 'Favorites')
        .flatMap(category => category.models)
        .forEach(model => {
          if (!model.isFavorite || seen.has(model.id)) return;
          seen.add(model.id);
          favoriteModels.push(setModelFavorite(model, true));
        });
      if (favoriteModels.length) {
        state.topBar.modelCategories.unshift({
          category: 'Favorites',
          models: favoriteModels
        });
      }
    }

    function setModelFavorite(model, isFavorite) {
      const badges = isFavorite
        ? uniqueBadges(['Favorite', ...(model.badges || [])])
        : (model.badges || []).filter(badge => badge !== 'Favorite');
      return {
        ...model,
        isFavorite,
        badges
      };
    }

    function modelMetadataSummary(model, categoryName) {
      if (model.metadataSummary) return model.metadataSummary;
      if (model.id === 'trustedrouter/fast') return 'Fast everyday agent';
      if (model.id === 'tr/synth') return 'Deeper planning and review';
      if (model.id === 'tr/synth-code') return 'Code-focused model';
      const category = model.category || categoryName || 'Models';
      if (category === 'Safety') return 'Auto safety reviewer';
      return `${category} model`;
    }

    function modelCapabilitySummary(model, categoryName) {
      if (model.capabilitySummary) return model.capabilitySummary;
      if (model.id === 'trustedrouter/fast') return 'Nike 1.0 is the fast default for coding, shell, and file-editing turns.';
      if (model.id === 'tr/synth') return 'Synth is the balanced model for deeper coding and review turns.';
      if (model.id === 'tr/synth-code') return 'Synth Code is the code-focused model for implementation-heavy turns.';
      if ((model.badges || []).includes('Recommended')) return 'Recommended model profile available through TrustedRouter.';
      const category = model.category || categoryName || 'Models';
      if (category === 'Safety') return 'Lightweight reviewer model for Auto safety decisions.';
      return `${category} model available through TrustedRouter.`;
    }

    function modelMetadataRows(model, categoryName) {
      if (Array.isArray(model.metadataRows) && model.metadataRows.length) {
        return model.metadataRows;
      }
      const category = model.category || categoryName || 'Models';
      const badges = model.badges || [];
      const stateLabels = [
        model.isSelected || model.id === state.topBar.selectedModelID ? 'Current' : null,
        badges.includes('Default') ? 'Default' : null,
        badges.includes('Recommended') ? 'Recommended' : null,
        model.isFavorite || badges.includes('Favorite') ? 'Favorite' : null,
        badges.includes('Recent') ? 'Recent' : null
      ].filter(Boolean);
      return [
        { label: 'Provider', value: model.provider },
        { label: 'Model ID', value: model.id },
        { label: 'Category', value: category },
        { label: 'State', value: stateLabels.length ? uniqueStrings(stateLabels).join(', ') : 'Available' }
      ];
    }

    function modelMetadataDetails(model, categoryName) {
      if (Array.isArray(model.metadataDetails) && model.metadataDetails.length) {
        return model.metadataDetails;
      }
      const category = model.category || categoryName || 'Models';
      const details = [
        `Provider: ${model.provider}`,
        `Model ID: ${model.id}`,
        `Category: ${category}`
      ];
      if (model.isSelected || model.id === state.topBar.selectedModelID) {
        details.push('Current selection');
      }
      if (model.isFavorite) {
        details.push('Favorite');
      }
      (model.badges || []).forEach(badge => {
        if (badge === 'Default') details.push('Default model');
        else if (badge === 'Recommended') details.push('Recommended by QuillCode');
        else if (badge === 'Recent') details.push('Recently used');
        else if (badge !== 'Current' && badge !== 'Favorite') details.push(badge);
      });
      return uniqueStrings(details);
    }

    function uniqueStrings(values) {
      const seen = new Set();
      return values.filter(value => {
        if (seen.has(value)) return false;
        seen.add(value);
        return true;
      });
    }

    function uniqueBadges(badges) {
      const seen = new Set();
      return badges.filter(badge => {
        if (seen.has(badge)) return false;
        seen.add(badge);
        return true;
      });
    }
