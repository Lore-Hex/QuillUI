name: Enchanted Parity

# macOS-reference VISUAL parity gate for the REAL upstream Enchanted source
# running on Linux via the generic backend (epic #188 step 1). Renders the
# real-source `quill-chat-linux` app at the reference window and asserts the
# STRUCTURAL LANDMARKS of the genuine Enchanted.app empty state
# (Tests/Fixtures/Enchanted/macos-reference.png) via verify-backend-screenshot.py's
# validate_quill_chat_mac_reference(): sidebar divider ratio + footer nav, window
# controls, header divider, toolbar, the centered gradient wordmark, the 4-card
# prompt row, the unreachable-API alert, and the composer.
#
# Revives the verifier from codex/issue-24. That original gated a 0.95 cross-stack
# PIXEL ratio against the reference screenshot; we deliberately DROPPED that bar —
# pixel-identity between macOS Cocoa and Linux GTK/Pango overfits one screenshot
# and is not a meaningful port metric. The structural landmarks above ARE the
# parity proof; the uploaded render is the human-eyeball reference each run. Kept
# as its OWN workflow (does not gate the main "Linux CI").
#
# This workflow also runs NON-GATING (continue-on-error) real-source measurements
# toward INTERACTION coverage (epic #188 step 2), building toward retiring the
# hand-written reimpl. The mac-reference RENDER is correct, but its xdotool-RESIZED
# window can't receive input in headless CI (clicks + keyboard => byte-identical
# render). The app renders ~2048 wide regardless of window-size env, so interaction
# runs in the app's NATURAL un-resized window (QUILLUI_BACKEND_NO_REFERENCE_RESIZE),
# where xdotool input works (the reimpl's un-resized smokes prove it), reusing the
# mac-reference env + validators.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  strict-mac-reference:
    name: Strict Mac-reference verifier (real-source quill-chat-linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    container:
      image: swift:6.2-noble
    env:
      QUILLUI_SKIP_APT: "1"
      QUILLUI_BACKEND_MAC_REFERENCE: "1"
      QUILL_CHAT_DIR: ${{ github.workspace }}/.upstream/enchanted

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            dbus-x11 \
            git \
            imagemagick \
            libgdk-pixbuf-2.0-dev \
            libgtk-4-dev \
            libsqlite3-dev \
            pkg-config \
            qt6-base-dev \
            ripgrep \
            x11-apps \
            xdotool \
            xvfb
          rm -rf /var/lib/apt/lists/*

      - name: Fetch Enchanted upstream source
        run: scripts/fetch-upstream.sh enchanted

      - name: Run strict Enchanted GTK mac-reference verifier
        run: |
          QUILLUI_BACKEND_VISUAL_APP_LOG=.qa/quillui-backend-app.log \
            scripts/linux-backend-visual-check.sh \
              .qa/quill-chat-linux-mac-reference-gtk.png \
              quill-chat-linux \
              gtk

      - name: Measure real-source composer-typed, no resize (non-gating)
        if: always()
        continue-on-error: true
        env:
          # The app renders ~2048 wide regardless of window-size env (it can't be shrunk
          # to a small window). The mac-reference RENDER is correct, but its
          # xdotool-RESIZED window can't receive input in headless CI (clicks + keys =>
          # byte-identical render). The reimpl's UN-RESIZED window takes input fine, so
          # the hypothesis is that the RESIZE is the input-killer. NO_REFERENCE_RESIZE=1
          # keeps the mac-reference env/validators/screen but skips the windowsize,
          # leaving the app at its natural width and capturing the window directly. If
          # composer-typed now detects typed text, un-resized mac-reference interaction
          # works and the rich existing mac-reference interaction validators are reusable.
          QUILLUI_BACKEND_INTERACTION_MODE: composer-typed
          QUILLUI_BACKEND_NO_REFERENCE_RESIZE: "1"
          # The real source renders ~2048 wide intrinsically (ignores the window-size
          # env). The reimpl's interaction input works only because its default window
          # is SMALL and does not fill the screen; the 2048 window fills the 2048
          # mac-reference screen, and a screen-filling window under bare Xvfb (no WM)
          # appears not to receive xdotool pointer/keyboard events. Give the interaction
          # a LARGER screen so the ~2048 window no longer fills it, and re-test input.
          QUILLUI_BACKEND_INTERACTION_SCREEN_SIZE: "2400x1600x24"
        run: |
          QUILLUI_BACKEND_INTERACTION_APP_LOG=.qa/quill-chat-linux-noresize-composer.log \
            scripts/linux-backend-interaction-check.sh \
              .qa/quill-chat-linux-mac-reference-composer-typed-gtk.png \
              quill-chat-linux \
              gtk

      - name: List .qa (debug visibility)
        if: always()
        run: |
          echo "pwd=$(pwd)"
          ls -laR .qa 2>&1 || echo "(.qa missing)"

      - name: Upload verifier artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enchanted-parity-verifier
          path: |
            .qa/**
          # .qa is a DOT-directory; upload-artifact@v4 excludes hidden files by
          # default, which is why the render never uploaded ("No files found").
          include-hidden-files: true
          if-no-files-found: warn
