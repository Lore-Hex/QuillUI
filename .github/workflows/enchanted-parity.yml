name: Enchanted Parity

# macOS-reference VISUAL parity gate for the REAL upstream Enchanted source
# running on Linux via the generic backend (epic #188 step 1). Renders the
# real-source `quill-chat-linux` app at the reference window and asserts the
# STRUCTURAL LANDMARKS of the genuine Enchanted.app empty state
# (Tests/Fixtures/Enchanted/macos-reference.png) via verify-backend-screenshot.py's
# validate_quill_chat_mac_reference(): sidebar divider ratio + footer nav, window
# controls, header divider, toolbar, the centered gradient wordmark, the 4-card
# prompt row, the unreachable-API alert, and the composer.
#
# Revives the verifier from codex/issue-24. That original gated a 0.95 cross-stack
# PIXEL ratio against the reference screenshot; we deliberately DROPPED that bar —
# pixel-identity between macOS Cocoa and Linux GTK/Pango overfits one screenshot
# and is not a meaningful port metric. The structural landmarks above ARE the
# parity proof; the uploaded render is the human-eyeball reference each run. Kept
# as its OWN workflow (does not gate the main "Linux CI").
#
# This workflow also runs NON-GATING (continue-on-error) real-source measurements
# toward INTERACTION coverage (epic #188 step 2), building toward retiring the
# hand-written reimpl. mac-reference INTERACTION proved a dead end in headless CI
# (clicks + keyboard don't reach the placed 2048x1380 window), so interaction
# coverage runs in NORMAL window mode, where xdotool input works (the reimpl smokes
# prove it). The foundation measurement confirms quill-chat-linux launches + renders
# in a small normal window; click-based interaction validators build on it.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  strict-mac-reference:
    name: Strict Mac-reference verifier (real-source quill-chat-linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    container:
      image: swift:6.2-noble
    env:
      QUILLUI_SKIP_APT: "1"
      QUILLUI_BACKEND_MAC_REFERENCE: "1"
      QUILL_CHAT_DIR: ${{ github.workspace }}/.upstream/enchanted

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            dbus-x11 \
            git \
            imagemagick \
            libgdk-pixbuf-2.0-dev \
            libgtk-4-dev \
            libsqlite3-dev \
            pkg-config \
            qt6-base-dev \
            ripgrep \
            x11-apps \
            xdotool \
            xvfb
          rm -rf /var/lib/apt/lists/*

      - name: Fetch Enchanted upstream source
        run: scripts/fetch-upstream.sh enchanted

      - name: Run strict Enchanted GTK mac-reference verifier
        run: |
          QUILLUI_BACKEND_VISUAL_APP_LOG=.qa/quillui-backend-app.log \
            scripts/linux-backend-visual-check.sh \
              .qa/quill-chat-linux-mac-reference-gtk.png \
              quill-chat-linux \
              gtk

      - name: Measure real-source NORMAL-window render (non-gating)
        if: always()
        continue-on-error: true
        env:
          # mac-reference INTERACTION is a dead end in headless CI: clicks AND keyboard
          # produce zero effect on the placed 2048x1380 reference window (empty /
          # post-click / post-type frames byte-identical). Real-source interaction
          # coverage will therefore run in NORMAL window mode, where xdotool input works
          # (proven by the reimpl interaction smokes). This is the FOUNDATION step:
          # confirm the real-source quill-chat-linux launches + renders its empty state
          # in a small normal window in CI (validate_quill_chat_landmarks) before adding
          # click-based interaction validators (new-chat, list-selection, ...) on top.
          QUILLUI_BACKEND_MAC_REFERENCE: "0"
          QUILLUI_BACKEND_DEFAULT_WINDOW_WIDTH: "1180"
          QUILLUI_BACKEND_DEFAULT_WINDOW_HEIGHT: "760"
          QUILLUI_QUILL_CHAT_FORCE_UNREACHABLE: "1"
        run: |
          QUILLUI_BACKEND_VISUAL_APP_LOG=.qa/quill-chat-linux-normal.log \
            scripts/linux-backend-visual-check.sh \
              .qa/quill-chat-linux-normal-gtk.png \
              quill-chat-linux \
              gtk

      - name: List .qa (debug visibility)
        if: always()
        run: |
          echo "pwd=$(pwd)"
          ls -laR .qa 2>&1 || echo "(.qa missing)"

      - name: Upload verifier artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enchanted-parity-verifier
          path: |
            .qa/**
          # .qa is a DOT-directory; upload-artifact@v4 excludes hidden files by
          # default, which is why the render never uploaded ("No files found").
          include-hidden-files: true
          if-no-files-found: warn
