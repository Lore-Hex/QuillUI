name: Enchanted Parity

# macOS-reference VISUAL parity gate for the REAL upstream Enchanted source
# running on Linux via the generic backend (epic #188 step 1). Renders the
# real-source `quill-chat-linux` app at the reference window and asserts the
# STRUCTURAL LANDMARKS of the genuine Enchanted.app empty state
# (Tests/Fixtures/Enchanted/macos-reference.png) via verify-backend-screenshot.py's
# validate_quill_chat_mac_reference(): sidebar divider ratio + footer nav, window
# controls, header divider, toolbar, the centered gradient wordmark, the 4-card
# prompt row, the unreachable-API alert, and the composer.
#
# Revives the verifier from codex/issue-24. That original gated a 0.95 cross-stack
# PIXEL ratio against the reference screenshot; we deliberately DROPPED that bar —
# pixel-identity between macOS Cocoa and Linux GTK/Pango overfits one screenshot
# and is not a meaningful port metric. The structural landmarks above ARE the
# parity proof; the uploaded render is the human-eyeball reference each run. Kept
# as its OWN workflow (does not gate the main "Linux CI").
#
# This workflow also gates real-source INTERACTION smokes (epic #188 step 2):
# it drives quill-chat-linux through mac-reference interaction paths such as
# composer typing, then checks the captured frame with product-specific
# validators.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  strict-mac-reference:
    name: Strict Mac-reference verifier (real-source quill-chat-linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    container:
      image: swift:6.2-noble
    env:
      QUILLUI_SKIP_APT: "1"
      QUILLUI_BACKEND_MAC_REFERENCE: "1"
      QUILL_CHAT_DIR: ${{ github.workspace }}/.upstream/enchanted
      # Match Linux CI's tuned guard floor. The default 12 GiB threshold can
      # fail after the generated Enchanted build on otherwise healthy runners.
      QUILLUI_RESOURCE_GUARD_MIN_FREE_GIB: "6"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            dbus-x11 \
            fontconfig \
            fonts-noto-cjk \
            fonts-noto-color-emoji \
            fonts-noto-core \
            git \
            imagemagick \
            libgdk-pixbuf-2.0-dev \
            libgtk-4-dev \
            libsqlite3-dev \
            openbox \
            pkg-config \
            qt6-base-dev \
            ripgrep \
            x11-apps \
            xdotool \
            xvfb
          rm -rf /var/lib/apt/lists/*

      - name: Fetch Enchanted upstream source
        run: scripts/fetch-upstream.sh enchanted

      - name: Run strict Enchanted GTK mac-reference verifier
        run: |
          QUILLUI_BACKEND_VISUAL_APP_LOG=.qa/quillui-backend-app.log \
            scripts/linux-backend-visual-check.sh \
              .qa/quill-chat-linux-mac-reference-gtk.png \
              quill-chat-linux \
              gtk

      - name: Package real-source GTK release artifact
        run: |
          scripts/package-swiftui-linux-app.sh \
            --profile enchanted-full-source \
            --source-dir "$QUILL_CHAT_DIR/Enchanted" \
            --app-type EnchantedApp \
            --product-name quill-chat-linux \
            --workdir .build/quill-chat-linux-gtk \
            --backend-facade gtk \
            --artifact-dir .build/releases/quill-chat-linux-gtk \
            --tarball .qa/quill-chat-linux-gtk-release.tar.gz \
            --display-name "Quill Chat" \
            --app-id io.lorehex.QuillChat \
            --summary "Quill Chat is an Apple Swift chat app packaged for Linux through QuillUI." \
            --categories "Utility;Network;" \
            --bundle-swift-runtime
          scripts/check-linux-app-metadata.sh \
            .build/releases/quill-chat-linux-gtk \
            io.lorehex.QuillChat \
            quill-chat-linux \
            "Quill Chat"
          scripts/generate-flatpak-manifest.sh \
            --artifact-dir .build/releases/quill-chat-linux-gtk \
            --output .qa/io.lorehex.QuillChat.flatpak.json
          python3 -m json.tool .qa/io.lorehex.QuillChat.flatpak.json >/dev/null
          scripts/check-linux-app-runtime-deps.sh \
            .build/releases/quill-chat-linux-gtk \
            quill-chat-linux \
            --require-bundled-swift-runtime \
            --report .qa/quill-chat-linux-runtime-deps.tsv
          echo "QUILLUI_BACKEND_APP_EXECUTABLE=$PWD/.build/releases/quill-chat-linux-gtk/run" >> "$GITHUB_ENV"

      - name: Run packaged release artifact visual verifier
        env:
          QUILLUI_BACKEND_SKIP_BUILD: "1"
        run: |
          QUILLUI_BACKEND_VISUAL_APP_LOG=.qa/quill-chat-linux-release-artifact-visual.log \
            scripts/linux-backend-visual-check.sh \
              .qa/quill-chat-linux-release-artifact-gtk.png \
              quill-chat-linux \
              gtk

      - name: Run real-source composer-typed interaction verifier
        env:
          QUILLUI_BACKEND_SKIP_BUILD: "1"
          QUILLUI_BACKEND_INTERACTION_MODE: composer-typed
        run: |
          # Prove the REAL source's composer accepts typed
          # input via the generic GTK backend (no Ollama / no seeded history needed).
          # The harness routes quill-chat-linux + composer-typed
          # (with MAC_REFERENCE=1) to the typed-composer validator.
          QUILLUI_BACKEND_INTERACTION_APP_LOG=.qa/quill-chat-linux-interaction-composer.log \
            scripts/linux-backend-interaction-check.sh \
              .qa/quill-chat-linux-mac-reference-composer-typed-gtk.png \
              quill-chat-linux \
              gtk

      - name: Run real-source composer-send interaction verifier
        env:
          QUILLUI_BACKEND_SKIP_BUILD: "1"
          QUILLUI_BACKEND_INTERACTION_MODE: composer-send
        run: |
          # Prove typed composer content can be submitted into a chat message.
          # This deterministic mac-reference row keeps Ollama unreachable, so
          # live HTTP/persistence is covered by the functional row below.
          QUILLUI_BACKEND_INTERACTION_APP_LOG=.qa/quill-chat-linux-interaction-composer-send.log \
            scripts/linux-backend-interaction-check.sh \
              .qa/quill-chat-linux-mac-reference-composer-send-gtk.png \
              quill-chat-linux \
              gtk

      - name: Run packaged release artifact interaction verifiers
        env:
          QUILLUI_BACKEND_SKIP_BUILD: "1"
          QUILLUI_BACKEND_INTERACTION_APP_LOG_TEMPLATE: ".qa/quill-chat-linux-release-artifact-{mode}.log"
          QUILLUI_BACKEND_INTERACTION_MODE_TIMEOUT: "120s"
        run: |
          # Gate the packaged release launcher through the Mac-reference
          # settings/completions/sidebar/transcript paths that exercise the
          # Enchanted profile's real SwiftData-backed history, relationship
          # fetches, markdown rendering, and long-scroll behavior.
          quill_chat_modes="$(scripts/quillui-backend-products.sh quill-chat-mac-reference-interaction-modes)"
          # shellcheck disable=SC2086
          scripts/run-linux-backend-interaction-modes.sh \
            ".qa/quill-chat-linux-release-artifact-{mode}-gtk.png" \
            quill-chat-linux \
            gtk \
            $quill_chat_modes

      - name: Run live composer-send and relaunch functional verifier
        env:
          QUILLUI_BACKEND_SKIP_BUILD: "1"
          QUILLUI_FUNCTIONAL_COMPOSER_X: "700"
          QUILLUI_FUNCTIONAL_COMPOSER_Y: "1190"
          QUILLUI_FUNCTIONAL_VERIFY_RELAUNCH: "1"
        run: |
          # Prove the real-source composer submits to Ollama and persists
          # the streamed user/assistant turn through QuillData, then relaunch
          # with the same data home and select the saved conversation from disk.
          QUILLUI_FUNCTIONAL_APP_LOG=.qa/quill-chat-linux-functional-app.log \
          QUILLUI_FUNCTIONAL_MOCK_LOG=.qa/quill-chat-linux-functional-ollama.log \
            timeout --kill-after=15s 180s \
            scripts/quill-chat-functional-check.sh \
              .qa/quill-chat-linux-functional-composer-send-gtk.png \
              quill-chat-linux \
              gtk

      - name: Run live attachment-send functional verifier
        env:
          QUILLUI_BACKEND_SKIP_BUILD: "1"
          QUILLUI_FUNCTIONAL_MODE: attachment-send
          QUILLUI_FUNCTIONAL_MESSAGE: "describe this image from linux"
          QUILLUI_FUNCTIONAL_COMPOSER_X: "700"
          QUILLUI_FUNCTIONAL_COMPOSER_Y: "1190"
          QUILLUI_FUNCTIONAL_VERIFY_RELAUNCH: "1"
        run: |
          # Prove the real-source composer routes selected image data through
          # Ollama's `images` request payload and persists user image bytes.
          QUILLUI_FUNCTIONAL_APP_LOG=.qa/quill-chat-linux-functional-attachment-app.log \
          QUILLUI_FUNCTIONAL_MOCK_LOG=.qa/quill-chat-linux-functional-attachment-ollama.log \
          QUILLUI_FUNCTIONAL_HOME=.qa/quill-chat-functional-attachment-home \
            timeout --kill-after=15s 180s \
            scripts/quill-chat-functional-check.sh \
              .qa/quill-chat-linux-functional-attachment-send-gtk.png \
              quill-chat-linux \
              gtk

      - name: List .qa (debug visibility)
        if: always()
        run: |
          echo "pwd=$(pwd)"
          ls -laR .qa 2>&1 || echo "(.qa missing)"

      - name: Upload verifier artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enchanted-parity-verifier
          path: |
            .qa/**
          # .qa is a DOT-directory; upload-artifact@v4 excludes hidden files by
          # default, which is why the render never uploaded ("No files found").
          include-hidden-files: true
          retention-days: 1
          if-no-files-found: warn
