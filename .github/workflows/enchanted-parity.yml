name: Enchanted Parity

# Strict macOS-reference VISUAL parity gate for the REAL upstream Enchanted
# source running on Linux via the generic backend (epic #188 step 1). Renders
# the real-source `quill-chat-linux` app at the reference window and diffs it
# against Tests/Fixtures/Enchanted/macos-reference.png (the genuine Enchanted.app
# screenshot), asserting QUILLUI_BACKEND_MAC_REFERENCE_MIN_RATIO.
#
# Revives the verifier from codex/issue-24 (which last failed at ratio<0.95 with
# the detail-pane layout broken); that layout was fixed in #207, so this measures
# the real-source visual parity now. Kept as its OWN workflow (does not gate the
# main "Linux CI"); promote/relax the ratio as parity lands.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  strict-mac-reference:
    name: Strict Mac-reference verifier (real-source quill-chat-linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    container:
      image: swift:6.2-noble
    env:
      QUILLUI_SKIP_APT: "1"
      QUILLUI_BACKEND_MAC_REFERENCE: "1"
      QUILLUI_BACKEND_MAC_REFERENCE_MIN_RATIO: "0.95"
      QUILL_CHAT_DIR: ${{ github.workspace }}/.upstream/enchanted

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            dbus-x11 \
            git \
            imagemagick \
            libgdk-pixbuf-2.0-dev \
            libgtk-4-dev \
            libsqlite3-dev \
            pkg-config \
            qt6-base-dev \
            ripgrep \
            x11-apps \
            xdotool \
            xvfb
          rm -rf /var/lib/apt/lists/*

      - name: Fetch Enchanted upstream source
        run: scripts/fetch-upstream.sh enchanted

      - name: Run strict Enchanted GTK mac-reference verifier
        run: |
          QUILLUI_BACKEND_VISUAL_APP_LOG=.qa/quillui-backend-app.log \
            scripts/linux-backend-visual-check.sh \
              .qa/quill-chat-linux-mac-reference-gtk.png \
              quill-chat-linux \
              gtk

      - name: List .qa (debug visibility)
        if: always()
        run: |
          echo "pwd=$(pwd)"
          ls -laR .qa 2>&1 || echo "(.qa missing)"

      - name: Upload verifier artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enchanted-parity-verifier
          path: |
            .qa/**
          # .qa is a DOT-directory; upload-artifact@v4 excludes hidden files by
          # default, which is why the render never uploaded ("No files found").
          include-hidden-files: true
          if-no-files-found: warn
