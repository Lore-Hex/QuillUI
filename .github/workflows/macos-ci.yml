name: macOS CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-apps:
    name: Build all 4 apps + test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Shell syntax
        run: scripts/check-shell-syntax.sh

      - name: Restore upstream source cache
        uses: ./.github/actions/upstream-cache
        with:
          cache-name: default

      # The NetNewsWire/WireGuard/CodeEdit upstreams live under
      # `.upstream/` (gitignored). Fetch them so the matching
      # Package.swift targets resolve. Without this step the
      # gated targets are simply absent — QuillUI/QuillEnchanted
      # still build.
      - name: Fetch upstream sources
        run: scripts/fetch-upstream.sh

      # Each Quill app is built individually so a failure in one doesn't
      # prevent the others from being reported. CI fails if any cannot
      # build cleanly on macOS.
      - name: Build QuillUI core library
        run: swift build --target QuillUI

      # Keep the portable backend facade modules compile-gated on
      # Darwin too. Linux CI owns the native smoke executables because
      # those targets are Linux-only in Package.swift.
      - name: Build QuillUIGtk facade
        run: swift build --target QuillUIGtk

      - name: Build QuillUIQt facade
        run: swift build --target QuillUIQt

      # QuillChatKit holds the shared chat chrome (ChatBubble,
      # ChatRow, ChatTimeline) consumed by both QuillSignal and
      # QuillTelegram. Hard-gated so a regression here surfaces
      # before the per-app Signal/Telegram builds.
      - name: Build QuillChatKit
        run: swift build --target QuillChatKit

      - name: Build QuillChatKit for iOS simulator
        run: scripts/check-quillchatkit-ios.sh

      - name: Build QuillChatKitTests
        run: swift build --target QuillChatKitTests

      # QuillKitTests was orphaned from Package.swift after the
      # Linux compatibility-base rewrite; the file (~10 tests
      # covering clipboard / diagnostics / capability matrix /
      # launch service / speech backend) is purely against
      # QuillKit and now re-wired. Hard-gated so a regression in
      # the QuillKit platform-services API surfaces at build
      # time.
      - name: Build QuillKitTests
        run: swift build --target QuillKitTests

      # Pins the IceCubesAPI Mastodon surface: HTMLString
      # tag/entity stripping, Account/Status snake_case JSON
      # decoding, Timelines query construction, MastodonClient
      # defaults. All pure Foundation, no transitive
      # CombineSchedulers pull-in.
      - name: Build QuillIceCubesCoreTests
        run: swift build --target QuillIceCubesCoreTests

      # Pins QuillNetNewsWireCore's local RSS 2.0 + Atom parser
      # via fixture XML strings: title / link / pubDate /
      # description decoding, CDATA, Untitled + id fallbacks,
      # and RSSItem's derived URL + plain-text properties.
      - name: Build QuillNetNewsWireCoreTests
        run: swift build --target QuillNetNewsWireCoreTests

      # Pins QuillCodeEditCore: ProjectFile.extension parsing
      # (used by the sidebar icon switch), ID uniqueness, and
      # the QuillSample fixture project shape.
      - name: Build QuillCodeEditCoreTests
        run: swift build --target QuillCodeEditCoreTests

      # Pins QuillTelegramCore: `TelegramFolderFilter` (the
      # All/Personal/Work pill-row filter) + fixture invariants
      # (folder coverage, non-empty messages, unique ids, pill
      # membership).
      - name: Build QuillTelegramCoreTests
        run: swift build --target QuillTelegramCoreTests

      # Pins QuillIINACore: PlaylistItem identity + fixture
      # invariants (non-empty playlist, mm:ss duration format,
      # the four Blender shorts named in Checkpoint 89).
      - name: Build QuillIINACoreTests
        run: swift build --target QuillIINACoreTests

      # Pins QuillSignalCore: Message + Conversation identity,
      # ChatMessage conformance (still routes through
      # QuillChatKit), and fixture invariants (non-empty,
      # unique ids, "Me" sender on self-messages).
      - name: Build QuillSignalCoreTests
        run: swift build --target QuillSignalCoreTests

      # Pins QuillUI's core library: QuillPlatform.name reports
      # the host, QuillUIVersion is semver-shaped, QuillApp.run
      # resolves. Keeps QuillUI itself on the test-target
      # scorecard alongside the per-app-core suites.
      - name: Build QuillUITests
        run: swift build --target QuillUITests

      - name: Build QuillIceCubes
        run: swift build --target QuillIceCubes

      - name: Build QuillSignal
        run: swift build --target QuillSignal

      - name: Build QuillTelegram
        run: swift build --target QuillTelegram

      - name: Build QuillIINA
        run: swift build --target QuillIINA

      - name: Build QuillCodeEdit
        run: swift build --target QuillCodeEdit

      # QuillNetNewsWire is now a cross-platform RSS reader
      # backed by QuillNetNewsWireCore (Foundation XMLParser).
      # No longer depends on the upstream NetNewsWireLogic
      # Shared/-tree; hard-gated.
      - name: Build QuillNetNewsWire
        run: swift build --target QuillNetNewsWire

      # `scripts/fetch-upstream.sh wireguard` patches
      # `WireGuardKitC.h` to explicitly `#include <sys/types.h>`
      # so the macOS 15+ modular-header check on `u_int32_t` /
      # `u_char` / `u_int16_t` resolves through the right
      # Darwin module. Hard-gated.
      - name: Build QuillWireGuard
        run: swift build --target QuillWireGuard

      # `swift build` builds every declared target, including the
      # NetNewsWireLogic upstream target (declared inside the
      # `nnwUpstreamPresent` block) that nothing depends on after
      # the Checkpoint 84 refactor. NetNewsWireLogic's Shared/ tree
      # references Mac/-only types (~1655 unresolved-symbol errors).
      # Each per-target hard gate above is the canonical "this app
      # compiles" signal; the whole-package catch-all stays
      # best-effort until the upstream NNW graph is removed or
      # split.
      - name: Build entire package (best-effort)
        continue-on-error: true
        run: swift build

      # `swift test` builds every declared target, including the
      # orphan NetNewsWireLogic upstream target (gated by
      # `nnwUpstreamPresent`) whose Shared/ tree references Mac-only
      # types like `Node` and `AccountManager` that don't resolve
      # without the rest of the upstream NetNewsWire app. That kills
      # the macOS test invocation before our hard-gated test targets
      # (QuillChatKitTests, QuillKitTests, the per-core suites) can
      # be exercised. Linux CI runs `swift test` end-to-end and is
      # the actual hard-gate on test PASS/FAIL — Linux caught the
      # ChatDraft.sendMessage draft-loss bug in 40d2356, for example.
      # This step stays best-effort until NetNewsWireLogic is split
      # or removed.
      - name: Run tests (best-effort)
        continue-on-error: true
        # Step-level cap: this step is best-effort (continue-on-error), but a
        # hanging `swift test` (a test or a spawned subprocess that never exits
        # after the suite finishes) would otherwise burn the whole 30-min job
        # budget and cancel the job — turning the required "Build all 4 apps +
        # test" check red despite every build step passing. continue-on-error
        # tolerates a step *failure* but not a step that never returns, so the
        # step needs its own timeout. The suite builds+runs well under this;
        # the cap only kills a post-suite hang.
        timeout-minutes: 15
        run: swift test
