name: Linux CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  swift-linux-backends:
    name: Swift Linux Backends
    runs-on: ubuntu-24.04
    container:
      # SwiftOpenUI's `CGTK/shim.h` calls `gtk_picture_set_content_fit`
      # which is GTK 4.8+ (Ubuntu 24.04 noble ships GTK 4.14). The
      # 6.1 Swift toolchain on noble has a `libswiftObservation.so`
      # vs threading runtime mismatch ("undefined reference to
      # swift::threading::fatal"); the 6.2 toolchain ships the
      # fixed Observation runtime.
      image: swift:6.2-noble
    env:
      QUILLUI_SKIP_APT: "1"
      QUILLUI_SMOKE_SECONDS: "4"
      QUILL_CHAT_DIR: ${{ github.workspace }}/.upstream/enchanted

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          apt-get update
          # NOTE: do NOT apt-install `clang` here. The Swift toolchain
          # already ships its own clang and putting Ubuntu's clang in
          # PATH makes SwiftPM 6.1's `-index-store-path` flag fail with
          # "clang: error: unknown argument: '-index-store-path'" when
          # compiling C/Objective-C targets like RSCoreObjC and
          # _SwiftSyntaxCShims.
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            dbus-x11 \
            git \
            imagemagick \
            libgdk-pixbuf-2.0-dev \
            libgtk-4-dev \
            libsqlite3-dev \
            pkg-config \
            ripgrep \
            x11-apps \
            xdotool \
            xvfb
          rm -rf /var/lib/apt/lists/*

      - name: Swift version
        run: swift --version

      - name: Shell syntax
        run: scripts/check-shell-syntax.sh

      - name: Profile budget audit
        run: scripts/audit-profile-budget.sh --max-shell-lines 50

      - name: Fetch upstream sources
        run: scripts/fetch-upstream.sh

      - name: Upstream Enchanted audit report
        run: scripts/audit-upstream-enchanted.sh >/tmp/quillui-upstream-enchanted-audit.md

      - name: Swift tests
        run: scripts/linux-swift-test.sh --scratch-path .build-linux

      - name: GTK offscreen ImageRenderer smoke
        run: GTK_A11Y=none GSK_RENDERER=cairo QUILLUI_ENABLE_GTK_OFFSCREEN_RENDER=1 xvfb-run -a scripts/linux-swift-test.sh --scratch-path .build-linux-offscreen --filter imageRendererOffscreenPipelineProducesRealPNG

      # The full upstream gluonfield/enchanted source tree now
      # compiles + links + backend-renders end-to-end through the
      # QuillUI / SwiftOpenUI / QuillFoundation / QuillAppKit /
      # QuillDataMacros + 22-shim compatibility layer (Checkpoint
      # 80). Promoted off `continue-on-error` so future
      # regressions in the compat surface fail CI hard.
      - name: Generated upstream Enchanted compile
        run: scripts/generated-enchanted-full-source-check.sh

      - name: Generated Enchanted backend visual smokes
        run: |
          tab="$(printf '\t')"
          first=1
          scripts/quillui-backend-products.sh generated-app-matrix | while IFS="$tab" read -r product backend; do
            [ -n "$product" ] || continue
            [ -n "$backend" ] || continue
            echo "==> Generated Enchanted visual smoke: $product ($backend requested)"
            if [ "$first" = "1" ]; then
              scripts/linux-backend-visual-check.sh ".qa/${product}-generated-${backend}.png" "$product" "$backend"
              first=0
            else
              QUILLUI_BACKEND_SKIP_BUILD=1 scripts/linux-backend-visual-check.sh ".qa/${product}-generated-${backend}.png" "$product" "$backend"
            fi
          done

      - name: Backend launch target visual smokes
        run: |
          tab="$(printf '\t')"
          scripts/quillui-backend-products.sh smoke-matrix | while IFS="$tab" read -r product backend; do
            [ -n "$product" ] || continue
            [ -n "$backend" ] || continue
            echo "==> Backend launch visual smoke: $product ($backend requested)"
            scripts/linux-backend-visual-check.sh ".qa/${product}-visual-${backend}.png" "$product" "$backend"
          done

      - name: Backend launch target interaction smokes
        run: |
          tab="$(printf '\t')"
          scripts/quillui-backend-products.sh smoke-matrix | while IFS="$tab" read -r product backend; do
            [ -n "$product" ] || continue
            [ -n "$backend" ] || continue
            echo "==> Backend launch interaction smoke: $product ($backend requested)"
            scripts/linux-backend-interaction-check.sh ".qa/${product}-open-${backend}.png" "$product" "$backend"
          done

      - name: Generated Enchanted toolbar interaction smokes
        run: |
          tab="$(printf '\t')"
          scripts/quillui-backend-products.sh generated-app-matrix | while IFS="$tab" read -r product backend; do
            [ -n "$product" ] || continue
            [ -n "$backend" ] || continue
            echo "==> Generated Enchanted toolbar interaction smoke: $product ($backend requested)"
            QUILLUI_BACKEND_SKIP_BUILD=1 scripts/linux-backend-interaction-check.sh ".qa/${product}-toolbar-menu-${backend}.png" "$product" "$backend"
          done

      # Per-app backend visual smoke. The backend product/backend roster lives
      # in `scripts/quillui-backend-products.sh app-matrix` so visual and
      # profile coverage cannot drift. Each product launches under Xvfb,
      # explicitly requests a backend, screenshots the window, and runs the
      # verifier. Qt rows currently exercise the shared launch-plan fallback
      # until the native renderer is linked for production apps. With no
      # per-product branch in `verify-backend-screenshot.py`, the verifier
      # falls through to the baseline check (size + mean brightness +
      # stddev) so "blank window" / "didn't render" / "tiny window"
      # regressions still fail CI. Per-app landmark predicates are
      # follow-up slices in docs/uitest-plan.md.
      - name: Quill app backend visual smoke
        run: |
          tab="$(printf '\t')"
          built_products=" "
          scripts/quillui-backend-products.sh app-matrix | while IFS="$tab" read -r product backend; do
            [ -n "$product" ] || continue
            [ -n "$backend" ] || continue
            echo "==> Backend visual smoke: $product ($backend requested)"
            case "$built_products" in
              *" $product "*)
                QUILLUI_BACKEND_SKIP_BUILD=1 scripts/linux-backend-visual-check.sh ".qa/${product}-${backend}.png" "$product" "$backend"
                ;;
              *)
                scripts/linux-backend-visual-check.sh ".qa/${product}-${backend}.png" "$product" "$backend"
                built_products="${built_products}${product} "
                ;;
            esac
          done

      # Per-app backend interaction smoke. Reuse the products built by the
      # visual matrix above, then drive each app/backend row through the shared
      # xdotool-based interaction runner. Products without semantic predicates
      # still get post-click screenshot baseline verification, which catches
      # dead windows, blank repaints, and backend selection regressions.
      - name: Quill app backend interaction smokes
        run: |
          tab="$(printf '\t')"
          scripts/quillui-backend-products.sh interaction-matrix | while IFS="$tab" read -r product backend; do
            [ -n "$product" ] || continue
            [ -n "$backend" ] || continue
            echo "==> Backend interaction smoke: $product ($backend requested)"
            QUILLUI_BACKEND_SKIP_BUILD=1 scripts/linux-backend-interaction-check.sh ".qa/${product}-interaction-${backend}.png" "$product" "$backend"
          done

      # Linux profile baseline (CP106/CP149/CP152). For each Quill app,
      # generated app, and backend launch fixture matrix row, sample
      # startup_ms / rss_kb / cpu_pct_5s under Xvfb and emit a CSV row. The intent is
      # to spot Linux-side regressions vs the macOS originals
      # (per the user-supplied "not bloated in rendering UI etc"
      # directive) and keep GTK/Qt launch paths under the same
      # performance budget. The follow-up budget check uses
      # deliberately loose thresholds: it catches render-loop spins
      # like the former IceCubes/NetNewsWire 100%+ CPU outliers
      # without treating normal CI noise as a failure.
      - name: Linux backend profile baseline
        continue-on-error: true
        run: scripts/quillui-backend-products.sh profile-matrix | scripts/run-linux-backend-profile-csv.sh /tmp/quillui-profile.csv

      - name: Linux profile budget check
        run: scripts/check-linux-backend-profile-budget.sh /tmp/quillui-profile.csv --max-cpu-pct 25 --max-rss-kb 300000 --max-startup-ms 5000

      # No-fetch profile experiment. QUILLUI_DISABLE_FETCH=1
      # makes QuillIceCubes / QuillNetNewsWire seed fixture
      # content instead of running URLSession on appear. If
      # CPU drops to fixture-app levels (~3-7%) the spike is
      # in the fetch / decode / @Published path; if it stays
      # pegged (~100-130%) the spike is in the rendered-list /
      # SwiftOpenUI-diff path.
      - name: No-fetch profile experiment (IceCubes + NetNewsWire)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
        run: scripts/run-linux-backend-profile-csv.sh /tmp/quillui-profile-nofetch.csv quill-icecubes quill-netnewswire

      # NavigationStack hypothesis. Combines QUILLUI_DISABLE_FETCH=1
      # (already validated in 1e07973 to remove the URLSession
      # cost) with QUILLUI_PROFILE_FLAT=1 (drops the
      # NavigationStack + .navigationTitle wrapper in IceCubes).
      # If CPU drops to fixture-app levels (~3-6%) with both
      # set, SwiftOpenUI's NavigationStack on GTK4 is the busy
      # spinner. If CPU stays elevated, NavigationStack isn't
      # the cause and we move to the next ladder rung
      # (ProgressView strip / @StateObject swap).
      - name: No-fetch + flat profile experiment (IceCubes only)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
          QUILLUI_PROFILE_FLAT: "1"
        run: scripts/run-linux-backend-profile-csv.sh /tmp/quillui-profile-flat.csv quill-icecubes

      # Bare-mode profile experiment. Body returns a single
      # Text — no NavigationStack, no List, no ForEach, no
      # @State-driven content. If CPU is still elevated in this
      # mode, the busy-spin is in something fundamental like
      # @State subscription or the GTK4 host event loop. If
      # CPU drops to fixture-app levels (~3-6%), the busy-spin
      # lives in IceCubes' specific view tree.
      - name: Bare-mode profile experiment (IceCubes only)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
          QUILLUI_PROFILE_BARE: "1"
        run: scripts/run-linux-backend-profile-csv.sh /tmp/quillui-profile-bare.csv quill-icecubes

      # Plain-row bisection. Bare-mode (83369b4) confirmed the
      # spin is in IceCubes' view tree, not GTK4 host or @State.
      # This run keeps List + ForEach over the fixture statuses
      # but renders each row as plain Text(status.id) instead of
      # the rich statusRow (HStack + Circle + VStack + Text).
      # If CPU drops to fixture-app levels, statusRow's content
      # is the cost. If CPU stays elevated, List+ForEach
      # iteration itself (over a 2-row fixture) is the cost.
      - name: Plain-row profile experiment (IceCubes only)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
          QUILLUI_PROFILE_PLAIN_ROW: "1"
        run: scripts/run-linux-backend-profile-csv.sh /tmp/quillui-profile-plainrow.csv quill-icecubes

      # Literal-row bisection. Plain-row dropped to fixture
      # baseline, so it's not List+ForEach or fundamental
      # render-loop bookkeeping. Literal-row keeps the FULL
      # statusRow shape (HStack + Circle + nested VStack + 3
      # Texts + .padding) but replaces the computed-property
      # Text values (`.asRawText`, `.cachedDisplayName.asRawText`)
      # with literal strings. If CPU stays at fixture baseline,
      # SwiftOpenUI is reading `.asRawText` on every paint and
      # the fix is to cache; if CPU climbs, the layout itself
      # is the spinner and the fix lives in SwiftOpenUI.
      - name: Literal-row profile experiment (IceCubes only)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
          QUILLUI_PROFILE_LITERAL_ROW: "1"
        run: scripts/run-linux-backend-profile-csv.sh /tmp/quillui-profile-literalrow.csv quill-icecubes

      # Stored-property substitution. Same statusRow layout but
      # Text values read stored properties (username,
      # htmlValue) instead of the computed cachedDisplayName +
      # asRawText chains. Bisects whether the production CPU
      # peg is in the computed chain itself, vs SwiftOpenUI's
      # render-loop diff handling for computed-property
      # dependencies. The 40c1ed4 cache-at-model attempt
      # already proved caching `.asRawText` at the model
      # layer isn't enough; this experiment isolates the
      # *call path* instead of the *computation*.
      - name: Stored-prop profile experiment (IceCubes only)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
          QUILLUI_PROFILE_STORED_PROPS: "1"
        run: scripts/run-linux-backend-profile-csv.sh /tmp/quillui-profile-storedprops.csv quill-icecubes

      - name: Stage QA outputs for upload
        if: always()
        run: |
          echo "==== .qa/ contents ===="
          ls -la .qa/ 2>&1 || echo "(no .qa dir)"
          mkdir -p /tmp/quillui-qa-upload
          cp -r .qa/. /tmp/quillui-qa-upload/ 2>/dev/null || true
          cp /tmp/quillui-*.log /tmp/quillui-qa-upload/ 2>/dev/null || true
          cp /tmp/quillui-*.csv /tmp/quillui-qa-upload/ 2>/dev/null || true
          cp /tmp/quillui-upstream-enchanted-audit.md /tmp/quillui-qa-upload/ 2>/dev/null || true
          echo "==== /tmp/quillui-qa-upload/ contents ===="
          ls -la /tmp/quillui-qa-upload/

      - name: Upload Linux backend QA artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: linux-backend-qa
          if-no-files-found: ignore
          path: /tmp/quillui-qa-upload/
