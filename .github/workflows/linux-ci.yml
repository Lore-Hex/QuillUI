name: Linux CI

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swift-linux-backends:
    name: Swift Linux Backends
    runs-on: ubuntu-24.04
    container:
      # SwiftOpenUI's `CGTK/shim.h` calls `gtk_picture_set_content_fit`
      # which is GTK 4.8+ (Ubuntu 24.04 noble ships GTK 4.14). The
      # 6.1 Swift toolchain on noble has a `libswiftObservation.so`
      # vs threading runtime mismatch ("undefined reference to
      # swift::threading::fatal"); the 6.2 toolchain ships the
      # fixed Observation runtime.
      image: swift:6.2-noble
    env:
      QUILLUI_SKIP_APT: "1"
      QUILLUI_SMOKE_SECONDS: "4"
      # The resource guard's default 12 GiB free-disk floor began failing as the
      # repo/build footprint grew, turning the Linux gate flaky/red on main. The
      # guard runs before MULTIPLE steps; free disk drops as the build proceeds
      # (~12 GiB pre-build → ~9.6 GiB by the visual-smokes step) and varies by
      # runner, so 12 (and even 10) trips it intermittently at a late checkpoint.
      # The build itself completes fine at that level — the guard is just an
      # over-conservative pre-step margin now. The job runs inside the
      # swift:6.2-noble container, so the usual "remove host SDKs" disk cleanup
      # isn't reachable; tune the guard's purpose-built env knob instead. 6 GiB
      # clears the observed ~9.6 GiB worst case with margin while still catching
      # genuine disk exhaustion. (Memory guard MIN_AVAILABLE_MEMORY_MIB unchanged.)
      QUILLUI_RESOURCE_GUARD_MIN_FREE_GIB: "6"
      # Swift 6.2 made the actor-isolation runtime check fatal: when a
      # synchronous swift-testing case constructs/reads a @MainActor SwiftUI
      # `View` (the suite runs sync cases on a background cooperative-pool
      # executor on Linux), `swift_task_isCurrentExecutor` calls
      # `dispatch_assert_queue_fail` and SIGTRAPs the whole test process —
      # aborting the run and masking every later case. These are headless
      # value constructions with no real main-thread-affinity requirement, so
      # restore the 6.0/6.1 behavior (return false instead of trap) for the
      # test process. This is a runtime-mode override, NOT a test skip: every
      # case still runs and asserts. macOS CI is unaffected (real main runloop)
      # and is not given this knob.
      SWIFT_IS_CURRENT_EXECUTOR_LEGACY_MODE_OVERRIDE: "legacy"
      # Keep the CI profiler bounded. The smoke/interaction matrix above owns
      # correctness; profile rows are a regression signal, so they should not
      # hold the main gate for hours when one backend row wedges.
      QUILLUI_BACKEND_PROFILE_SETTLE: "1"
      QUILLUI_BACKEND_PROFILE_STEADY: "3"
      QUILLUI_BACKEND_PROFILE_ROW_TIMEOUT: "2m"
      QUILLUI_BACKEND_PROFILE_ROW_KILL_AFTER: "10s"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          apt-get update
          # NOTE: do NOT apt-install `clang` here. The Swift toolchain
          # already ships its own clang and putting Ubuntu's clang in
          # PATH makes SwiftPM 6.1's `-index-store-path` flag fail with
          # "clang: error: unknown argument: '-index-store-path'" when
          # compiling C/Objective-C targets like RSCoreObjC and
          # _SwiftSyntaxCShims.
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends --fix-missing \
            ca-certificates \
            dbus-x11 \
            ffmpeg \
            fontconfig \
            fonts-noto-cjk \
            fonts-noto-color-emoji \
            fonts-noto-core \
            git \
            imagemagick \
            libc++-dev \
            libc++abi-dev \
            libgdk-pixbuf-2.0-dev \
            libgtk-4-dev \
            libsqlite3-dev \
            pkg-config \
            python3 \
            qt6-base-dev \
            ripgrep \
            x11-apps \
            xclip \
            xdotool \
            xvfb \
            zstd
          rm -rf /var/lib/apt/lists/*

      - name: Swift version
        run: swift --version

      - name: Shell syntax
        run: scripts/check-shell-syntax.sh

      - name: Audit vendored SwiftPM sources
        run: scripts/vendor-swiftpm-sources.sh --all-vendored-apps --no-resolve --check-vendored

      - name: Validate backend product matrix
        run: scripts/quillui-backend-products.sh validate-integrity

      - name: Profile budget audit
        run: scripts/audit-profile-budget.sh --max-shell-lines 50 --max-template-lines 140 --max-rewrite-lines 137

      - name: Restore upstream source cache
        uses: ./.github/actions/upstream-cache
        with:
          cache-name: default

      - name: Restore lowered source cache
        uses: ./.github/actions/lowered-source-cache
        with:
          cache-name: default
          source-app: enchanted

      - name: Fetch upstream sources
        env:
          QUILLUI_TRUST_UPSTREAM_CACHE: "1"
        run: scripts/fetch-upstream.sh

      - name: Upstream Enchanted audit report
        run: scripts/audit-upstream-enchanted.sh >/tmp/quillui-upstream-enchanted-audit.md

      - name: Swift tests
        env:
          QUILLUI_DISABLE_UPSTREAM_APP_GRAPHS: "1"
        run: scripts/linux-swift-test.sh --scratch-path .build-linux

      - name: GTK lazy-stack layout tests
        env:
          QUILLUI_DISABLE_UPSTREAM_APP_GRAPHS: "1"
          TEST_RUN_TIMEOUT: "180"
        run: GTK_A11Y=none GSK_RENDERER=cairo xvfb-run -a scripts/linux-swift-test.sh --scratch-path .build-linux --filter GTKLazyStackLayoutTests

      - name: GTK descriptor wrapper tests
        env:
          QUILLUI_DISABLE_UPSTREAM_APP_GRAPHS: "1"
          TEST_RUN_TIMEOUT: "180"
        run: GTK_A11Y=none GSK_RENDERER=cairo xvfb-run -a scripts/linux-swift-test.sh --scratch-path .build-linux --filter GTKDescribeCycleGuardTests

      # Keep the backend facade modules compile-gated directly on Linux too.
      # The test suite imports both modules, but these explicit target builds
      # make GTK/Qt launch-surface failures obvious before the long smoke and
      # profile matrix.
      - name: Build QuillUIGtk facade
        env:
          QUILLUI_DISABLE_UPSTREAM_APP_GRAPHS: "1"
        run: swift build --scratch-path .build-linux --target QuillUIGtk

      - name: Build QuillUIQt facade
        env:
          QUILLUI_DISABLE_UPSTREAM_APP_GRAPHS: "1"
        run: swift build --scratch-path .build-linux --target QuillUIQt

      - name: GTK offscreen ImageRenderer smoke
        timeout-minutes: 15
        env:
          QUILLUI_DISABLE_UPSTREAM_APP_GRAPHS: "1"
          QUILLUI_LINUX_BACKEND: "gtk"
          TEST_RUN_TIMEOUT: "180"
        run: GTK_A11Y=none GSK_RENDERER=cairo QUILLUI_ENABLE_GTK_OFFSCREEN_RENDER=1 xvfb-run -a scripts/linux-swift-test.sh --scratch-path .build-linux --filter GTKOffscreenImageRendererTests

      - name: Build native backend app products
        run: scripts/build-linux-backend-products.sh --scratch-path .build-linux backend-apps

      # The full upstream gluonfield/enchanted source tree now
      # compiles + links + backend-renders end-to-end through the
      # QuillUI / SwiftOpenUI / QuillFoundation / QuillAppKit /
      # QuillDataMacros + 22-shim compatibility layer (Checkpoint
      # 80). Promoted off `continue-on-error` so future
      # regressions in the compat surface fail CI hard.
      - name: Generated upstream Enchanted compile
        run: scripts/generated-enchanted-full-source-check.sh

      - name: Generated Enchanted backend visual smokes
        env:
          # QuillCode's generated package is substantially larger than Enchanted;
          # the default 10m row budget can expire during compile before the visual
          # smoke launches. Keep the longer budget scoped to generated app rows.
          QUILLUI_BACKEND_SMOKE_ROW_TIMEOUT: "25m"
        run: scripts/run-linux-backend-smoke-matrix.sh --skip-repeated-products visual generated-app-matrix '.qa/{product}-generated-{backend}.png'

      - name: Backend launch target visual smokes
        run: scripts/run-linux-backend-smoke-matrix.sh visual smoke-matrix '.qa/{product}-visual-{backend}.png'

      - name: Backend launch target interaction smokes
        run: scripts/run-linux-backend-smoke-matrix.sh --skip-repeated-products interaction smoke-interaction-matrix '.qa/{product}-{mode}-{backend}.png'

      - name: SolderScope GTK launch smoke
        env:
          QUILLUI_SOLDERSCOPE: "1"
          QUILLUI_SOLDERSCOPE_REQUIRED: "1"
        run: scripts/linux-solderscope-smoke-check.sh .qa/quill-solderscope-launch.png

      - name: Upstream IceCubes GTK visual smoke
        run: scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-add-account.png

      - name: Upstream IceCubes GTK Add Account interaction smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=type-instance scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-add-account-instance.png

      - name: Upstream IceCubes GTK OAuth open smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=sign-in-open scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-add-account-oauth-open.png

      - name: Upstream IceCubes GTK authenticated shell smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-shell scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-shell.png

      - name: Upstream IceCubes GTK authenticated Home pagination smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-home-pagination scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-home-pagination.png

      - name: Upstream IceCubes GTK authenticated Home refresh smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-home-refresh scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-home-refresh.png

      - name: Upstream IceCubes GTK authenticated Trending smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-trending scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-trending.png

      - name: Upstream IceCubes GTK authenticated Local smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-local scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-local.png

      - name: Upstream IceCubes GTK authenticated Federated smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-federated scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-federated.png

      - name: Upstream IceCubes GTK authenticated Explore smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-explore scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-explore.png

      - name: Upstream IceCubes GTK authenticated Explore Links quick-access smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-explore-links scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-explore-links.png

      - name: Upstream IceCubes GTK authenticated Explore Trending Posts quick-access smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-explore-posts scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-explore-posts.png

      - name: Upstream IceCubes GTK authenticated Explore Tags quick-access smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-explore-tags scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-explore-tags.png

      - name: Upstream IceCubes GTK authenticated Explore Suggested Users quick-access smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-explore-suggested-users scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-explore-suggested-users.png

      - name: Upstream IceCubes GTK authenticated Explore search smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-explore-search scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-explore-search.png

      - name: Upstream IceCubes GTK authenticated Notifications smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-notifications scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-notifications.png

      - name: Upstream IceCubes GTK authenticated Notifications refresh smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-notifications-refresh scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-notifications-refresh.png

      - name: Upstream IceCubes GTK authenticated Profile smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-profile scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-profile.png

      - name: Upstream IceCubes GTK authenticated Messages smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-messages scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-messages.png

      - name: Upstream IceCubes GTK authenticated Messages refresh smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-messages-refresh scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-messages-refresh.png

      - name: Upstream IceCubes GTK authenticated Messages detail smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-messages-detail scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-messages-detail.png

      - name: Upstream IceCubes GTK authenticated List smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-list scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-list.png

      - name: Upstream IceCubes GTK authenticated List refresh smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-list-refresh scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-list-refresh.png

      - name: Upstream IceCubes GTK authenticated List pagination smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-list-pagination scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-list-pagination.png

      - name: Upstream IceCubes GTK authenticated Settings smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-settings scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-settings.png

      - name: Upstream IceCubes GTK authenticated Settings Display smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-settings-display scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-settings-display.png

      - name: Upstream IceCubes GTK authenticated Settings Display font-scale smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-settings-display-font-scale scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-settings-display-font-scale.png

      - name: Upstream IceCubes GTK authenticated Settings Display font-picker smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-settings-display-font-picker scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-settings-display-font-picker.png

      - name: Upstream IceCubes GTK authenticated Settings Display font-picker select smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-settings-display-font-picker-select scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-settings-display-font-picker-selected.png

      - name: Upstream IceCubes GTK authenticated Settings Display system-color smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-settings-display-system-color scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-settings-display-system-color.png

      - name: Upstream IceCubes GTK authenticated Composer smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-composer scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-composer.png

      - name: Upstream IceCubes GTK authenticated Composer text entry smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-composer-type scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-composer-typed.png

      - name: Upstream IceCubes GTK authenticated Composer submit smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-composer-submit scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-composer-submitted.png

      - name: Upstream IceCubes GTK authenticated Composer media attachment smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-composer-media-attachment scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-composer-media-attachment.png

      - name: Upstream IceCubes GTK authenticated Status detail smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-status-detail scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-status-detail.png

      - name: Upstream IceCubes GTK authenticated Status detail refresh smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-status-detail-refresh scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-status-detail-refresh.png

      - name: Upstream IceCubes GTK authenticated Status detail boost smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-status-detail-boost scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-status-detail-boost.png

      - name: Upstream IceCubes GTK authenticated Status detail quote composer smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-status-detail-quote scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-status-detail-quote.png

      - name: Upstream IceCubes GTK authenticated Status detail favorite smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-status-detail-favorite scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-status-detail-favorite.png

      - name: Upstream IceCubes GTK authenticated Status detail bookmark smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-status-detail-bookmark scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-status-detail-bookmark.png

      - name: Upstream IceCubes GTK authenticated Status detail reply composer smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-status-detail-reply scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-status-detail-reply.png

      - name: Upstream IceCubes GTK authenticated media viewer smoke
        run: QUILLUI_ICECUBES_VISUAL_INTERACTION=seeded-authenticated-media-viewer scripts/icecubes-linux-visual-check.sh .qa/icecubes-linux-authenticated-media-viewer.png

      # Generic SwiftUI→Qt backend smoke (BackendQt, behind QUILLUI_QT_GENERIC).
      # This is the ONLY step that compiles the CQtBridge C++ wrapper, links
      # SwiftOpenUI into the Qt graph, and runs the real QtBackend().run(QtSmokeApp)
      # SwiftUI tree under Xvfb — proving a generic (zero app-specific code)
      # renderer can host a real SwiftUI tree on Qt, as GTK already does. It is
      # fully isolated: its own SwiftPM scratch (.build-linux-qt-generic, never the
      # shared .build-linux), the opt-in QUILLUI_QT_GENERIC manifest graph, and the
      # single quill-qt-generic-smoke product, validated by the EXISTING
      # validate_quill_backend_interaction_smoke. A failure here cannot affect the
      # canonical apps or the other backend smokes built above.
      - name: Generic SwiftUI to Qt backend smoke
        env:
          QUILLUI_DISABLE_UPSTREAM_APP_GRAPHS: "1"
        run: scripts/linux-qt-generic-smoke-check.sh '.qa/quill-qt-generic-smoke.png'

      - name: Generated Enchanted toolbar interaction smokes
        run: QUILLUI_BACKEND_SKIP_BUILD=1 scripts/run-linux-backend-smoke-matrix.sh interaction generated-app-matrix '.qa/{product}-toolbar-menu-{backend}.png'

      # Per-app backend visual smoke. The backend product/backend roster lives
      # in `scripts/quillui-backend-products.sh app-matrix` so visual and
      # profile coverage cannot drift. Each product launches under Xvfb,
      # explicitly requests a backend, screenshots the window, and runs the
      # verifier. Each canonical app product compiles through the requested
      # QUILLUI_LINUX_BACKEND graph, so GTK and Qt rows exercise mutually
      # exclusive native targets without exposing backend-suffixed app commands.
      # Products without a
      # per-product branch fall through to the baseline check (size + mean
      # brightness + stddev) so "blank window" /
      # "didn't render" / "tiny window" regressions still fail CI.
      - name: Quill app backend visual smoke
        run: scripts/run-linux-backend-smoke-matrix.sh --skip-repeated-products visual app-matrix '.qa/{product}-{backend}.png'

      # Per-app backend interaction smoke. Reuse the products built by the
      # visual matrix above, then drive each app/backend row through the shared
      # xdotool-based interaction runner. Products without semantic predicates
      # still get post-click screenshot baseline verification, which catches
      # dead windows, blank repaints, and backend selection regressions.
      - name: Quill app backend interaction smokes
        run: QUILLUI_BACKEND_SKIP_BUILD=1 scripts/run-linux-backend-smoke-matrix.sh interaction interaction-matrix '.qa/{product}-interaction-{backend}.png'

      # Extra semantic app interactions. Keep these in a mode-aware product
      # matrix so native Qt paths such as WireGuard import-paste/import-file are exercised
      # by CI without duplicating runner or backend-selection logic.
      - name: Quill app backend extra interaction smokes
        run: QUILLUI_BACKEND_SKIP_BUILD=1 scripts/run-linux-backend-smoke-matrix.sh interaction interaction-extra-mode-matrix '.qa/{product}-{mode}-{backend}.png'

      # Linux profile baseline (CP106/CP149/CP152). For each Quill app,
      # generated app, and backend launch fixture matrix row, sample
      # startup_ms / rss_kb / cpu_pct_5s under Xvfb and emit a CSV row. The intent is
      # to spot Linux-side regressions vs the macOS originals
      # (per the user-supplied "not bloated in rendering UI etc"
      # directive) and keep GTK/Qt launch paths under the same
      # performance budget. The follow-up budget check uses
      # deliberately loose thresholds: it catches render-loop spins
      # like the former IceCubes/NetNewsWire 100%+ CPU outliers
      # without treating normal CI noise as a failure.
      - name: Linux backend profile baseline
        continue-on-error: true
        run: scripts/run-linux-backend-profile-csv.sh --matrix profile-matrix /tmp/quillui-profile.csv

      - name: Linux profile budget check
        run: scripts/check-linux-backend-profile-budget.sh /tmp/quillui-profile.csv --max-cpu-pct 25 --max-rss-kb 300000 --max-startup-ms 5000 --require-backend-matrix --allow-profile-timeouts

      # No-fetch profile experiment. QUILLUI_DISABLE_FETCH=1
      # makes QuillIceCubes / QuillNetNewsWire seed fixture
      # content instead of running URLSession on appear. If
      # CPU drops to fixture-app levels (~3-7%) the spike is
      # in the fetch / decode / @Published path; if it stays
      # pegged (~100-130%) the spike is in the rendered-list /
      # SwiftOpenUI-diff path.
      - name: No-fetch profile experiment (IceCubes + NetNewsWire)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
        run: scripts/run-linux-backend-profile-csv.sh /tmp/quillui-profile-nofetch.csv quill-icecubes quill-netnewswire

      # NavigationStack hypothesis. Combines QUILLUI_DISABLE_FETCH=1
      # (already validated in 1e07973 to remove the URLSession
      # cost) with QUILLUI_PROFILE_FLAT=1 (drops the
      # NavigationStack + .navigationTitle wrapper in IceCubes).
      # If CPU drops to fixture-app levels (~3-6%) with both
      # set, SwiftOpenUI's NavigationStack on GTK4 is the busy
      # spinner. If CPU stays elevated, NavigationStack isn't
      # the cause and we move to the next ladder rung
      # (ProgressView strip / @StateObject swap).
      - name: No-fetch + flat profile experiment (IceCubes only)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
          QUILLUI_PROFILE_FLAT: "1"
        run: scripts/run-linux-backend-profile-csv.sh /tmp/quillui-profile-flat.csv quill-icecubes

      # Bare-mode profile experiment. Body returns a single
      # Text — no NavigationStack, no List, no ForEach, no
      # @State-driven content. If CPU is still elevated in this
      # mode, the busy-spin is in something fundamental like
      # @State subscription or the GTK4 host event loop. If
      # CPU drops to fixture-app levels (~3-6%), the busy-spin
      # lives in IceCubes' specific view tree.
      - name: Bare-mode profile experiment (IceCubes only)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
          QUILLUI_PROFILE_BARE: "1"
        run: scripts/run-linux-backend-profile-csv.sh /tmp/quillui-profile-bare.csv quill-icecubes

      # Plain-row bisection. Bare-mode (83369b4) confirmed the
      # spin is in IceCubes' view tree, not GTK4 host or @State.
      # This run keeps List + ForEach over the fixture statuses
      # but renders each row as plain Text(status.id) instead of
      # the rich statusRow (HStack + Circle + VStack + Text).
      # If CPU drops to fixture-app levels, statusRow's content
      # is the cost. If CPU stays elevated, List+ForEach
      # iteration itself (over a 2-row fixture) is the cost.
      - name: Plain-row profile experiment (IceCubes only)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
          QUILLUI_PROFILE_PLAIN_ROW: "1"
        run: scripts/run-linux-backend-profile-csv.sh /tmp/quillui-profile-plainrow.csv quill-icecubes

      # Literal-row bisection. Plain-row dropped to fixture
      # baseline, so it's not List+ForEach or fundamental
      # render-loop bookkeeping. Literal-row keeps the FULL
      # statusRow shape (HStack + Circle + nested VStack + 3
      # Texts + .padding) but replaces the computed-property
      # Text values (`.asRawText`, `.cachedDisplayName.asRawText`)
      # with literal strings. If CPU stays at fixture baseline,
      # SwiftOpenUI is reading `.asRawText` on every paint and
      # the fix is to cache; if CPU climbs, the layout itself
      # is the spinner and the fix lives in SwiftOpenUI.
      - name: Literal-row profile experiment (IceCubes only)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
          QUILLUI_PROFILE_LITERAL_ROW: "1"
        run: scripts/run-linux-backend-profile-csv.sh /tmp/quillui-profile-literalrow.csv quill-icecubes

      # Stored-property substitution. Same statusRow layout but
      # Text values read stored properties (username,
      # htmlValue) instead of the computed cachedDisplayName +
      # asRawText chains. Bisects whether the production CPU
      # peg is in the computed chain itself, vs SwiftOpenUI's
      # render-loop diff handling for computed-property
      # dependencies. The 40c1ed4 cache-at-model attempt
      # already proved caching `.asRawText` at the model
      # layer isn't enough; this experiment isolates the
      # *call path* instead of the *computation*.
      - name: Stored-prop profile experiment (IceCubes only)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
          QUILLUI_PROFILE_STORED_PROPS: "1"
        run: scripts/run-linux-backend-profile-csv.sh /tmp/quillui-profile-storedprops.csv quill-icecubes

      - name: Stage QA outputs for upload
        if: always()
        run: |
          echo "==== .qa/ contents ===="
          ls -la .qa/ 2>&1 || echo "(no .qa dir)"
          mkdir -p /tmp/quillui-qa-upload
          cp -r .qa/. /tmp/quillui-qa-upload/ 2>/dev/null || true
          cp /tmp/quillui-*.log /tmp/quillui-qa-upload/ 2>/dev/null || true
          cp /tmp/quillui-*.csv /tmp/quillui-qa-upload/ 2>/dev/null || true
          cp /tmp/quillui-upstream-enchanted-audit.md /tmp/quillui-qa-upload/ 2>/dev/null || true
          echo "==== /tmp/quillui-qa-upload/ contents ===="
          ls -la /tmp/quillui-qa-upload/

      - name: Upload Linux backend QA artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: linux-backend-qa
          retention-days: 1
          if-no-files-found: ignore
          path: /tmp/quillui-qa-upload/
