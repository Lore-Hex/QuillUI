name: Linux CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  swift-gtk:
    name: Swift GTK
    runs-on: ubuntu-24.04
    container:
      # SwiftOpenUI's `CGTK/shim.h` calls `gtk_picture_set_content_fit`
      # which is GTK 4.8+ (Ubuntu 24.04 noble ships GTK 4.14). The
      # 6.1 Swift toolchain on noble has a `libswiftObservation.so`
      # vs threading runtime mismatch ("undefined reference to
      # swift::threading::fatal"); the 6.2 toolchain ships the
      # fixed Observation runtime.
      image: swift:6.2-noble
    env:
      QUILLUI_SKIP_APT: "1"
      QUILLUI_SMOKE_SECONDS: "4"
      QUILL_CHAT_DIR: ${{ github.workspace }}/.upstream/enchanted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          apt-get update
          # NOTE: do NOT apt-install `clang` here. The Swift toolchain
          # already ships its own clang and putting Ubuntu's clang in
          # PATH makes SwiftPM 6.1's `-index-store-path` flag fail with
          # "clang: error: unknown argument: '-index-store-path'" when
          # compiling C/Objective-C targets like RSCoreObjC and
          # _SwiftSyntaxCShims.
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            dbus-x11 \
            git \
            imagemagick \
            libgdk-pixbuf-2.0-dev \
            libgtk-4-dev \
            libsqlite3-dev \
            pkg-config \
            ripgrep \
            x11-apps \
            xdotool \
            xvfb
          rm -rf /var/lib/apt/lists/*

      - name: Swift version
        run: swift --version

      - name: Profile budget audit
        run: scripts/audit-profile-budget.sh --max-shell-lines 50

      - name: Fetch upstream sources
        run: scripts/fetch-upstream.sh

      - name: Upstream Enchanted audit report
        run: scripts/audit-upstream-enchanted.sh >/tmp/quillui-upstream-enchanted-audit.md

      - name: Swift tests
        run: scripts/linux-swift-test.sh --scratch-path .build-linux

      - name: GTK offscreen ImageRenderer smoke
        run: GTK_A11Y=none GSK_RENDERER=cairo QUILLUI_ENABLE_GTK_OFFSCREEN_RENDER=1 xvfb-run -a scripts/linux-swift-test.sh --scratch-path .build-linux-offscreen --filter imageRendererOffscreenPipelineProducesRealPNG

      # The full upstream gluonfield/enchanted source tree now
      # compiles + links + GTK-renders end-to-end through the
      # QuillUI / SwiftOpenUI / QuillFoundation / QuillAppKit /
      # QuillDataMacros + 22-shim compatibility layer (Checkpoint
      # 80). Promoted off `continue-on-error` so future
      # regressions in the compat surface fail CI hard.
      - name: Generated upstream Enchanted compile
        run: scripts/generated-enchanted-full-source-check.sh

      - name: Generated Enchanted GTK visual smoke
        run: scripts/linux-gtk-visual-check.sh .qa/quill-chat-linux-generated-gtk.png quill-chat-linux

      - name: GTK interaction smoke
        run: scripts/linux-gtk-interaction-check.sh .qa/quill-gtk-interaction-smoke-open.png quill-gtk-interaction-smoke

      - name: Generated Enchanted toolbar interaction smoke
        run: scripts/linux-gtk-interaction-check.sh .qa/quill-chat-linux-toolbar-menu-gtk.png quill-chat-linux

      # Per-app GTK visual smoke. The product roster lives in
      # `scripts/linux-gtk-app-products.sh` so visual and profile
      # coverage cannot drift. Each product launches under Xvfb,
      # screenshots the GTK window, and runs the verifier. With no
      # per-product branch in `verify-gtk-screenshot.py`, the verifier
      # falls through to the baseline check (size + mean brightness +
      # stddev) so "blank window" / "didn't render" / "tiny window"
      # regressions still fail CI. Per-app landmark predicates are
      # follow-up slices in docs/uitest-plan.md.
      - name: Quill app GTK visual smoke
        run: |
          scripts/linux-gtk-app-products.sh | while IFS= read -r product; do
            [ -n "$product" ] || continue
            echo "==> GTK visual smoke: $product"
            scripts/linux-gtk-visual-check.sh ".qa/${product}-gtk.png" "$product"
          done

      # Per-app Linux profile baseline (CP106). For each Quill
      # app, sample startup_ms / rss_kb / cpu_pct_5s under Xvfb
      # and emit a CSV row. The intent is to spot Linux-side
      # regressions vs the macOS originals (per the
      # user-supplied "not bloated in rendering UI etc"
      # directive). The follow-up budget check uses deliberately
      # loose thresholds: it catches render-loop spins like the
      # former IceCubes/NetNewsWire 100%+ CPU outliers without
      # treating normal CI noise as a failure.
      - name: Per-app Linux profile baseline
        continue-on-error: true
        run: scripts/linux-gtk-app-products.sh | scripts/run-linux-gtk-profile-csv.sh /tmp/quillui-profile.csv

      - name: Linux profile budget check
        run: scripts/check-linux-gtk-profile-budget.sh /tmp/quillui-profile.csv --max-cpu-pct 25 --max-rss-kb 300000 --max-startup-ms 5000

      # No-fetch profile experiment. QUILLUI_DISABLE_FETCH=1
      # makes QuillIceCubes / QuillNetNewsWire seed fixture
      # content instead of running URLSession on appear. If
      # CPU drops to fixture-app levels (~3-7%) the spike is
      # in the fetch / decode / @Published path; if it stays
      # pegged (~100-130%) the spike is in the rendered-list /
      # SwiftOpenUI-diff path.
      - name: No-fetch profile experiment (IceCubes + NetNewsWire)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
        run: scripts/run-linux-gtk-profile-csv.sh /tmp/quillui-profile-nofetch.csv quill-icecubes quill-netnewswire

      # NavigationStack hypothesis. Combines QUILLUI_DISABLE_FETCH=1
      # (already validated in 1e07973 to remove the URLSession
      # cost) with QUILLUI_PROFILE_FLAT=1 (drops the
      # NavigationStack + .navigationTitle wrapper in IceCubes).
      # If CPU drops to fixture-app levels (~3-6%) with both
      # set, SwiftOpenUI's NavigationStack on GTK4 is the busy
      # spinner. If CPU stays elevated, NavigationStack isn't
      # the cause and we move to the next ladder rung
      # (ProgressView strip / @StateObject swap).
      - name: No-fetch + flat profile experiment (IceCubes only)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
          QUILLUI_PROFILE_FLAT: "1"
        run: scripts/run-linux-gtk-profile-csv.sh /tmp/quillui-profile-flat.csv quill-icecubes

      # Bare-mode profile experiment. Body returns a single
      # Text — no NavigationStack, no List, no ForEach, no
      # @State-driven content. If CPU is still elevated in this
      # mode, the busy-spin is in something fundamental like
      # @State subscription or the GTK4 host event loop. If
      # CPU drops to fixture-app levels (~3-6%), the busy-spin
      # lives in IceCubes' specific view tree.
      - name: Bare-mode profile experiment (IceCubes only)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
          QUILLUI_PROFILE_BARE: "1"
        run: scripts/run-linux-gtk-profile-csv.sh /tmp/quillui-profile-bare.csv quill-icecubes

      # Plain-row bisection. Bare-mode (83369b4) confirmed the
      # spin is in IceCubes' view tree, not GTK4 host or @State.
      # This run keeps List + ForEach over the fixture statuses
      # but renders each row as plain Text(status.id) instead of
      # the rich statusRow (HStack + Circle + VStack + Text).
      # If CPU drops to fixture-app levels, statusRow's content
      # is the cost. If CPU stays elevated, List+ForEach
      # iteration itself (over a 2-row fixture) is the cost.
      - name: Plain-row profile experiment (IceCubes only)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
          QUILLUI_PROFILE_PLAIN_ROW: "1"
        run: scripts/run-linux-gtk-profile-csv.sh /tmp/quillui-profile-plainrow.csv quill-icecubes

      # Literal-row bisection. Plain-row dropped to fixture
      # baseline, so it's not List+ForEach or fundamental
      # render-loop bookkeeping. Literal-row keeps the FULL
      # statusRow shape (HStack + Circle + nested VStack + 3
      # Texts + .padding) but replaces the computed-property
      # Text values (`.asRawText`, `.cachedDisplayName.asRawText`)
      # with literal strings. If CPU stays at fixture baseline,
      # SwiftOpenUI is reading `.asRawText` on every paint and
      # the fix is to cache; if CPU climbs, the layout itself
      # is the spinner and the fix lives in SwiftOpenUI.
      - name: Literal-row profile experiment (IceCubes only)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
          QUILLUI_PROFILE_LITERAL_ROW: "1"
        run: scripts/run-linux-gtk-profile-csv.sh /tmp/quillui-profile-literalrow.csv quill-icecubes

      # Stored-property substitution. Same statusRow layout but
      # Text values read stored properties (username,
      # htmlValue) instead of the computed cachedDisplayName +
      # asRawText chains. Bisects whether the production CPU
      # peg is in the computed chain itself, vs SwiftOpenUI's
      # render-loop diff handling for computed-property
      # dependencies. The 40c1ed4 cache-at-model attempt
      # already proved caching `.asRawText` at the model
      # layer isn't enough; this experiment isolates the
      # *call path* instead of the *computation*.
      - name: Stored-prop profile experiment (IceCubes only)
        continue-on-error: true
        env:
          QUILLUI_DISABLE_FETCH: "1"
          QUILLUI_PROFILE_STORED_PROPS: "1"
        run: scripts/run-linux-gtk-profile-csv.sh /tmp/quillui-profile-storedprops.csv quill-icecubes

      - name: Stage QA outputs for upload
        if: always()
        run: |
          echo "==== .qa/ contents ===="
          ls -la .qa/ 2>&1 || echo "(no .qa dir)"
          mkdir -p /tmp/quillui-qa-upload
          cp -r .qa/. /tmp/quillui-qa-upload/ 2>/dev/null || true
          cp /tmp/quillui-*.log /tmp/quillui-qa-upload/ 2>/dev/null || true
          cp /tmp/quillui-*.csv /tmp/quillui-qa-upload/ 2>/dev/null || true
          cp /tmp/quillui-upstream-enchanted-audit.md /tmp/quillui-qa-upload/ 2>/dev/null || true
          echo "==== /tmp/quillui-qa-upload/ contents ===="
          ls -la /tmp/quillui-qa-upload/

      - name: Upload GTK QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-gtk-qa
          if-no-files-found: ignore
          path: /tmp/quillui-qa-upload/
