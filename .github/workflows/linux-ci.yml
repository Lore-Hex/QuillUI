name: Linux CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  swift-gtk:
    name: Swift GTK
    runs-on: ubuntu-24.04
    container:
      # SwiftOpenUI's `CGTK/shim.h` calls `gtk_picture_set_content_fit`
      # which is GTK 4.8+ (Ubuntu 24.04 noble ships GTK 4.14). The
      # 6.1 Swift toolchain on noble has a `libswiftObservation.so`
      # vs threading runtime mismatch ("undefined reference to
      # swift::threading::fatal"); the 6.2 toolchain ships the
      # fixed Observation runtime.
      image: swift:6.2-noble
    env:
      QUILLUI_SKIP_APT: "1"
      QUILLUI_SMOKE_SECONDS: "4"
      QUILL_CHAT_DIR: ${{ github.workspace }}/.upstream/enchanted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          apt-get update
          # NOTE: do NOT apt-install `clang` here. The Swift toolchain
          # already ships its own clang and putting Ubuntu's clang in
          # PATH makes SwiftPM 6.1's `-index-store-path` flag fail with
          # "clang: error: unknown argument: '-index-store-path'" when
          # compiling C/Objective-C targets like RSCoreObjC and
          # _SwiftSyntaxCShims.
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            dbus-x11 \
            git \
            imagemagick \
            libgdk-pixbuf-2.0-dev \
            libgtk-4-dev \
            libsqlite3-dev \
            pkg-config \
            ripgrep \
            x11-apps \
            xdotool \
            xvfb
          rm -rf /var/lib/apt/lists/*

      - name: Swift version
        run: swift --version

      - name: Profile budget audit
        run: scripts/audit-profile-budget.sh --max-shell-lines 50

      - name: Fetch upstream sources
        run: scripts/fetch-upstream.sh

      - name: Upstream Enchanted audit report
        run: scripts/audit-upstream-enchanted.sh >/tmp/quillui-upstream-enchanted-audit.md

      - name: Swift tests
        run: scripts/linux-swift-test.sh --scratch-path .build-linux

      - name: GTK offscreen ImageRenderer smoke
        run: GTK_A11Y=none GSK_RENDERER=cairo QUILLUI_ENABLE_GTK_OFFSCREEN_RENDER=1 xvfb-run -a scripts/linux-swift-test.sh --scratch-path .build-linux-offscreen --filter imageRendererOffscreenPipelineProducesRealPNG

      # The full upstream gluonfield/enchanted source tree now
      # compiles + links + GTK-renders end-to-end through the
      # QuillUI / SwiftOpenUI / QuillFoundation / QuillAppKit /
      # QuillDataMacros + 22-shim compatibility layer (Checkpoint
      # 80). Promoted off `continue-on-error` so future
      # regressions in the compat surface fail CI hard.
      - name: Generated upstream Enchanted compile
        run: scripts/generated-enchanted-full-source-check.sh

      - name: Generated Enchanted GTK visual smoke
        run: scripts/linux-gtk-visual-check.sh .qa/quill-chat-linux-generated-gtk.png quill-chat-linux

      - name: GTK interaction smoke
        run: scripts/linux-gtk-interaction-check.sh .qa/quill-gtk-interaction-smoke-open.png quill-gtk-interaction-smoke

      - name: Generated Enchanted toolbar interaction smoke
        run: scripts/linux-gtk-interaction-check.sh .qa/quill-chat-linux-toolbar-menu-gtk.png quill-chat-linux

      # Per-app GTK visual smoke. Each step launches the
      # corresponding Quill app under Xvfb, screenshots the
      # GTK window, and runs the verifier. With no per-product
      # branch in `verify-gtk-screenshot.py`, the verifier falls
      # through to the baseline check (size + mean brightness +
      # stddev) so "blank window" / "didn't render" / "tiny
      # window" regressions still fail CI. Per-app landmark
      # predicates are follow-up slices in docs/uitest-plan.md.
      #
      # Promoted off `continue-on-error` after the first
      # rollout run had every app pass baseline (ece79cb).
      - name: QuillSignal GTK visual smoke
        run: scripts/linux-gtk-visual-check.sh .qa/quill-signal-gtk.png quill-signal

      - name: QuillTelegram GTK visual smoke
        run: scripts/linux-gtk-visual-check.sh .qa/quill-telegram-gtk.png quill-telegram

      - name: QuillIINA GTK visual smoke
        run: scripts/linux-gtk-visual-check.sh .qa/quill-iina-gtk.png quill-iina

      - name: QuillCodeEdit GTK visual smoke
        run: scripts/linux-gtk-visual-check.sh .qa/quill-codeedit-gtk.png quill-codeedit

      - name: QuillIceCubes GTK visual smoke
        run: scripts/linux-gtk-visual-check.sh .qa/quill-icecubes-gtk.png quill-icecubes

      - name: QuillNetNewsWire GTK visual smoke
        run: scripts/linux-gtk-visual-check.sh .qa/quill-netnewswire-gtk.png quill-netnewswire

      - name: Stage QA outputs for upload
        if: always()
        run: |
          echo "==== .qa/ contents ===="
          ls -la .qa/ 2>&1 || echo "(no .qa dir)"
          mkdir -p /tmp/quillui-qa-upload
          cp -r .qa/. /tmp/quillui-qa-upload/ 2>/dev/null || true
          cp /tmp/quillui-*.log /tmp/quillui-qa-upload/ 2>/dev/null || true
          cp /tmp/quillui-upstream-enchanted-audit.md /tmp/quillui-qa-upload/ 2>/dev/null || true
          echo "==== /tmp/quillui-qa-upload/ contents ===="
          ls -la /tmp/quillui-qa-upload/

      - name: Upload GTK QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-gtk-qa
          if-no-files-found: ignore
          path: /tmp/quillui-qa-upload/
