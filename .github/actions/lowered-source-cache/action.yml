name: Restore lowered SwiftUI source cache
description: Restore QuillUI's generated lowered-source cache for vendored SwiftUI app builds.

inputs:
  cache-name:
    description: Stable name for the lowered source set used by this workflow.
    required: true

runs:
  using: composite
  steps:
    - name: Compute lowered source cache key digest
      id: cache-key
      shell: bash
      run: |
        digest="$(
          git -c 'safe.directory=*' ls-files -s \
            .github/actions/lowered-source-cache/action.yml \
            scripts/quillui-source-cache-key.py \
            scripts/profiles/generic-swiftui.sh \
            scripts/swiftpm-profile-lowered-source-cache.sh \
            scripts/run-quill-source-lower.sh \
            scripts/lower-swiftui-source-for-linux.sh \
            scripts/lower-observable-for-swiftopenui.py \
            scripts/ensure-swift-imports.sh \
            scripts/run-quill-swiftui-lower.sh \
            scripts/run-quill-appkit-lower.sh \
            scripts/lower-mainactor-assignments-for-linux.py \
            scripts/lower-extension-overrides-for-linux.py \
            scripts/lower-objc-interop-for-linux.sh \
            Sources/QuillSourceLowering \
            Sources/quill-source-lower \
            Sources/quill-lower-swiftui \
            Sources/quill-lower-appkit \
            vendor/apps \
            | git hash-object --stdin
        )"
        echo "digest=$digest" >> "$GITHUB_OUTPUT"

    - name: Restore lowered source cache
      uses: actions/cache@v6
      with:
        path: .build/quillui-lowered-source-cache
        key: quillui-${{ runner.os }}-lowered-source-${{ inputs.cache-name }}-${{ steps.cache-key.outputs.digest }}
        restore-keys: |
          quillui-${{ runner.os }}-lowered-source-${{ inputs.cache-name }}-
