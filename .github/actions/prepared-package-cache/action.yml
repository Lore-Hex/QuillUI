name: Restore prepared SwiftPM package cache
description: Restore QuillUI's prepared local SwiftPM package copies and vendored source scan stamps for generated app builds.

inputs:
  cache-name:
    description: Stable name for the prepared package set used by this workflow.
    required: true
  source-app:
    description: Optional vendored app source name to scope the cache key to vendor/apps/SOURCE_APP.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Compute prepared package cache key digest
      id: cache-key
      shell: bash
      run: |
        source_app="${{ inputs.source-app }}"
        source_paths=(vendor/apps)
        if [[ -n "$source_app" ]]; then
          case "$source_app" in
            *[!A-Za-z0-9._-]*)
              echo "::error::source-app must be a simple vendored app directory name"
              exit 2
              ;;
          esac
          source_paths=("vendor/apps/$source_app")
        fi
        digest="$(
          git -c 'safe.directory=*' ls-files -s \
            .github/actions/prepared-package-cache/action.yml \
            scripts/vendor-swiftpm-sources.sh \
            scripts/quillui-vendored-source.sh \
            scripts/build-swiftui-linux-app.sh \
            scripts/generate-swiftui-linux-package.sh \
            scripts/prepare-swiftui-linux-package-dependencies.py \
            scripts/discover-local-swiftpm-import-dependencies.py \
            scripts/swiftpm-profile-local-imports.sh \
            scripts/run-quill-source-lower.sh \
            scripts/lower-swiftui-source-for-linux.sh \
            scripts/lower-observable-for-swiftopenui.py \
            scripts/ensure-swift-imports.sh \
            scripts/run-quill-swiftui-lower.sh \
            scripts/run-quill-appkit-lower.sh \
            scripts/lower-mainactor-assignments-for-linux.py \
            scripts/lower-linux-conditional-compilation.py \
            scripts/lower-extension-overrides-for-linux.py \
            scripts/lower-objc-interop-for-linux.sh \
            Sources/QuillSourceLowering \
            Sources/quill-source-lower \
            Sources/quill-lower-swiftui \
            Sources/quill-lower-appkit \
            third_party \
            "${source_paths[@]}" \
            | git hash-object --stdin
        )"
        echo "digest=$digest" >> "$GITHUB_OUTPUT"

    - name: Restore prepared package cache
      uses: actions/cache@v6
      with:
        path: |
          .build/quillui-prepared-packages-cache
          .build/quillui-vendored-swiftpm-source-stamps
        key: quillui-${{ runner.os }}-prepared-packages-${{ inputs.cache-name }}-${{ steps.cache-key.outputs.digest }}
        restore-keys: |
          quillui-${{ runner.os }}-prepared-packages-${{ inputs.cache-name }}-
