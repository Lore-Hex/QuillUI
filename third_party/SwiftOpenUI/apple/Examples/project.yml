name: Examples
options:
  bundleIdPrefix: com.electricwoods
  deploymentTarget:
    macOS: "13.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: 2P97EM4L4N
    CODE_SIGN_STYLE: Automatic

targets:
  HelloWorld:
    type: application
    platform: macOS
    sources:
      - path: ../../Examples/Showcase/HelloWorld
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.electricwoods.examples.HelloWorld
      GENERATE_INFOPLIST_FILE: YES

